.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.row31{display:grid;grid-template-columns:2fr 1fr;gap:16px}

.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:18px;overflow:hidden}

.stat-item{background:#21262d;border-radius:8px;padding:8px 10px}

.sig-red{background:#3d0f0f;color:#f85149;border:1.5px solid #f85149}
.sig-dot{width:8px;height:8px;border-radius:50%;background:currentColor}
.rule-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #21262d;font-size:.85em}
.rule-item:last-child{border:none}
.badge{font-size:.7em;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.badge-g{background:#1a4731;color:#3fb950}
.badge-y{background:#3d2c00;color:#d29922}
.badge-r{background:#3d0f0f;color:#f85149}

.breadth-row{display:flex;gap:8px;margin-top:10px}
.breadth-pill{flex:1;text-align:center;padding:8px 4px;border-radius:8px;font-size:.8em;font-weight:600}
.bp-buy{background:#1a4731;color:#3fb950}.bp-watch{background:#3d2c00;color:#d29922}.bp-skip{background:#21262d;color:#8b949e}

table{width:100%;border-collapse:collapse;font-size:.85em}
th{font-size:.7em;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;padding:0 6px 8px;text-align:left;border-bottom:1px solid #30363d;white-space:nowrap}
td{padding:7px 6px;border-bottom:1px solid #21262d;vertical-align:middle}

tr:hover td{background:#1c2128}
.sym{font-weight:600;color:#e6edf3;white-space:nowrap}
.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.meta-text{font-size:.72em;color:#8b949e;font-weight:400}

.dp-item{background:#21262d;border-radius:8px;padding:8px 10px}
.dp-label{font-size:.68em;color:#8b949e;margin-bottom:2px}
.dp-val{font-size:.92em;font-weight:600}

.news-date-dp{color:#8b949e;font-size:.85em}

}

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(v, dec=0) {
  if (v==null||isNaN(v)) return '—';
  return v.toLocaleString('vi-VN', {minimumFractionDigits:dec,maximumFractionDigits:dec});
}
function fmtPct(v) {
  if (v==null||isNaN(v)) return '—';
  return v.toFixed(1)+'%';
}
function fmtSign(v, dec=3) {
  if (v==null||isNaN(v)) return '—';
  return (v>0?'+':'')+v.toFixed(dec);
}
function colorClass(v, goodAbove=0) {
  if (v==null||isNaN(v)) return '';
  return v > goodAbove ? 'up' : (v < goodAbove ? 'dn' : '');
}
function signalBadge(sig) {
  const cls = sig==='BUY'?'badge-buy':(sig==='WATCH'?'badge-watch':'badge-skip');
  return '<span class="s-badge '+cls+'">'+sig+'</span>';
}
function bbBadge(bb) {
  if (!bb||bb==='NORMAL') return '';
  const m = {STRONG_BB:'#3fb950',BB:'#d29922',WATCH_BB:'#58a6ff',VOL_SURGE:'#a371f7'};
  const c = m[bb]||'#8b949e';
  return '<span style="font-size:.65em;font-weight:700;padding:1px 6px;border-radius:8px;'
    +'background:'+c+'22;color:'+c+';border:1px solid '+c+';margin-left:4px">'+bb.replace('_',' ')+'</span>';
}
function scoreBar(score) {
  const color = score>=70?'#3fb950':(score>=50?'#d29922':'#8b949e');
  return '<div class="score-bar-wrap"><div class="score-bar" style="width:'+score+'%;background:'+color+'"></div><span>'+score+'</span></div>';
}
function peColor(pe) {
  if (!pe||isNaN(pe)) return '';
  return pe<12?'fund-val-good':(pe<22?'':'fund-val-bad');
}
function roeColor(roe) {
  if (!roe||isNaN(roe)) return '';
  return roe>18?'fund-val-good':(roe>10?'':'fund-val-bad');
}
function truncate(s, n=60) {
  if (!s) return '';
  return s.length>n?s.slice(0,n)+'...':s;
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.mnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if (btn) btn.classList.add('active');
  if (id === 'market' && !window._marketRendered) { renderMarket(); window._marketRendered=true; }
  if (id === 'opportunity' && !window._oppRendered) { renderOpportunity(); window._oppRendered=true; }
  if (id === 'bigboy' && !window._bbRendered) { renderBigboyTab(); window._bbRendered=true; }
}

// ── Unique sectors ─────────────────────────────────────────────────────────────
function getUniqueSectors() {
  const secs = [...new Set(STOCKS.map(s=>s.sector||'Khac'))].sort();
  return secs;
}

function buildSectorChips(containerId, clickFn) {
  const secs = getUniqueSectors();
  const bar = document.getElementById(containerId);
  // Keep first chip (Tat ca)
  const first = bar.children[0];
  bar.innerHTML = '';
  bar.appendChild(first);
  secs.forEach(sec => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = sec;
    chip.onclick = function() { clickFn(sec, this); };
    bar.appendChild(chip);
  });
}

// ── Sort utility ──────────────────────────────────────────────────────────────
function sortTable(tbl, col) {
  const st = tbl==='scr' ? sortScr : sortFund;
  if (st.col===col) { st.dir *= -1; } else { st.col=col; st.dir=-1; }
  if (tbl==='scr') renderScreener(); else renderFundamentals();
}

function applySortHeaders(tbl, prefixMap) {
  const st = tbl==='scr' ? sortScr : sortFund;
  Object.entries(prefixMap).forEach(([col, thId]) => {
    const th = document.getElementById(thId);
    if (!th) return;
    th.classList.remove('sort-asc','sort-desc');
    const icon = th.querySelector('.sort-icon');
    if (st.col===col) {
      th.classList.add(st.dir>0?'sort-asc':'sort-desc');
      if (icon) icon.innerHTML = st.dir>0 ? '&#9650;' : '&#9660;';
    } else {
      if (icon) icon.innerHTML = '&#8597;';
    }
  });
}

function doSort(arr, col, dir) {
  return [...arr].sort((a,b) => {
    const av = a[col], bv = b[col];
    if (av==null && bv==null) return 0;
    if (av==null) return 1;
    if (bv==null) return -1;
    return dir * (av > bv ? 1 : av < bv ? -1 : 0);
  });
}

  // ── 2. VN-INDEX KEY LEVELS ───────────────────────────────────────────────
  const vl = d.vni_levels || {};

  // ── 3. CHART VNI ─────────────────────────────────────────────────────────
  const vniChartHtml = mkCard('VN-Index 30 ngày gần nhất',

  // ── 4. MACRO QUOC TE ─────────────────────────────────────────────────────
  const md = MACRO_DATA || {};
  function macroItem(label, value, chgPct, note, unit, interpret) {

  // Tạo câu giải thích tự động cho từng chỉ số

      return chgPct > 1 ? 'Phố Wall tăng tốt — tâm lý lạc quan' : chgPct > 0 ? 'Phố Wall tăng nhẹ — ổn định' : chgPct > -1 ? 'Phố Wall giảm nhẹ — thận trọng' : 'Phố Wall giảm mạnh — rủi ro tăng';

    }
    return '';
  }
  function getChg(key) { return md[key] ? md[key].chg_pct : null; }
  function getLast(key) { return md[key] ? md[key].last : null; }

  // USD/VND: prefer Vietcombank data, fallback to Yahoo
  const usdVndVal = md.usd_sell || (md.usd_vnd ? md.usd_vnd.last : null);
  const usdVndChg = md.usd_vnd ? md.usd_vnd.chg_pct : null;

  const macroGrid =

    +macroItem('🇺🇸 S&P 500', getLast('sp500'), getChg('sp500'), '', '', macroInterp('sp500', getChg('sp500')))

    +macroItem('🇭🇰 Hang Seng', getLast('hsi'), getChg('hsi'), 'Thị trường HK', '')
    // Hàng hóa & FX
    +macroItem('🥇 Vàng USD/oz', getLast('gold_usd'), getChg('gold_usd'), '', '', macroInterp('gold_usd', getChg('gold_usd')))
    +macroItem('🛢️ Dầu WTI $/bbl', getLast('oil_wti'), getChg('oil_wti'), 'Chi phí sản xuất', '')
    +macroItem('🔴 Đồng (Copper)', getLast('copper'), getChg('copper'), '', '', macroInterp('copper', getChg('copper')))
    +macroItem('💵 DXY (USD Index)', md.dxy ? md.dxy.last : null, md.dxy ? md.dxy.chg_pct : null, '', '', macroInterp('dxy', md.dxy ? md.dxy.chg_pct : null))
    +macroItem('🇻🇳 USD/VND', usdVndVal, usdVndChg, '', '', macroInterp('usd_sell', usdVndChg))
    +(md.gold_sell?macroItem('🇻🇳 Vàng SJC (tr/lượng)', md.gold_sell, null, 'Vietcombank sell', ''):'')
    +'</div>';

  // Macro signal tong hop
  const sp500Chg  = getChg('sp500')  || 0;

  const goldChg   = getChg('gold_usd') || 0;

  const copperChg = getChg('copper') || 0;
  const macroSignals = [];

  if (copperChg > 1.5)               macroSignals.push(['up',   '▲ Đồng tăng mạnh → tín hiệu mở rộng kinh tế toàn cầu, tích cực cho chu kỳ CN']);
  if (copperChg < -1.5)              macroSignals.push(['dn',   '▼ Đồng giảm mạnh → lo ngại tăng trưởng toàn cầu chậm lại']);

  // ── 5. DO RONG TOAN SAN ──────────────────────────────────────────────────
  const fb = d.full_breadth || d.breadth || {};

  // ── 7. PHAN TICH NGANH TOAN SAN ──────────────────────────────────────────
  const sf = (d.sector_full && d.sector_full.length) ? d.sector_full : d.sector_performance || [];
  // Map ZN-* codes → tên Việt
  const SECTOR_VI = {
    'ZN-NGANHHANG':'Ngân hàng','ZN-NGANHANG':'Ngân hàng','ZN-NGAN':'Ngân hàng',
    'ZN-BATDONGSAN':'Bất động sản','ZN-BDS':'Bất động sản',
    'ZN-THEP':'Thép','ZN-DAUKHI':'Dầu khí','ZN-HANGKHONG':'Hàng không','ZN-HK':'Hàng không',

    'ZN-BAOHIEM':'Bảo hiểm','ZN-PHANBON':'Phân bón','ZN-NANGLUONG':'Năng lượng',
    'ZN-DUOCPHAM':'Dược phẩm','ZN-DP':'Dược phẩm','ZN-THUYSAN':'Thủy sản',
    'ZN-NHUA':'Nhựa','ZN-CAOSV':'Cao su','ZN-CAOSU':'Cao su','ZN-CAOSUPK':'Cao su',
    'ZN-KHOANGSAN':'Khoáng sản','ZN-CHUNGKHOAN':'Chứng khoán','ZN-CK':'Chứng khoán',
    'ZN-DETMAY':'Dệt may','ZN-GO':'Gỗ','ZN-VIENPHI':'Viễn thông','ZN-VINVIEN':'Viễn thông',
    'ZN-DTXD':'Đầu tư XD','ZN-DTPT':'Đầu tư PT','ZN-KTHT':'Hạ tầng',
    'ZN-COKHI':'Cơ khí','ZN-VATTU':'Vật tư','ZN-VLXD':'Vật liệu XD',
    'ZN-LOGISTICS':'Logistics','ZN-NUOC':'Nước sạch',
    'ZN-NONGSAN':'Nông sản','ZN-TIEUDUNG':'Tiêu dùng','ZN-BANLEQUA':'Bán lẻ','ZN-BANLEQUAN':'Bán lẻ',
    'ZN-DULICH':'Du lịch','ZN-GIAODUL':'Giáo dục','ZN-GIAODUC':'Giáo dục','ZN-BACSY':'Y tế',
    'ZN-TANGHOA':'Tổng hợp','ZN-TRUNGGIAN':'Trung gian TC',

    'Khac':'Khác','Khác':'Khác',
  };
  function viSector(raw) {
    if (!raw) return 'Khác';
    const t = raw.trim();
    if (SECTOR_VI[t]) return SECTOR_VI[t];
    // fallback: try suffix
    const parts = t.split('-');
    if (parts.length > 1) {
      const suffix = parts.slice(1).join('-');
      for (const [k,v] of Object.entries(SECTOR_VI)) { if (k.endsWith('-'+suffix)) return v; }
    }
    return t.replace(/^ZN-/,'').replace(/-/g,' ');
  }
  function makeSectorBar(item) {
    const chg = item.avg_pct !== undefined ? item.avg_pct : (item.avg_change || 0);
    const total_s = item.total_stocks || item.stock_count || 1;
    const up_c    = item.up_count || 0;
    const upPct   = Math.round(up_c / total_s * 100);
    const col     = chgColor(chg);

  // ── STRONG_BB table chi tiết ──────────────────────────────────────────────
  // ── bbVerdict: nhận định ngắn cho mỗi dòng STRONG_BB ────────────────────
  function bbVerdict(row) {
    const patterns = MARKET_OVERVIEW.bigboy_patterns || {};

  // Render VN-Index chart sau khi DOM da duoc dua vao
  setTimeout(function() {

        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return 'VN-Index: '+ctx.raw.toLocaleString('vi-VN');}}}},scales:{x:{ticks:{color:'#8b949e',maxTicksLimit:8},grid:{color:'#21262d'}},y:{ticks:{color:'#8b949e'},grid:{color:'#21262d'}}}}
      });
    }
  }, 50);
}

function oppSort(field, th) {
  if (window._oppSortField === field) {
    window._oppSortDir = (window._oppSortDir || 'desc') === 'desc' ? 'asc' : 'desc';
  } else {
    window._oppSortField = field;
    window._oppSortDir = 'desc';
  }
  document.querySelectorAll('.opp-sort-th').forEach(function(h) { h.style.color='#8b949e'; });
  th.style.color = '#58a6ff';
  const fmap = {tech:'tech_score', rsi:'rsi14', bb:'bb_days_30d', pe:'pe'};
  const f = fmap[field] || field;
  const dir = window._oppSortDir === 'asc' ? 1 : -1;
  const list2 = [...(OPPORTUNITY_LIST||[])].sort(function(a,b) {
    const av = (a[f] !== null && a[f] !== undefined) ? a[f] : -999;
    const bv = (b[f] !== null && b[f] !== undefined) ? b[f] : -999;
    return (av - bv) * dir;
  });
  document.getElementById('opp-tbody').innerHTML = window._oppGetRows ? window._oppGetRows(window._oppCurrentFilter||'all', list2) : '';
}

function renderOpportunity() {
  const list = OPPORTUNITY_LIST || [];

  function getRows(filter, customList) {
    const src = customList || list;
    let filtered = src;
    if (filter === 'buy') filtered = src.filter(function(d){ return d.signal === 'BUY'; });
    if (filter === 'bb') filtered = src.filter(function(d){ return d.bb_days_30d > 0; });
    if (filter === 'cheap') filtered = src.filter(function(d){ return d.pe_vs_sector === 'RẺ HƠN'; });

    return filtered.map(function(d) {
      const sigColor = d.signal==='BUY'?'#3fb950':d.signal==='WATCH'?'#d29922':d.signal==='SELL'?'#f85149':'#484f58';
      const sigBg = d.signal==='BUY'?'#1a4731':d.signal==='WATCH'?'#3d2c00':d.signal==='SELL'?'#3d0f0f':'#21262d';
      const rsiColor = d.rsi14 > 70 ? '#f85149' : d.rsi14 < 30 ? '#3fb950' : '#8b949e';
      const rsiNote = d.rsi14 > 70 ? 'đã tăng nhanh, có thể nghỉ nhẹ' : d.rsi14 < 30 ? 'đã giảm nhiều, có thể là cơ hội' : 'chưa có tín hiệu rõ';
      const trendIcon = d.score_trend === '↑' ? '<span style="color:#3fb950">↑ cải thiện</span>' : d.score_trend === '↓' ? '<span style="color:#f85149">↓ suy yếu</span>' : '<span style="color:#8b949e">→ ổn định</span>';
      const maIcons = (d.above_ma20?'<span title="Trên đường trung bình 20 ngày" style="color:#3fb950;font-size:.75em">TB20✓</span>':'<span style="color:#484f58;font-size:.75em">TB20✗</span>')
        + ' ' + (d.above_ma50?'<span title="Trên đường trung bình 50 ngày" style="color:#3fb950;font-size:.75em">TB50✓</span>':'<span style="color:#484f58;font-size:.75em">TB50✗</span>');
      const valColor = d.pe_vs_sector==='RẺ HƠN'?'#3fb950':d.pe_vs_sector==='ĐẮT HƠN'?'#f85149':'#8b949e';
      const valText = d.pe !== null && d.sector_pe !== null && d.pe > 0 && d.sector_pe > 0
        ? 'P/E '+d.pe.toFixed(1)+'x <span style="color:'+valColor+'">('+(d.pe_vs_sector||'N/A')+')</span>'
        : '<span style="color:#484f58">N/A</span>';
      const bbText = d.bb_days_30d > 0
        ? '<span style="color:#f0c040;font-weight:700">'+d.bb_days_30d+'/30 ngày</span>'
        : '<span style="color:#484f58">–</span>';

      const positives = [];
      const negatives = [];
      if (d.signal === 'BUY') positives.push('kỹ thuật mạnh');
      else if (d.signal === 'SELL') negatives.push('kỹ thuật yếu');
      if (d.above_ma20 && d.above_ma50) positives.push('trên đường TB 20 và 50 ngày — xu hướng tăng ngắn và trung hạn đều xác nhận');
      else if (!d.above_ma20) negatives.push('dưới đường trung bình 20 ngày — xu hướng ngắn hạn chưa tích cực');
      if (d.bb_days_30d >= 5) positives.push('nhà đầu tư lớn đã mua '+d.bb_days_30d+'/30 ngày — tích lũy đều đặn');
      else if (d.bb_days_30d > 0) positives.push('có dấu hiệu nhà đầu tư lớn quan tâm');
      if (d.pe_vs_sector === 'RẺ HƠN') positives.push('định giá hấp dẫn');
      else if (d.pe_vs_sector === 'ĐẮT HƠN') negatives.push('đắt hơn ngành');
      if (d.score_trend === '↑') positives.push('đà tăng cải thiện');
      else if (d.score_trend === '↓') negatives.push('đà yếu dần');

      let conclusion = '';
      if (positives.length >= 3) conclusion = '✅ '+positives.join(', ');
      else if (negatives.length >= 2) conclusion = '⚠️ '+negatives.join(', ');
      else if (positives.length > 0) conclusion = '→ '+positives.join(', ')+(negatives.length?' · cẩn thận: '+negatives.join(', '):'');
      else conclusion = '<span style="color:#484f58">Không rõ xu hướng</span>';

      return '<tr style="border-bottom:1px solid #21262d;cursor:pointer" onclick="showDetail(\''+d.sym+'\')" onmouseover="this.style.background=\'#21262d\'" onmouseout="this.style.background=\'\'">'
        +'<td style="padding:10px 12px"><strong style="color:#e6edf3">'+d.sym+'</strong><div style="font-size:.72em;color:#8b949e">'+d.sector+'</div></td>'
        +'<td style="padding:10px 12px;text-align:center"><span style="background:'+sigBg+';color:'+sigColor+';font-size:.75em;font-weight:700;padding:3px 10px;border-radius:10px">'+d.signal+'</span><div style="font-size:.72em;color:#8b949e;margin-top:3px">điểm '+d.tech_score+'/6</div></td>'
        +'<td style="padding:10px 12px">'+trendIcon+'<div style="font-size:.72em;margin-top:3px">'+maIcons+'</div></td>'
        +'<td style="padding:10px 12px;font-size:.82em;color:'+rsiColor+'">RSI '+(d.rsi14||0).toFixed(0)+'<div style="font-size:.85em;color:#8b949e">'+rsiNote+'</div></td>'
        +'<td style="padding:10px 12px;font-size:.82em">'+valText+'</td>'
        +'<td style="padding:10px 12px;font-size:.82em">'+bbText+'</td>'
        +'<td style="padding:10px 12px;font-size:.8em;color:#c9d1d9">'+conclusion+'</td></tr>';
    }).join('');
  }

  document.getElementById('opportunity-content').innerHTML =
    '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">'
    +'<button onclick="oppFilter(\'all\',this)" id="opp-btn-all" style="padding:6px 16px;border-radius:20px;border:1px solid #58a6ff;background:#1c2d40;color:#58a6ff;font-size:.82em;cursor:pointer;font-weight:600">Tất cả ('+list.length+')</button>'
    +'<button onclick="oppFilter(\'buy\',this)" id="opp-btn-buy" style="padding:6px 16px;border-radius:20px;border:1px solid #30363d;background:none;color:#8b949e;font-size:.82em;cursor:pointer">🟢 BUY ('+list.filter(function(d){return d.signal==='BUY';}).length+')</button>'
    +'<button onclick="oppFilter(\'bb\',this)" id="opp-btn-bb" style="padding:6px 16px;border-radius:20px;border:1px solid #30363d;background:none;color:#8b949e;font-size:.82em;cursor:pointer">🐋 Có tổ chức ('+list.filter(function(d){return d.bb_days_30d>0;}).length+')</button>'
    +'<button onclick="oppFilter(\'cheap\',this)" id="opp-btn-cheap" style="padding:6px 16px;border-radius:20px;border:1px solid #30363d;background:none;color:#8b949e;font-size:.82em;cursor:pointer">💰 Rẻ hơn ngành ('+list.filter(function(d){return d.pe_vs_sector==='RẺ HƠN';}).length+')</button>'
    +'</div>'
    +'<div class="card" style="padding:0">'
    +'<table style="width:100%;border-collapse:collapse">'
    +'<thead><tr style="border-bottom:1px solid #30363d;background:#161b22">'
    +'<th style="padding:10px 12px;text-align:left;font-size:.75em;color:#8b949e;font-weight:600">Mã</th>'
    +'<th class="opp-sort-th" onclick="oppSort(\'tech\',this)" style="padding:10px 12px;text-align:center;font-size:.75em;color:#8b949e;font-weight:600;cursor:pointer" title="Click để sắp xếp">Kỹ thuật ↕</th>'
    +'<th style="padding:10px 12px;font-size:.75em;color:#8b949e;font-weight:600">Xu hướng</th>'
    +'<th class="opp-sort-th" onclick="oppSort(\'rsi\',this)" style="padding:10px 12px;font-size:.75em;color:#8b949e;font-weight:600;cursor:pointer" title="Click để sắp xếp">RSI 14 ↕</th>'
    +'<th class="opp-sort-th" onclick="oppSort(\'pe\',this)" style="padding:10px 12px;font-size:.75em;color:#8b949e;font-weight:600;cursor:pointer" title="Click để sắp xếp">Định giá ↕</th>'
    +'<th class="opp-sort-th" onclick="oppSort(\'bb\',this)" style="padding:10px 12px;font-size:.75em;color:#8b949e;font-weight:600;cursor:pointer" title="Click để sắp xếp">Tổ chức ↕</th>'
    +'<th style="padding:10px 12px;font-size:.75em;color:#8b949e;font-weight:600">Kết luận</th>'
    +'</tr></thead>'
    +'<tbody id="opp-tbody">'+getRows('all')+'</tbody>'
    +'</table></div>';

  window._oppGetRows = getRows;
}

function oppFilter(filter, btn) {
  window._oppCurrentFilter = filter;
  document.querySelectorAll('[id^="opp-btn-"]').forEach(function(b) {
    b.style.background='none'; b.style.color='#8b949e'; b.style.borderColor='#30363d';
  });
  btn.style.background='#1c2d40'; btn.style.color='#58a6ff'; btn.style.borderColor='#58a6ff';
  document.getElementById('opp-tbody').innerHTML = window._oppGetRows ? window._oppGetRows(filter) : '';
}

function bbSort(field, th) {
  if (window._bbSortField === field) {
    window._bbSortDir = (window._bbSortDir || 'desc') === 'desc' ? 'asc' : 'desc';
  } else {
    window._bbSortField = field;
    window._bbSortDir = 'desc';
  }
  document.querySelectorAll('.bb-sort-th').forEach(function(h) { h.style.color='#8b949e'; });
  th.style.color = '#58a6ff';
  const bh = window._bbBh || {};
  const fmap = {days:'total_days_30d', ltr:'avg_ltr_30d'};
  const f = fmap[field] || field;
  const dir = window._bbSortDir === 'asc' ? 1 : -1;
  const sorted = (window._bbSyms || []).slice().sort(function(a,b) {
    const av = (bh[a] && bh[a][f] !== null && bh[a][f] !== undefined) ? bh[a][f] : -999;
    const bv = (bh[b] && bh[b][f] !== null && bh[b][f] !== undefined) ? bh[b][f] : -999;
    return (av - bv) * dir;
  });
  const tbody = document.getElementById('bb-tbody');
  if (tbody && window._bbMakeRows) tbody.innerHTML = window._bbMakeRows(sorted);
}

function renderBigboyTab() {
  const bh = BIGBOY_HISTORY || {};
  const syms = Object.keys(bh).filter(function(s){ return (bh[s].total_days_30d||0) > 0; })
    .sort(function(a,b){ return (bh[b].total_days_30d||0) - (bh[a].total_days_30d||0); });

  if (!syms.length) {
    document.getElementById('bigboy-content').innerHTML = '<div style="text-align:center;padding:60px;color:#8b949e">Không có dữ liệu dòng tiền 30 ngày</div>';
    return;
  }

  const sectorBB = {};
  const oppList = OPPORTUNITY_LIST || [];
  syms.forEach(function(s) {
    const opp = oppList.find(function(o){ return o.sym===s; });
    const sec = opp ? opp.sector : 'Khác';
    if (!sectorBB[sec]) sectorBB[sec] = {days:0, syms:[]};
    sectorBB[sec].days += bh[s].total_days_30d||0;
    sectorBB[sec].syms.push(s);
  });
  const sectorArr = Object.entries(sectorBB).sort(function(a,b){ return b[1].days-a[1].days; });

  window._bbSyms = syms.slice();
  window._bbBh   = bh;
  window._bbOppList = oppList;

  function makeBbRows(symList) {
    return symList.map(function(s) {
      const h = bh[s];
      const trendColor = h.trend==='ĐANG TÍCH LŨY'?'#3fb950':h.trend==='ĐANG PHÂN PHỐI'?'#f85149':'#8b949e';
      const trendBg = h.trend==='ĐANG TÍCH LŨY'?'#1a4731':h.trend==='ĐANG PHÂN PHỐI'?'#3d0f0f':'#21262d';
      const ltr = h.avg_ltr_30d || 0;
      const ltrNote = ltr >= 70 ? 'sức mạnh rất cao' : ltr >= 50 ? 'sức mạnh tốt' : ltr >= 30 ? 'sức mạnh trung bình' : 'sức mạnh yếu';
      const opp = oppList.find(function(o){ return o.sym===s; });
      const sector = opp ? opp.sector : '';
      const miniBar = (h.ltr_scores||[]).slice(-30).map(function(v,i) {
        const sig = h.signal_types ? h.signal_types[i] : null;
        const col = v===null ? '#21262d' : sig==='STRONG_BB' ? '#3fb950' : sig==='BB' ? '#2ea043' : sig==='WATCH_BB' ? '#d29922' : '#21262d';
        return '<span style="display:inline-block;width:5px;height:16px;background:'+col+';border-radius:1px;margin:0 1px" title="'+(v?'LTR '+v.toFixed(0):'–')+'"></span>';
      }).join('');
      // ── Verdict thực tế từ data có sẵn ─────────────────────────────────────
      const consec = h.consecutive_days || 0;
      const totalD = h.total_days_30d   || 0;
      var vLabel, vColor, vBg, vDesc;
      if (consec >= 5) {
        vLabel='🔥 TÍCH LŨY MẠNH'; vColor='#3fb950'; vBg='#1a4731';
        vDesc='Chuỗi '+consec+' ngày liên tiếp — tổ chức đang tích lũy dứt khoát';
      } else if (consec >= 3) {
        vLabel='✅ TÍCH LŨY '+consec+' NGÀY'; vColor='#3fb950'; vBg='#1a4731';
        vDesc='Liên tiếp '+consec+' phiên có tín hiệu — dấu hiệu tích lũy có hệ thống';
      } else if (h.trend === 'ĐANG TÍCH LŨY') {
        vLabel='📈 ĐANG TÍCH LŨY'; vColor='#3fb950'; vBg='#1a4731';
        vDesc='Cường độ tín hiệu tăng dần — nhà đầu tư lớn đang gom hàng';
      } else if (h.trend === 'ĐANG PHÂN PHỐI') {
        vLabel='📉 PHÂN PHỐI'; vColor='#f85149'; vBg='#3d0f0f';
        vDesc='Tín hiệu giảm dần — có thể đang bán ra, thận trọng';
      } else if (ltr >= 70 && totalD >= 3) {
        vLabel='💪 LTR CAO'; vColor='#58a6ff'; vBg='#0c2d4a';
        vDesc='LTR trung bình '+ltr.toFixed(0)+' — mỗi lần vào lệnh đều mạnh, chưa liên tiếp';
      } else if (totalD >= 3) {
        vLabel='👁 THEO DÕI'; vColor='#d29922'; vBg='#3d2c00';
        vDesc=totalD+' ngày có tín hiệu / 30 phiên — chưa đủ liên tiếp, cần xác nhận';
      } else {
        vLabel='🔵 MỚI XUẤT HIỆN'; vColor='#8b949e'; vBg='#21262d';
        vDesc='Tín hiệu ít ('+totalD+' ngày) — quan sát thêm 2-3 phiên trước khi hành động';
      }
      return '<tr style="border-bottom:1px solid #21262d;cursor:pointer" onclick="showBigBoyDetail(\''+s+'\')" onmouseover="this.style.background=\'#21262d\'" onmouseout="this.style.background=\'\'">'
        +'<td style="padding:10px 12px"><strong style="color:#e6edf3">'+s+'</strong><div style="font-size:.72em;color:#8b949e">'+sector+'</div></td>'
        +'<td style="padding:10px 12px;text-align:center"><span style="font-size:1.3em;font-weight:700;color:#f0c040">'+totalD+'</span><div style="font-size:.72em;color:#8b949e">/ 30 ngày</div><div style="font-size:.7em;color:'+(consec>=3?'#3fb950':'#8b949e')+';margin-top:2px">Chuỗi: '+consec+' ngày</div></td>'
        +'<td style="padding:10px 12px"><div>'+miniBar+'</div><div style="font-size:.7em;color:#8b949e;margin-top:3px">🟢 STRONG_BB &nbsp; 🟡 WATCH_BB</div></td>'
        +'<td style="padding:10px 12px;text-align:center"><span style="font-size:1.1em;font-weight:700;color:#58a6ff">'+(ltr>0?ltr.toFixed(0):'–')+'</span><div style="font-size:.72em;color:#8b949e">'+ltrNote+'</div></td>'
        +'<td style="padding:10px 12px"><span style="background:'+vBg+';color:'+vColor+';font-size:.76em;font-weight:700;padding:4px 10px;border-radius:10px;display:inline-block">'+vLabel+'</span><div style="font-size:.72em;color:#8b949e;margin-top:4px;line-height:1.4">'+vDesc+'</div></td>'
        +'<td style="padding:10px 12px;text-align:center"><button onclick="event.stopPropagation();showBigBoyDetail(\''+s+'\')" style="padding:5px 12px;border-radius:8px;border:1px solid #30363d;background:#21262d;color:#c9d1d9;cursor:pointer;font-size:.8em">Chi tiết</button></td></tr>';
    }).join('');
  }
  window._bbMakeRows = makeBbRows;

  const rows = makeBbRows(syms);

  const maxDays = sectorArr.length ? sectorArr[0][1].days : 1;
  const sectorBars = sectorArr.slice(0,8).map(function(e) {
    const sec=e[0], data=e[1];
    const pct = Math.round(data.days/maxDays*100);
    return '<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:.82em;color:#c9d1d9">'+sec+'</span><span style="font-size:.82em;color:#f0c040">'+data.days+' ngày-cp</span></div><div style="height:8px;background:#21262d;border-radius:4px"><div style="width:'+pct+'%;height:100%;background:#f0c040;border-radius:4px"></div></div><div style="font-size:.7em;color:#8b949e;margin-top:2px">'+data.syms.join(', ')+'</div></div>';
  }).join('');

  // ── MONEYFLOW DEEP ANALYSIS sections ────────────────────────────────────
  const mf      = MARKET_OVERVIEW.moneyflow || {};
  const mfTrend = mf.trend_30d || [];
  const mfRot   = mf.sector_rotation || [];
  const mfRank  = mf.smart_money_rank || [];
  const mfWarn  = mf.distribution_warns || [];
  const mfNarr  = MARKET_OVERVIEW.moneyflow_narrative || '';

  // ── A. Nhận định tổng hợp dòng tiền ─────────────────────────────────────
  const narrativeSec = mfNarr
    ? '<div class="card" style="margin-bottom:16px;border-left:3px solid #58a6ff">'
      +'<div style="font-size:.78em;font-weight:700;color:#58a6ff;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px">📝 Nhận định dòng tiền tổng hợp</div>'
      +mfNarr+'</div>'
    : '';

  // ── B. Chart cường độ 30 phiên ────────────────────────────────────────────
  var trendSec = '';
  if (mfTrend.length >= 3) {
    const maxStrong = Math.max.apply(null, mfTrend.map(function(t){ return t.strong||0; })) || 1;
    const maxTotal  = Math.max.apply(null, mfTrend.map(function(t){ return t.total||0; }))  || 1;
    const recent3Avg = mfTrend.slice(0,3).reduce(function(s,t){ return s+(t.strong||0); },0)/3;
    const prev5Avg   = mfTrend.slice(3,8).reduce(function(s,t){ return s+(t.strong||0); },0)/Math.min(5,mfTrend.slice(3,8).length||1);
    const trendDir = recent3Avg > prev5Avg*1.3 ? '↑ TĂNG TỐC' : recent3Avg < prev5Avg*0.7 ? '↓ GIẢM TỐC' : '→ ỔN ĐỊNH';
    const trendCol = recent3Avg > prev5Avg*1.3 ? '#3fb950' : recent3Avg < prev5Avg*0.7 ? '#f85149' : '#d29922';
    const bars = mfTrend.slice(0,30).reverse().map(function(t) {
      const h  = Math.max(2, Math.round((t.strong||0)/maxStrong*52));
      const ht = Math.max(2, Math.round((t.total||0)/maxTotal*52));
      const isSun = new Date(t.date).getDay()===0||new Date(t.date).getDay()===6;
      return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;min-width:0" title="'+t.date+': '+t.strong+' STRONG / '+t.total+' tổng">'
        +'<div style="width:100%;background:#21262d;border-radius:2px;height:54px;display:flex;flex-direction:column-reverse;overflow:hidden">'
        +'<div style="height:'+h+'px;background:#3fb950;flex-shrink:0"></div>'
        +'<div style="height:'+(ht-h)+'px;background:#484f58;flex-shrink:0"></div>'
        +'</div>'
        +'<div style="font-size:8px;color:#484f58;writing-mode:vertical-rl;transform:rotate(180deg);margin-top:2px;max-height:28px;overflow:hidden">'+t.date.slice(5)+'</div>'
        +'</div>';
    }).join('');
    trendSec = '<div class="card" style="margin-bottom:16px">'

  // ── D. Smart Money Ranking — top ngành dòng tiền mạnh ────────────────────
  var rankSec = '';

  document.getElementById('bigboy-content').innerHTML =

// ── DETAIL MODAL ──────────────────────────────────────────────────────────────
window._detailCharts = [];

// ── buildStockVerdict: Phân tích mua/bán toàn diện ───────────────────────────
function buildStockVerdict(sym) {
  const s  = STOCKS.find(x => x.sym === sym);
  const pd = (typeof MARKET_POPUP_DATA !== 'undefined' && MARKET_POPUP_DATA[sym]) || null;
  const ph = (typeof PRICE_HISTORY    !== 'undefined' && PRICE_HISTORY[sym])    || null;
  const mo = (typeof MARKET_OVERVIEW  !== 'undefined' && MARKET_OVERVIEW)        || {};

  function n1(v)  { return (v !== null && v !== undefined) ? v.toFixed(1) : 'N/A'; }

  const rsi      = (pd && pd.rsi14  !== null && pd.rsi14  !== undefined) ? pd.rsi14  : (s ? s.rsi14  : null);
  const macdSig  = (pd && pd.macd_sig) ? pd.macd_sig : (s ? s.macd_signal : null);
  const bbPos    = (pd && pd.bb_pos !== null && pd.bb_pos !== undefined) ? pd.bb_pos : null;
  const pe       = (pd && pd.pe  !== null && pd.pe  !== undefined) ? pd.pe  : (s ? s.pe  : null);
  const roe      = (pd && pd.roe !== null && pd.roe !== undefined) ? pd.roe : (s ? s.roe : null);
  const bb7      = pd ? (pd.bb_7day  || []) : [];
  const bbConsec = pd ? (pd.bb_consec || 0)  : 0;
  const p5dChg   = pd ? (pd.price_5d_chg || null) : null;
  const ma20arr  = ph ? (ph.ma20 || []) : [];
  const ma50arr  = ph ? (ph.ma50 || []) : [];
  const ma20     = ma20arr.length ? ma20arr[ma20arr.length - 1] : null;
  const ma50     = ma50arr.length ? ma50arr[ma50arr.length - 1] : null;
  const closeRaw = ph && ph.closes && ph.closes.length ? ph.closes[ph.closes.length - 1] : (s ? s.close : null);
  const closeP   = closeRaw;
  const sector   = (s && s.sector) || (pd && pd.sector) || '';
  const hasStrong = bb7.some(b => b.signal_type === 'STRONG_BB');
  const hasBB     = bb7.some(b => b.signal_type === 'BB' || b.signal_type === 'STRONG_BB');
  const hasWatch  = bb7.some(b => b.signal_type === 'WATCH_BB');
  const nStrong   = bb7.filter(b => b.signal_type === 'STRONG_BB').length;

  // ── Score (0-100) ─────────────────────────────────────────────────────────
  var score = 0, momentumScore = 0, bbScore = 0, valScore = 0, sectorScore = 10;
  if (rsi !== null) {
    if (rsi >= 40 && rsi <= 65) momentumScore += 15;
    else if ((rsi >= 30 && rsi < 40) || (rsi > 65 && rsi <= 70)) momentumScore += 8;
  }
  if (macdSig === 'BUY') momentumScore += 15;
  else if (macdSig === 'WATCH') momentumScore += 7;
  if (hasStrong && bbConsec >= 3) bbScore = 30;
  else if (hasStrong) bbScore = 20;
  else if (hasBB)     bbScore = 10;
  else if (hasWatch)  bbScore = 5;
  if (pe !== null) {
    if (pe < 10) valScore = 20; else if (pe < 15) valScore = 15;
    else if (pe < 20) valScore = 10; else if (pe < 25) valScore = 5;
  } else { valScore = 8; }
  if (mo.sector_full && sector) {
    var secD = mo.sector_full.find(x => x.sector === sector);
    if (secD) {
      if (secD.avg_pct > 0.5) sectorScore = 20;
      else if (secD.avg_pct > 0) sectorScore = 15;
      else if (secD.avg_pct > -0.5) sectorScore = 8;
      else sectorScore = 3;
    }
  }
  score = momentumScore + bbScore + valScore + sectorScore;
  if (rsi !== null && rsi > 70) score -= 15;
  if (p5dChg !== null && p5dChg > 12) score -= 10;
  score = Math.min(100, Math.max(0, Math.round(score)));

  var verdictLabel, verdictColor, verdictBg, verdictIcon;
  if (score >= 70)      { verdictLabel='NÊN MUA';  verdictIcon='🟢'; verdictColor='#3fb950'; verdictBg='#1a4731'; }
  else if (score >= 50) { verdictLabel='THEO DÕI'; verdictIcon='🟡'; verdictColor='#d29922'; verdictBg='#3d2c00'; }
  else                  { verdictLabel='TRÁNH';     verdictIcon='🔴'; verdictColor='#f85149'; verdictBg='#3d0f0f'; }

  var scoreBreakdown =
    '<div style="display:flex;gap:4px;margin-top:6px">'
    +[['Momentum',momentumScore,30],['Dòng tiền',bbScore,30],['Định giá',valScore,20],['Ngành',sectorScore,20]].map(function(d){
      var col = d[1]/d[2] >= 0.7 ? '#3fb950' : d[1]/d[2] >= 0.4 ? '#d29922' : '#f85149';
      return '<div style="flex:1;text-align:center"><div style="font-size:.62em;color:#8b949e">'+d[0]+'</div>'
        +'<div style="font-size:.72em;font-weight:700;color:'+col+'">'+d[1]+'/'+d[2]+'</div></div>';
    }).join('')+'</div>';

  var verdictCard =
    '<div style="background:'+verdictBg+';border:2px solid '+verdictColor+';border-radius:12px;padding:14px 16px;margin-bottom:14px">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
    +'<span style="font-size:1.4em">'+verdictIcon+'</span>'
    +'<span style="font-size:.8em;font-weight:800;color:'+verdictColor+';letter-spacing:1px;text-transform:uppercase">PHÂN TÍCH MUA/BÁN — '+verdictLabel+'</span>'
    +'</div>'
    +'<div style="display:flex;align-items:center;gap:8px">'
    +'<div style="flex:1;background:#0d111780;border-radius:6px;height:10px;overflow:hidden">'
    +'<div style="width:'+score+'%;height:100%;background:'+verdictColor+';border-radius:6px"></div>'
    +'</div><span style="font-size:1.2em;font-weight:800;color:'+verdictColor+'">'+score+'</span>'
    +'<span style="font-size:.7em;color:#8b949e">/100</span></div>'
    +scoreBreakdown+'</div>';

  // ── Dòng tiền tổ chức ────────────────────────────────────────────────────
  var flowLines = [];
  if (!bb7.length) {
    flowLines.push('Chưa có dữ liệu dòng tiền tổ chức trong 7 ngày qua.');
  } else {
    if (bbConsec >= 3 && hasStrong)
      flowLines.push('🟢 <strong>'+bbConsec+' ngày liên tiếp</strong> tổ chức mua ròng với tín hiệu STRONG_BB — dấu hiệu tích lũy có hệ thống, rất tích cực.');
    else if (bbConsec >= 2)
      flowLines.push('🟡 Tổ chức mua <strong>'+bbConsec+' ngày liên tiếp</strong> — xu hướng dòng tiền đang hình thành, chờ xác nhận thêm.');
    else if (hasStrong)
      flowLines.push('🟢 Có <strong>'+nStrong+' phiên STRONG_BB</strong> trong 7 ngày — tổ chức đặt lệnh mua lớn ở vùng ATC, áp lực mua rõ ràng.');
    else if (hasBB)
      flowLines.push('🔵 Tín hiệu BB (mua vừa) xuất hiện — tổ chức có quan tâm nhưng chưa vào lệnh lớn. Theo dõi thêm.');
    else
      flowLines.push('🔵 Chỉ có WATCH_BB — tổ chức đang theo dõi, chưa vào lệnh tích lũy rõ ràng.');
    var avgLtr = bb7.reduce((a,b) => a+b.ltr_score, 0)/bb7.length;
    if (avgLtr > 70)
      flowLines.push('💪 LTR trung bình <strong>'+Math.round(avgLtr)+'</strong> — lực mua tổ chức mạnh, họ đang chủ động đẩy giá lên.');
    if (p5dChg !== null) {
      if (p5dChg > 5 && hasStrong)
        flowLines.push('⚠️ Giá đã tăng <strong>'+n1(p5dChg)+'%</strong> trong 5 phiên dù tổ chức vào — có thể họ đã vào sớm, cẩn thận mua đuổi.');
      else if (p5dChg < -3 && hasStrong)
        flowLines.push('✅ Giá giảm <strong>'+n1(Math.abs(p5dChg))+'%</strong> nhưng tổ chức vẫn mua — tích lũy vùng giá thấp, tín hiệu rất tích cực.');
    }
  }
  var flowHtml =
    '<div class="dm-section"><div class="dm-section-title">🐋 Dòng tiền tổ chức</div>'
    +'<div style="display:flex;flex-direction:column;gap:5px">'
    +flowLines.map(l => '<div style="font-size:.83em;color:#c9d1d9;padding:7px 10px;background:#21262d;border-radius:8px;line-height:1.55">'+l+'</div>').join('')
    +'</div></div>';

  // ── Kỹ thuật ─────────────────────────────────────────────────────────────
  var techLines = [];
  if (rsi !== null) {
    var rsiLabel = rsi > 70 ? 'quá mua — rủi ro điều chỉnh, chờ RSI về dưới 65'
      : rsi > 60 ? 'vùng mạnh, chưa quá mua — xu hướng tăng đang được xác nhận'
      : rsi >= 40 ? 'trung tính — chưa có xu hướng rõ, cần thêm tín hiệu'
      : rsi >= 30 ? 'vùng yếu — thận trọng, chờ phục hồi trên 40'
      : 'quá bán — có thể xảy ra phục hồi kỹ thuật ngắn hạn';
    var rsiCol = rsi > 70 ? '#f85149' : rsi > 55 ? '#3fb950' : rsi >= 40 ? '#d29922' : '#f85149';
    techLines.push('RSI = <strong style="color:'+rsiCol+'">'+n1(rsi)+'</strong> → '+rsiLabel+'.');
  }
  if (macdSig) {
    var macdTxt = macdSig === 'BUY'
      ? 'MACD cắt lên đường tín hiệu → <strong style="color:#3fb950">xu hướng tăng đang hình thành</strong>.'
      : macdSig === 'SELL'
      ? 'MACD cắt xuống → <strong style="color:#f85149">xu hướng giảm</strong>, nên thận trọng.'
      : 'MACD trung tính — chờ tín hiệu rõ hơn.';
    techLines.push(macdTxt);
  }
  if (closeP !== null && (ma20 !== null || ma50 !== null)) {
    var maParts = [];
    if (ma20 !== null) {
      var d20 = ((closeP - ma20)/ma20*100).toFixed(1);
      maParts.push((closeP >= ma20 ? '<strong style="color:#3fb950">trên MA20</strong>' : '<strong style="color:#f85149">dưới MA20</strong>')+' ('+d20+'%)');
    }
    if (ma50 !== null) {
      var d50 = ((closeP - ma50)/ma50*100).toFixed(1);
      maParts.push((closeP >= ma50 ? '<strong style="color:#3fb950">trên MA50</strong>' : '<strong style="color:#f85149">dưới MA50</strong>')+' ('+d50+'%)');
    }
    var a20 = ma20 !== null && closeP >= ma20, a50 = ma50 !== null && closeP >= ma50;
    var maConc = a20 && a50 ? ' → <strong style="color:#3fb950">Xu hướng tăng trung hạn được xác nhận.</strong>'
      : !a20 && !a50 ? ' → <strong style="color:#f85149">Xu hướng giảm — tránh mua mới.</strong>'

  }
  if (bbPos !== null) {

  var avgPE = SECT_PE[sector] || 15;

  if (pe !== null) {

    var peCol2 = pe < avgPE ? '#3fb950' : pe < avgPE*1.3 ? '#d29922' : '#f85149';

  } else {

  if (roe !== null) {
    var roeLabel = roe > 20 ? 'xuất sắc, tạo lợi nhuận rất hiệu quả.' : roe > 15 ? 'tốt, trên mức trung bình thị trường.' : roe > 8 ? 'chấp nhận được, mức trung bình.' : 'thấp, sử dụng vốn chưa hiệu quả.';
    var roeCol = roe > 15 ? '#3fb950' : roe > 8 ? '#d29922' : '#f85149';
    valLines.push('ROE = <strong style="color:'+roeCol+'">'+n1(roe)+'%</strong> — '+roeLabel);
  }
  var valHtml2 =
    '<div class="dm-section"><div class="dm-section-title">💰 Định giá</div>'
    +'<div style="display:flex;flex-direction:column;gap:5px">'
    +valLines.map(l => '<div style="font-size:.83em;color:#c9d1d9;padding:7px 10px;background:#21262d;border-radius:8px;line-height:1.55">'+l+'</div>').join('')
    +'</div></div>';

  // ── Rủi ro ───────────────────────────────────────────────────────────────
  var risks = [];
  if (rsi !== null && rsi > 70) risks.push('🔴 <strong>RSI quá mua ('+n1(rsi)+')</strong> — chờ RSI hạ về dưới 65 trước khi mua thêm.');
  if (p5dChg !== null && p5dChg > 10) risks.push('🔴 <strong>Giá tăng '+n1(p5dChg)+'% trong 5 phiên</strong> — nguy cơ mua đỉnh, chờ pullback.');
  if (!hasBB && !hasStrong) risks.push('🟡 <strong>Chưa có tín hiệu tổ chức</strong> — thiếu xác nhận dòng tiền lớn, chỉ mua nếu kỹ thuật rất tốt.');
  if (pe !== null && pe > avgPE*1.3) risks.push('🟡 <strong>Định giá cao (P/E '+n1(pe)+'x)</strong> — cần tăng trưởng EPS ổn định để hỗ trợ giá hiện tại.');
  if (ma20 !== null && closeP !== null && closeP < ma20) risks.push('🟡 <strong>Giá dưới MA20</strong> — xu hướng ngắn hạn đang yếu, rủi ro giảm tiếp.');
  if (bbPos !== null && bbPos > 85) risks.push('🔴 <strong>BB %B = '+n1(bbPos)+'%</strong> — giá ép sát dải trên Bollinger, thường dẫn tới điều chỉnh.');
  if (!risks.length) risks.push('🟢 Không có rủi ro bất thường nổi bật — các chỉ số đang ở mức hợp lý.');
  var riskHtml2 =
    '<div class="dm-section"><div class="dm-section-title">⚠️ Rủi ro cần lưu ý</div>'
    +'<div style="display:flex;flex-direction:column;gap:5px">'

    +'</div></div>';

  // ── Vùng giá ─────────────────────────────────────────────────────────────
  var priceZoneHtml = '';
  if (closeP !== null) {
    var supports = [ma20, ma50].filter(x => x !== null && x < closeP).sort((a,b) => b-a);
    var support  = supports[0] || closeP * 0.97;
    var stopLvl  = support * 0.97;
    var targetLvl = closeP * 1.13;
    var buyLo    = support * 0.995;
    var buyHi    = closeP * 1.01;
    var pD = v => Math.round(v * 1000).toLocaleString('vi-VN');
    priceZoneHtml =
      '<div class="dm-section"><div class="dm-section-title">🎯 Vùng giá tham khảo</div>'

      +'<div style="font-size:.65em;color:#3fb950;font-weight:700;margin-bottom:3px">✅ VÙNG MUA</div>'
      +'<div style="font-size:.88em;font-weight:700;color:#3fb950">'+pD(buyLo)+'–'+pD(buyHi)+'</div>'
      +'<div style="font-size:.62em;color:#8b949e;margin-top:2px">Gần hỗ trợ MA</div></div>'

      +'<div style="font-size:.65em;color:#f85149;font-weight:700;margin-bottom:3px">🛑 CẮT LỖ</div>'
      +'<div style="font-size:.88em;font-weight:700;color:#f85149">'+pD(stopLvl)+'</div>'
      +'<div style="font-size:.62em;color:#8b949e;margin-top:2px">Dưới hỗ trợ 3%</div></div>'
      +'<div style="background:#0c2d4a;border:1px solid #58a6ff66;border-radius:8px;padding:10px;text-align:center">'
      +'<div style="font-size:.65em;color:#58a6ff;font-weight:700;margin-bottom:3px">🚀 MỤC TIÊU</div>'
      +'<div style="font-size:.88em;font-weight:700;color:#58a6ff">'+pD(targetLvl)+'</div>'

      +'</div>';
  }

  return verdictCard + flowHtml + techHtml2 + valHtml2 + riskHtml2 + priceZoneHtml;
}

}

function showDetail(sym, focus) {

  const sf = (typeof SECTOR_FUND      !== 'undefined' && SECTOR_FUND[sym])      || null;

  window._detailCharts.forEach(c => { try { c.destroy(); } catch(e) {} });

  const exchange = (pd && pd.exchange) || '';

  const closeRaw = ph && ph.closes && ph.closes.length ? ph.closes[ph.closes.length-1] : (s ? s.close : null);
  const closeP = closeRaw || (pd && pd.close ? pd.close / 1000 : null); // price_history already in thousands
  const prevP  = ph && ph.closes && ph.closes.length >= 2 ? ph.closes[ph.closes.length-2] : null;
  const chgPct = (closeP && prevP) ? ((closeP - prevP) / prevP * 100) : null;
  const chgHtml = chgPct !== null
    ? '<span style="color:'+(chgPct>=0?'#3fb950':'#f85149')+'">'+(chgPct>=0?'▲':'▼')+' '+Math.abs(chgPct).toFixed(2)+'%</span>'

  // ── Section B: Price chart placeholder ──────────────────────────────────

  // ── Section C: Score trend placeholder ──────────────────────────────────
  const scoreHtml = sh
    ? '<div class="dm-section"><div class="dm-section-title">&#128202; Điểm kỹ thuật &amp; Momentum — 60 ngày</div>'+

      '<div style="position:relative;height:180px"><canvas id="dm-score-chart"></canvas></div>'+
      '<div id="dm-metrics-table"></div></div></div>'
    : '';

  // ── Commentary ───────────────────────────────────────────────────────────
  const commentHtml = (s && s.commentary)
    ? '<div class="dm-section"><div class="dm-section-title">&#128172; Nhận xét kỹ thuật</div>'+

      s.commentary+'</div></div>'
    : '';

  // ── Section D: Valuation placeholder ────────────────────────────────────
  const valHtml = sf
    ? '<div class="dm-section"><div class="dm-section-title">&#128181; Định giá — So sánh ngành</div>'+
      '<div id="dm-valuation"></div></div>'
    : '';

  // ── Section E: Technical indicators (from pd or s) ───────────────────────
  const rsi   = (pd && pd.rsi14 !== null && pd.rsi14 !== undefined) ? pd.rsi14 : (s ? s.rsi14 : null);
  const macdS = (pd && pd.macd_sig) ? pd.macd_sig : (s ? s.macd_signal : null);
  const bbPos = (pd && pd.bb_pos !== null && pd.bb_pos !== undefined) ? pd.bb_pos : null;
  var techHtml = '';
  if (rsi !== null || macdS !== null || bbPos !== null) {

    const rsiLbl = rsi !== null ? (rsi > 70 ? 'Quá mua' : rsi < 30 ? 'Quá bán' : 'Trung tính') : '';
    function techCell(label, val, col, note) {
      return '<div style="background:#21262d;border-radius:8px;padding:10px;text-align:center">'
        +'<div style="font-size:.7em;color:#8b949e;margin-bottom:4px">'+label+'</div>'
        +'<div style="font-size:1.1em;font-weight:700;color:'+(col||'#e6edf3')+'">'+val+'</div>'

        +'</div>';
    }
    techHtml = '<div class="dm-section"><div class="dm-section-title">📐 Chỉ báo kỹ thuật</div>'
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">'
      +(rsi !== null ? techCell('RSI(14)', rsi.toFixed(1), rsiCol, rsiLbl) : techCell('RSI(14)', 'N/A','#484f58',''))
      +(macdS ? techCell('MACD Signal', macdS, macdS==='BUY'?'#3fb950':macdS==='SELL'?'#f85149':'#d29922','') : techCell('MACD','N/A','#484f58',''))
      +(bbPos !== null ? techCell('BB %B', bbPos.toFixed(1)+'%', bbPos>80?'#f85149':bbPos<20?'#3fb950':'#58a6ff', bbPos>80?'Đỉnh BB':bbPos<20?'Đáy BB':'Trong BB') : techCell('BB %B','N/A','#484f58',''))
      +'</div></div>';
  }

  // ── Section F: Fundamentals ───────────────────────────────────────────────
  const pe  = (pd && pd.pe  !== null && pd.pe  !== undefined) ? pd.pe  : (s ? s.pe  : null);
  const roe = (pd && pd.roe !== null && pd.roe !== undefined) ? pd.roe : (s ? s.roe : null);

  if (bb7.length || bbConsec > 0) {

    whyHtml =

            '<th style="color:#8b949e;font-weight:600;text-align:right;padding:4px 4px;font-size:.78em">Tham chiếu</th>'+
          '</tr>'+
          mRows.map(([label, val, ref, color]) =>
            '<tr>'+
            '<td style="padding:5px 4px;color:#c9d1d9;font-size:.8em">'+label+'</td>'+
            '<td style="text-align:right;padding:5px 4px;font-weight:600;color:'+color+';font-size:.8em">'+val+'</td>'+
            '<td style="text-align:right;padding:5px 4px;color:#8b949e;font-size:.76em">'+ref+'</td>'+
            '</tr>'
          ).join('')+
          '</table>';
      }
    }

    // ── Valuation table ────────────────────────────────────────────────────
    if (sf) {
      const valEl = document.getElementById('dm-valuation');
      if (valEl) {
        const vRows = [
          ['P/E',  sf.pe,  sf.sector_pe,  false, 'x'],
          ['P/B',  sf.pb,  sf.sector_pb,  false, 'x'],
          ['ROE%', sf.roe, sf.sector_roe, true,  '%'],
        ];
        let tbl =
          '<table style="width:100%;border-collapse:collapse">'+
          '<tr style="border-bottom:1px solid #30363d">'+
            '<th style="color:#8b949e;text-align:left;padding:5px 6px;font-size:.78em"></th>'+
            '<th style="color:#8b949e;text-align:right;padding:5px 6px;font-size:.78em">'+sym+'</th>'+
            '<th style="color:#8b949e;text-align:right;padding:5px 6px;font-size:.78em">'+sector+' avg</th>'+
            '<th style="color:#8b949e;text-align:left;padding:5px 6px;font-size:.78em">Nhận xét</th>'+
          '</tr>';
        vRows.forEach(function(row) {
          const label=row[0], sv=row[1], secV=row[2], higherBetter=row[3], suffix=row[4];
          const str    = sv!=null    ? sv.toFixed(1)+suffix    : '—';
          const secStr = secV!=null  ? secV.toFixed(1)+suffix  : '—';
          const better = (sv!=null&&secV!=null) ? (higherBetter?sv>secV:sv<secV) : null;
          const color  = better===null?'#c9d1d9':(better?'#3fb950':'#f85149');
          const noteStr = better===null ? '—'
            : (label==='ROE%' ? (better?'✓ Tốt hơn ngành':'✗ Thấp hơn ngành')
                               : (better?'✓ Rẻ hơn ngành' :'✗ Đắt hơn ngành'));
          tbl +=
            '<tr>'+
            '<td style="padding:5px 6px;color:#c9d1d9;font-weight:600;font-size:.85em">'+label+'</td>'+
            '<td style="text-align:right;padding:5px 6px;font-weight:700;color:'+color+';font-size:.85em">'+str+'</td>'+
            '<td style="text-align:right;padding:5px 6px;color:#8b949e;font-size:.85em">'+secStr+'</td>'+
            '<td style="padding:5px 6px;font-size:.8em;color:'+(better===null?'#8b949e':(better?'#3fb950':'#f85149'))+'">'+noteStr+'</td>'+
            '</tr>';
        });
        tbl += '</table>';

        // Auto verdict
        const peOk  = sf.pe !=null && sf.sector_pe !=null && sf.pe  < sf.sector_pe;
        const pbOk  = sf.pb !=null && sf.sector_pb !=null && sf.pb  < sf.sector_pb;
        const roeOk = sf.roe!=null && sf.sector_roe!=null && sf.roe > sf.sector_roe;
        const goodCnt = [peOk,pbOk,roeOk].filter(Boolean).length;
        let verdict = '';
        if (goodCnt === 3) {
          verdict = sym+' đang giao dịch rẻ hơn trung bình ngành về cả P/E và P/B, trong khi ROE cao hơn — định giá hấp dẫn.';
        } else if (goodCnt >= 2) {
          const goods = [peOk?'P/E':'',pbOk?'P/B':'',roeOk?'ROE':''].filter(Boolean).join(', ');
          verdict = sym+' có '+goods+' tốt hơn ngành — định giá tương đối hấp dẫn.';
        } else if (goodCnt === 1) {
          const weak = [(!peOk&&sf.pe!=null)?'P/E':'',(!pbOk&&sf.pb!=null)?'P/B':'',(!roeOk&&sf.roe!=null)?'ROE':''].filter(Boolean).join(', ');
          verdict = sym+' định giá ở mức bình thường đến cao so với ngành'+(weak?' — đặc biệt '+weak+' cao hơn trung bình':'')+'.';
        } else if (sf.pe||sf.pb||sf.roe) {
          verdict = sym+' định giá cao hơn ngành trên hầu hết chỉ số — cần tăng trưởng tốt để hỗ trợ mức giá hiện tại.';
        }
        if (verdict) {
          tbl += '<div style="margin-top:10px;padding:10px;background:#21262d;border-radius:8px;font-size:.82em;'+
            'color:#c9d1d9;line-height:1.6;border-left:3px solid #d29922">'+verdict+'</div>';
        }
        valEl.innerHTML = tbl;
      }
    }

    // ── Scroll to BigBoy section if focus==='bigboy' ───────────────────────
    if (focus === 'bigboy') {
      setTimeout(function() {
        const bbSection = document.getElementById('detail-bb-section');
        if (bbSection) bbSection.scrollIntoView({behavior:'smooth', block:'start'});
      }, 100);
    }
  });
}

// ── BIGBOY DETAIL POPUP (riêng biệt — đọc từ MARKET_OVERVIEW.bigboy_patterns) ─
function showBigBoyDetail(sym) {
  // 1. Nguồn data
  const s  = STOCKS.find(x => x.sym === sym);
  const pd = (typeof MARKET_POPUP_DATA !== 'undefined' && MARKET_POPUP_DATA[sym]) || null;
  const bo = MARKET_OVERVIEW || {};

  // 2. BigBoy data từ MARKET_OVERVIEW (hoạt động cho CẢ universe và non-universe)
  const allBb7 = (bo.bigboy_patterns && bo.bigboy_patterns.all_7day) || [];
  const bb7    = allBb7.filter(function(b) { return b.symbol === sym; });
  const bb7Dates = [...new Set(bb7.map(function(b){return b.date;}) )];
  const bbConsec = bb7Dates.length;
  const hasStrongBb = bb7.some(function(b){return b.signal_type==='STRONG_BB';});
  const hasBb       = bb7.some(function(b){return b.signal_type!=='NORMAL';});

  // Also check today's signal from bigboy_today
  const todayBb = (bo.bigboy_today||[]).find(function(b){return b.sym===sym;}) || null;

  // 3. Company info
  const companyName = (s && s.name) || (pd && pd.name) || (todayBb && todayBb.company_name) || sym;
  const industry    = (todayBb && todayBb.industry) || (pd && pd.sector) || (s && s.sector) || '';
  const indVI       = industry.replace('ZN-','');

  // 4. Price
  const closeP = (s && s.close) ? s.close : (pd && pd.close ? pd.close/1000 : null);
  const price5dChg = pd ? (pd.price_5d_chg || null) : null;

  // 5. Technicals
  const rsi   = (pd && pd.rsi14 !== null && pd.rsi14 !== undefined) ? pd.rsi14 : (s ? s.rsi14 : null);
  const macdS = (pd && pd.macd_sig) ? pd.macd_sig : (s ? s.macd_signal : null);
  const bbPos = (pd && pd.bb_pos !== null && pd.bb_pos !== undefined) ? pd.bb_pos : null;

  // 6. Fundamentals
  const pe  = (pd && pd.pe  !== null) ? pd.pe  : (s ? s.pe  : null);
  const roe = (pd && pd.roe !== null) ? pd.roe : (s ? s.roe : null);
  const eps = (pd && pd.eps !== null) ? pd.eps : (s ? s.eps : null);

  // 7. Screener
  const scrScore  = (pd && pd.screener_score !== null) ? pd.screener_score : (s ? s.score  : null);
  const scrSignal = (pd && pd.screener_signal) ? pd.screener_signal : (s ? s.signal : null);

  // ── Verdict ──────────────────────────────────────────────────────────────────
  const isOverbought = rsi !== null && rsi > 70;
  const isPriceRunUp = price5dChg !== null && price5dChg > 10;
  const isFirstSignal = bbConsec <= 1 && hasBb;
  var verdictIcon='⚪', verdictLabel='CHƯA RÕ', verdictMsg='', verdictBg='#21262d', verdictBdr='#484f58';
  var riskWarnings = [];

  if (isOverbought)  riskWarnings.push('⚠️ <strong>RSI '+rsi.toFixed(0)+'</strong> — vùng quá mua');
  if (isPriceRunUp)  riskWarnings.push('⚠️ <strong>Giá tăng '+price5dChg.toFixed(1)+'% trong 5 phiên</strong> — rủi ro mua đỉnh');
  if (isFirstSignal) riskWarnings.push('ℹ️ <strong>Tín hiệu đầu tiên</strong> — chờ xác nhận 1-2 phiên');
  if (pe !== null && pe > 30) riskWarnings.push('⚠️ <strong>P/E='+pe.toFixed(1)+'x</strong> — định giá cao');

  if (hasStrongBb && bbConsec >= 2 && !isOverbought && !isPriceRunUp) {
    verdictIcon='🟢'; verdictLabel='NÊN QUAN TÂM'; verdictBg='#1a4731'; verdictBdr='#3fb950';
    verdictMsg = 'Tổ chức tích lũy '+(bbConsec>=3?bbConsec+' ngày liên tiếp':'có STRONG_BB')+' — dòng tiền xác nhận'+(isOverbought?', nhưng RSI cao — đợi pullback':'.') ;
  } else if (hasBb && !isOverbought) {
    verdictIcon='🟡'; verdictLabel='THEO DÕI THÊM'; verdictBg='#3d2c00'; verdictBdr='#d29922';
    verdictMsg = 'Có tín hiệu BigBoy nhưng '+(isFirstSignal?'mới xuất hiện lần đầu':'chưa đủ mạnh')+'. Chờ xác nhận 1-2 phiên.';
  } else if (hasBb && isOverbought) {
    verdictIcon='🟡'; verdictLabel='THẬN TRỌNG — ĐỢI PULLBACK'; verdictBg='#3d2c00'; verdictBdr='#d29922';
    verdictMsg = 'Tổ chức quan tâm nhưng RSI='+rsi.toFixed(0)+' — quá mua. Chờ giá về hỗ trợ.';
  } else if (!hasBb) {
    verdictIcon='⚪'; verdictLabel='CHƯA CÓ TÍN HIỆU TỔCHỨC'; verdictBg='#21262d'; verdictBdr='#484f58';
    verdictMsg = 'Không có tín hiệu BigBoy trong 7 ngày gần nhất.';
  }

  const signalCard =
    '<div style="background:'+verdictBg+';border:2px solid '+verdictBdr+';border-radius:12px;padding:14px 16px;margin-bottom:14px">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
    +'<span style="font-size:1.4em">'+verdictIcon+'</span>'
    +'<span style="font-size:.75em;font-weight:700;color:'+verdictBdr+';letter-spacing:1px;text-transform:uppercase">'+verdictLabel+'</span>'
    +'</div>'
    +'<div style="font-size:.88em;color:#e6edf3;line-height:1.6">'+verdictMsg+'</div>'
    +(riskWarnings.length
      ? '<div style="margin-top:8px;display:flex;flex-direction:column;gap:3px">'
        +riskWarnings.map(function(w){return '<div style="font-size:.78em;color:#c9d1d9;background:#0d111780;border-radius:6px;padding:4px 8px">'+w+'</div>';}).join('')+'</div>'
      : '')
    +'</div>';

  // ── 7-day visual timeline ──────────────────────────────────────────────────
  const sortedDates = bb7Dates.slice().sort();
  const boxes = sortedDates.map(function(d) {
    const row = bb7.find(function(b){return b.date===d;});
    if (!row) return '<div style="width:30px;height:30px;background:#21262d;border-radius:5px;border:1px solid #30363d" title="'+d+'"></div>';
    const isSt = row.signal_type==='STRONG_BB';
    const isBB = row.signal_type==='BB';
    const bg   = isSt?'#1a4731':isBB?'#3d2c00':'#0c2d4a';
    const bdr  = isSt?'#3fb950':isBB?'#d29922':'#58a6ff';
    const ico  = isSt?'★':isBB?'●':'○';
    return '<div style="width:30px;height:30px;background:'+bg+';border-radius:5px;border:2px solid '+bdr
      +';display:flex;align-items:center;justify-content:center;font-size:11px;color:'+bdr+';font-weight:700" '
      +'title="'+d+': '+row.signal_type+' (LTR '+row.ltr_score+')">'+ico+'</div>';
  }).join('');

  const timelineSection = (bb7.length || bbConsec > 0) ?
    '<div class="dm-section"><div class="dm-section-title">🐋 BigBoy signals — 7 ngày gần nhất</div>'
    +'<div style="display:flex;gap:4px;align-items:center;flex-wrap:wrap;margin-bottom:8px">'+boxes+'</div>'
    +'<div style="display:flex;gap:10px;margin-bottom:10px"><span style="font-size:.68em;color:#3fb950">★ STRONG_BB</span>'
    +'<span style="font-size:.68em;color:#d29922">● BB</span>'
    +'<span style="font-size:.68em;color:#58a6ff">○ WATCH</span></div>'
    +bb7.map(function(b) {
      const col=b.signal_type==='STRONG_BB'?'#3fb950':b.signal_type==='BB'?'#d29922':'#58a6ff';
      return '<div style="display:flex;align-items:center;gap:10px;padding:3px 0;border-bottom:1px solid #21262d">'
        +'<span style="font-size:.72em;color:#8b949e;min-width:70px">'+b.date+'</span>'
        +'<span style="font-size:.72em;background:'+col+'20;color:'+col+';border:1px solid '+col+'44;border-radius:4px;padding:1px 6px">'+b.signal_type+'</span>'
        +'<span style="font-size:.72em;color:#d29922;margin-left:auto">LTR '+b.ltr_score+'</span>'
        +'</div>';
    }).join('')
    +'</div>' : '';

  // ── "Tại sao tổ chức quan tâm?" ───────────────────────────────────────────
  var whyParts = [];
  if (hasBb) {
    if (bbConsec >= 3) whyParts.push('🔄 <strong>'+bbConsec+' ngày tín hiệu trong 7 ngày</strong> — tích lũy có hệ thống, không ngẫu nhiên');
    const avgLtr = bb7.length ? bb7.reduce(function(a,b){return a+(b.ltr_score||0);},0)/bb7.length : 0;
    if (avgLtr > 70)  whyParts.push('💪 LTR score trung bình <strong>'+avgLtr.toFixed(0)+'</strong> — tổ chức chủ động mua mạnh');
    if (pe !== null && pe < 15) whyParts.push('💰 P/E='+pe.toFixed(1)+'x <strong>thấp</strong> — định giá hấp dẫn');
    if (roe !== null && roe > 15) whyParts.push('📊 ROE='+roe.toFixed(1)+'% <strong>cao</strong> — sinh lời tốt trên vốn');
    const nSt = bb7.filter(function(b){return b.signal_type==='STRONG_BB';}).length;
    if (nSt >= 2) whyParts.push('🐋 <strong>'+nSt+' STRONG_BB</strong> — tổ chức đẩy giá mạnh, không phân phối');
  }
  const whySection = whyParts.length ?
    '<div class="dm-section"><div class="dm-section-title">🤔 Tại sao tổ chức quan tâm?</div>'
    +'<div style="display:flex;flex-direction:column;gap:5px">'
    +whyParts.map(function(p){return '<div style="font-size:.82em;color:#c9d1d9;padding:7px 10px;background:#21262d;border-radius:8px;line-height:1.5">'+p+'</div>';}).join('')
    +'</div></div>' : '';

  // ── Tech indicators (phụ trợ) ─────────────────────────────────────────────
  var techSection = '';
  if (rsi !== null || macdS !== null || bbPos !== null || price5dChg !== null) {
    const rsiCol = rsi !== null ? (rsi>70?'#f85149':rsi<30?'#3fb950':'#d29922') : '#8b949e';
    const rsiLbl = rsi !== null ? (rsi>70?'Quá mua':rsi<30?'Quá bán':'Trung tính') : '';
    function tCell(lbl, val, col, note) {
      return '<div style="background:#21262d;border-radius:8px;padding:8px;text-align:center">'
        +'<div style="font-size:.7em;color:#8b949e;margin-bottom:3px">'+lbl+'</div>'
        +'<div style="font-size:1em;font-weight:700;color:'+(col||'#e6edf3')+'">'+val+'</div>'
        +(note?'<div style="font-size:.65em;color:#8b949e;margin-top:1px">'+note+'</div>':'')
        +'</div>';
    }
    techSection = '<div class="dm-section"><div class="dm-section-title">📐 Kỹ thuật</div>'
      +'<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:6px">'
      +(rsi!==null?tCell('RSI(14)',rsi.toFixed(1),rsiCol,rsiLbl):tCell('RSI','N/A','#484f58',''))
      +(macdS?tCell('MACD',macdS,macdS==='BUY'?'#3fb950':macdS==='SELL'?'#f85149':'#d29922',''):'')
      +(bbPos!==null?tCell('BB %B',bbPos.toFixed(1)+'%',bbPos>80?'#f85149':bbPos<20?'#3fb950':'#58a6ff',bbPos>80?'Đỉnh BB':bbPos<20?'Đáy BB':'Trong BB'):'')
      +(price5dChg!==null?tCell('5 phiên',(price5dChg>0?'+':'')+price5dChg.toFixed(1)+'%',price5dChg>0?'#3fb950':'#f85149','Thay đổi giá'):'')
      +'</div></div>';
  }

  // ── Fundamentals (phụ trợ) ────────────────────────────────────────────────
  var fundSection = '';
  if (pe !== null || roe !== null || eps !== null) {
    fundSection = '<div class="dm-section"><div class="dm-section-title">💰 Cơ bản</div>'
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px">'
      +(pe!==null?'<div style="background:#21262d;border-radius:8px;padding:8px;text-align:center"><div style="font-size:.7em;color:#8b949e">P/E</div><div style="font-size:1em;font-weight:700;color:#d29922">'+pe.toFixed(1)+'x</div><div style="font-size:.65em;color:#8b949e">'+(pe<15?'Rẻ':pe>25?'Đắt':'Bình thường')+'</div></div>':'')
      +(roe!==null?'<div style="background:#21262d;border-radius:8px;padding:8px;text-align:center"><div style="font-size:.7em;color:#8b949e">ROE</div><div style="font-size:1em;font-weight:700;color:#d29922">'+roe.toFixed(1)+'%</div><div style="font-size:.65em;color:#8b949e">'+(roe>15?'Tốt':roe>8?'Khá':'Thấp')+'</div></div>':'')
      +(eps!==null?'<div style="background:#21262d;border-radius:8px;padding:8px;text-align:center"><div style="font-size:.7em;color:#8b949e">EPS</div><div style="font-size:1em;font-weight:700;color:#d29922">'+eps.toLocaleString('vi-VN')+'</div></div>':'')
      +'</div></div>';
  }

  // ── Screener ──────────────────────────────────────────────────────────────
  var scrSection = '';
  if (scrScore !== null) {
    const sCol = scrSignal==='BUY'?'#3fb950':scrSignal==='WATCH'?'#d29922':'#484f58';
    scrSection = '<div class="dm-section"><div class="dm-section-title">🎯 Screener</div>'
      +'<div style="display:flex;align-items:center;gap:10px">'
      +'<div style="flex:1;background:#21262d;border-radius:6px;height:8px;overflow:hidden"><div style="width:'+scrScore+'%;height:100%;background:'+sCol+'"></div></div>'
      +'<span style="font-size:.9em;font-weight:700;color:'+sCol+'">'+scrScore+'/100</span>'
      +(scrSignal?'<span style="font-size:.75em;background:'+sCol+'20;color:'+sCol+';border:1px solid '+sCol+'44;border-radius:6px;padding:2px 8px">'+scrSignal+'</span>':'')
      +'</div></div>';
  }

  // ── Render ────────────────────────────────────────────────────────────────
  const mc = document.getElementById('dm-content');
  if (!mc) return;
  const priceStr = closeP !== null ? (closeP*1000).toLocaleString('vi-VN')+'đ' : '—';
  mc.innerHTML = buildStockVerdict(sym);

  document.getElementById('detail-modal').style.display = 'block';
}

// ── NEWS TAB ──────────────────────────────────────────────────────────────────
function buildNewsChips() {
  const bar = document.getElementById('news-sector-chips');
  const first = bar.children[0]; // "Tat ca" chip
  bar.innerHTML = '';
  bar.appendChild(first);
  first.className = 'chip' + (activeNewsSector==='ALL' ? ' active' : '');
  Object.keys(SECTOR_NEWS).forEach(sec => {
    const chip = document.createElement('span');
    chip.className = 'chip' + (activeNewsSector===sec ? ' active' : '');
    chip.textContent = sec;
    chip.onclick = function() { filterNewsSector(sec, this); };
    bar.appendChild(chip);
  });
}

function filterNewsSector(sec, el) {
  activeNewsSector = sec;
  activeNewsSymbol = null;
  document.querySelectorAll('#news-sector-chips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('news-clear-btn').style.display = 'none';
  renderNews();
}

function clearNewsFilter() {
  activeNewsSymbol = null;
  activeNewsSector = 'ALL';
  document.getElementById('news-search').value = '';
  document.getElementById('news-clear-btn').style.display = 'none';
  document.querySelectorAll('#news-sector-chips .chip').forEach(c=>c.classList.remove('active'));
  const allChip = document.querySelector('#news-sector-chips .chip');
  if (allChip) allChip.classList.add('active');
  renderNews();
}

function renderNews() {
  const q = (document.getElementById('news-search').value||'').toLowerCase();
  const clearBtn = document.getElementById('news-clear-btn');
  const list = document.getElementById('news-list');
  const empty = document.getElementById('news-empty');

  // Case 1: Sector chip selected — show sector news from SECTOR_NEWS
  if (activeNewsSector !== 'ALL' && !activeNewsSymbol) {
    const secNews = SECTOR_NEWS[activeNewsSector] || [];
    let filtered = secNews;
    if (q) filtered = filtered.filter(n=>(n.title||'').toLowerCase().includes(q));
    clearBtn.style.display = 'none';
    if (!filtered.length) { list.innerHTML=''; empty.style.display=''; return; }
    empty.style.display = 'none';
    list.innerHTML = filtered.map(n =>
      '<div class="news-item-main">'+
      '<span style="font-size:.7em;color:#58a6ff;margin-right:6px;font-weight:600;padding:1px 7px;border-radius:8px;background:#58a6ff22;border:1px solid #58a6ff44">'+activeNewsSector+'</span>'+
      '<span class="news-date-main">'+(n.date||'')+'</span>'+
      '<span class="news-title-main">'+(n.link?'<a href="'+n.link+'" target="_blank">'+n.title+'</a>':n.title)+'</span>'+
      '</div>'
    ).join('');
    return;
  }

  // Case 2: All stocks news (with optional symbol filter)
  let allNews = [];
  STOCKS.forEach(s => {
    if (s.news && s.news.length) {
      s.news.forEach(n => allNews.push({sym:s.sym, sector:s.sector, ...n}));
    }
  });
  allNews.sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  let filtered = allNews;
  if (activeNewsSymbol) {
    filtered = filtered.filter(n=>n.sym===activeNewsSymbol);
    clearBtn.style.display = '';
    clearBtn.textContent = '✕ Xoa loc: '+activeNewsSymbol;
  } else {
    clearBtn.style.display = 'none';
  }
  if (q) {
    filtered = filtered.filter(n=>(n.title||'').toLowerCase().includes(q)||(n.sym||'').toLowerCase().includes(q));
  }

  if (!filtered.length) { list.innerHTML=''; empty.style.display=''; return; }
  empty.style.display = 'none';
  list.innerHTML = filtered.map(n => {
    const badge = '<span class="news-sym-badge" data-sym="'+n.sym+'" onclick="event.stopPropagation();filterNewsBySym(this.dataset.sym)">'+n.sym+'</span>';
    const sectorBadge = '<span style="font-size:.7em;color:#8b949e;margin-right:6px">'+n.sector+'</span>';
    return '<div class="news-item-main">'+
      badge+sectorBadge+'<span class="news-date-main">'+n.date+'</span>'+
      '<span class="news-title-main">'+(n.link?'<a href="'+n.link+'" target="_blank">'+n.title+'</a>':n.title)+'</span>'+
    '</div>';
  }).join('');
}

function filterNewsBySym(sym) {
  activeNewsSymbol = sym;
  activeNewsSector = 'ALL';
  document.querySelectorAll('#news-sector-chips .chip').forEach(c=>c.classList.remove('active'));
  const allChip = document.querySelector('#news-sector-chips .chip');
  if (allChip) allChip.classList.add('active');
  renderNews();
}

// ── CHART + INIT ──────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  // Render market tab on load (first tab)
  renderMarket();
  window._marketRendered = true;
});

// keyboard ESC closes panel
document.addEventListener('keydown', e => { if (e.key==='Escape') closeDetail(); });
</script>

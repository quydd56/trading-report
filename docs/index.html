// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(v, dec=0) {
  if (v==null||isNaN(v)) return '—';
  return v.toLocaleString('vi-VN', {minimumFractionDigits:dec,maximumFractionDigits:dec});
}
function fmtPct(v) {
  if (v==null||isNaN(v)) return '—';
  return v.toFixed(1)+'%';
}
function fmtSign(v, dec=3) {
  if (v==null||isNaN(v)) return '—';
  return (v>0?'+':'')+v.toFixed(dec);
}
function colorClass(v, goodAbove=0) {
  if (v==null||isNaN(v)) return '';
  return v > goodAbove ? 'up' : (v < goodAbove ? 'dn' : '');
}
function signalBadge(sig) {
  const cls = sig==='BUY'?'badge-buy':(sig==='WATCH'?'badge-watch':'badge-skip');
  return '<span class="s-badge '+cls+'">'+sig+'</span>';
}
function bbBadge(bb) {
  if (!bb||bb==='NORMAL') return '';
  const m = {STRONG_BB:'#3fb950',BB:'#d29922',WATCH_BB:'#58a6ff',VOL_SURGE:'#a371f7'};
  const c = m[bb]||'#8b949e';
  return '<span style="font-size:.65em;font-weight:700;padding:1px 6px;border-radius:8px;'
    +'background:'+c+'22;color:'+c+';border:1px solid '+c+';margin-left:4px">'+bb.replace('_',' ')+'</span>';
}
function scoreBar(score) {
  const color = score>=70?'#3fb950':(score>=50?'#d29922':'#8b949e');
  return '<div class="score-bar-wrap"><div class="score-bar" style="width:'+score+'%;background:'+color+'"></div><span>'+score+'</span></div>';
}
function peColor(pe) {
  if (!pe||isNaN(pe)) return '';
  return pe<12?'fund-val-good':(pe<22?'':'fund-val-bad');
}
function roeColor(roe) {
  if (!roe||isNaN(roe)) return '';
  return roe>18?'fund-val-good':(roe>10?'':'fund-val-bad');
}
function truncate(s, n=60) {
  if (!s) return '';
  return s.length>n?s.slice(0,n)+'...':s;
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.mnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if (btn) btn.classList.add('active');
  if (id === 'market' && !window._marketRendered) { renderMarket(); window._marketRendered=true; }
  if (id === 'opportunity' && !window._oppRendered) { renderOpportunity(); window._oppRendered=true; }
  if (id === 'bigboy' && !window._bbRendered) { renderBigboyTab(); renderForeignFlowSection(); window._bbRendered=true; }
  if (id === 'news' && !window._newsRendered) { renderNewsTab(); window._newsRendered=true; }
  if (id === 'portfolio' && !window._portfolioRendered) { renderPortfolioTab(); window._portfolioRendered=true; }
  // Lưu tab vào URL hash để navigate ngày giữ nguyên tab
  try { history.replaceState(null,'','#tab-'+id); } catch(e) {}
  _syncDateChipHashes();
}
function _syncDateChipHashes() {
  var h = window.location.hash.match(/^#tab-[\w]+/) ? window.location.hash : '';
  document.querySelectorAll('.date-chip[href]').forEach(function(a) {
    var base = a.getAttribute('href').split('#')[0];
    a.setAttribute('href', base + h);
  });
}
document.addEventListener('DOMContentLoaded', function() {
  // ── Restore global filter từ sessionStorage ───────────────────────────────
  try {
    var savedSector = sessionStorage.getItem('_gSector');
    var savedStock  = sessionStorage.getItem('_gStock');
    if (savedSector) _gSector = savedSector;
    if (savedStock)  _gStock  = savedStock;
  } catch(e) {}

  // ── Build filter bar chips sau khi OPPORTUNITY_LIST loaded ─────────────────
  buildGlobalFilterBar();

  // ── Apply saved filter UI state ─────────────────────────────────────────────
  if (_gSector !== 'all' || _gStock) {
    var sel = document.getElementById('gf-sector-select');
    if (sel) sel.value = _gSector;
    var inp = document.getElementById('gf-stock');
    if (inp && _gStock) inp.value = _gStock;
    var clearBtn = document.getElementById('gf-clear');
    if (clearBtn) clearBtn.style.display = '';
    var badge = document.getElementById('gf-active-badge');
    if (badge) { badge.textContent = '→ '+(_gStock||_gSector); badge.style.display=''; }
  }

  // ── Restore tab + scroll từ sessionStorage khi đổi ngày ──────────────────
  var didRestore = false;
  try {
    var rt = sessionStorage.getItem('_restoreTab');
    var rs = sessionStorage.getItem('_restoreScroll');
    if (rt) {
      sessionStorage.removeItem('_restoreTab');
      sessionStorage.removeItem('_restoreScroll');
      var rBtn = null;
      document.querySelectorAll('.mnav-btn').forEach(function(b) {
        if ((b.getAttribute('onclick')||'').indexOf("'" + rt + "'") >= 0) rBtn = b;
      });
      if (rBtn) { switchTab(rt, rBtn); didRestore = true; }
      if (rs) setTimeout(function() { window.scrollTo(0, parseInt(rs)||0); }, 150);
    }
  } catch(e) {}

  if (!didRestore) {
    // Restore tab từ hash khi load trang bình thường
    var m = window.location.hash.match(/^#tab-([\w]+)/);
    if (m) {
      var id = m[1];
      var btn = null;
      document.querySelectorAll('.mnav-btn').forEach(function(b) {
        if ((b.getAttribute('onclick')||'').indexOf("'" + id + "'") >= 0) btn = b;
      });
      if (btn) switchTab(id, btn);
    } else {
      // Mặc định: render market tab khi load fresh
      var defBtn = document.querySelector('.mnav-btn');
      switchTab('market', defBtn);
    }
  }
  _syncDateChipHashes();

  // Lưu tab + scroll + filter trước khi navigate sang ngày khác
  document.querySelectorAll('.date-chip[href]').forEach(function(a) {
    a.addEventListener('click', function() {
      try {
        var h = window.location.hash.match(/^#tab-([\w]+)/);
        sessionStorage.setItem('_restoreTab', h ? h[1] : 'market');
        sessionStorage.setItem('_restoreScroll', window.scrollY);
        sessionStorage.setItem('_gSector', _gSector);
        sessionStorage.setItem('_gStock',  _gStock);
      } catch(e) {}
    });
  });
});

function getUniqueSectors() {

function buildSectorChips(containerId, clickFn) {
  const secs = getUniqueSectors();
  const bar = document.getElementById(containerId);

  const first = bar.children[0];
  bar.innerHTML = '';
  bar.appendChild(first);
  secs.forEach(sec => {

// ── Sort utility ──────────────────────────────────────────────────────────────
function sortTable(tbl, col) {
  const st = tbl==='scr' ? sortScr : sortFund;
  if (st.col===col) { st.dir *= -1; } else { st.col=col; st.dir=-1; }
  if (tbl==='scr') renderScreener(); else renderFundamentals();
}

function applySortHeaders(tbl, prefixMap) {
  const st = tbl==='scr' ? sortScr : sortFund;
  Object.entries(prefixMap).forEach(([col, thId]) => {
    const th = document.getElementById(thId);
    if (!th) return;
    th.classList.remove('sort-asc','sort-desc');
    const icon = th.querySelector('.sort-icon');
    if (st.col===col) {
      th.classList.add(st.dir>0?'sort-asc':'sort-desc');
      if (icon) icon.innerHTML = st.dir>0 ? '&#9650;' : '&#9660;';
    } else {
      if (icon) icon.innerHTML = '&#8597;';
    }
  });
}

function doSort(arr, col, dir) {
  return [...arr].sort((a,b) => {
    const av = a[col], bv = b[col];
    if (av==null && bv==null) return 0;
    if (av==null) return 1;
    if (bv==null) return -1;
    return dir * (av > bv ? 1 : av < bv ? -1 : 0);
  });
}

function _sentColor(s) {{
  if (s === null || s === undefined) return '#8b949e';
  return s <= -0.2 ? '#f85149' : s >= 0.2 ? '#3fb950' : s < 0 ? '#d29922' : '#58a6ff';
}}
function _sentLabel(s) {{
  if (s === null || s === undefined) return 'N/A';
  if (s <= -0.3) return '😟 Tiêu cực';
  if (s <= -0.1) return '😐 Thiên tiêu cực';
  if (s >=  0.3) return '😊 Tích cực';
  if (s >=  0.1) return '🙂 Thiên tích cực';
  return '😶 Trung tính';
}}
function _sentBar(s, total, pos, neg) {{
  if (!total) return '';
  const posW = Math.round((pos/total)*100);
  const negW = Math.round((neg/total)*100);
  const neuW = 100 - posW - negW;
  return '<div style="display:flex;height:4px;border-radius:2px;overflow:hidden;margin:6px 0 8px">'
    +'<div style="width:'+posW+'%;background:#3fb950"></div>'
    +'<div style="width:'+neuW+'%;background:#484f58"></div>'
    +'<div style="width:'+negW+'%;background:#f85149"></div>'
    +'</div>';
}}

  'ZN-LOGISTICS':'Logistics','ZN-NUOC':'Nước sạch',

  'ZN-DULICH':'Du lịch','ZN-GIAODUL':'Giáo dục','ZN-GIAODUC':'Giáo dục','ZN-BACSY':'Y tế',
  'ZN-TANGHOA':'Tổng hợp','ZN-TRUNGGIAN':'Trung gian TC',

};
function viSector(raw) {
  if (!raw) return 'Khác';
  const t = raw.trim();
  if (SECTOR_VI[t]) return SECTOR_VI[t];
  const parts = t.split('-');
  if (parts.length > 1) {
    const suffix = parts.slice(1).join('-');
    for (const [k,v] of Object.entries(SECTOR_VI)) { if (k.endsWith('-'+suffix)) return v; }
  }
  return t.replace(/^ZN-/,'').replace(/-/g,' ');
}

function renderMarket() {
  const d = MARKET_OVERVIEW;
  if (!d) {
    document.getElementById('market-overview-content').innerHTML = '<div style="padding:40px;text-align:center;color:#8b949e">Không có dữ liệu thị trường</div>';
    return;
  }

  // ── Helpers ───────────────────────────────────────────────────────────────
  function mkCard(title, body, mt) {
    return '<div class="card" style="margin-top:'+(mt||0)+'px"><div class="card-title">'+title+'</div>'+body+'</div>';
  }
  function chgColor(v) { return v > 0 ? '#3fb950' : v < 0 ? '#f85149' : '#8b949e'; }
  function chgArrow(v) { return v > 0 ? '▲' : v < 0 ? '▼' : '—'; }
  function pctSpan(v, decimals) {
    if (v === null || v === undefined) return '<span style="color:#484f58">N/A</span>';
    return '<span style="color:'+chgColor(v)+';font-weight:600">'+chgArrow(v)+' '+Math.abs(v).toFixed(decimals||2)+'%</span>';
  }
  function numFmt(v, dec) { return (v!==null&&v!==undefined)?v.toLocaleString('vi-VN',{minimumFractionDigits:dec||0,maximumFractionDigits:dec||0}):'—'; }

  // ── 0. COMMENTARY (nhận định tiếng Việt — rule-based) ────────────────────
  const commentaryHtml  = d.commentary_html  || '';   // full detail
  // Fallback text nếu commentary_brief rỗng (run lần đầu hoặc generate_market_commentary fail)
  const _briefFallback =
    d.market_regime === 'TÍCH CỰC'
      ? '<div style="background:#1a4731;border:3px solid #3fb950;border-radius:14px;padding:20px 22px;margin-bottom:16px"><div style="font-size:1.25em;font-weight:800;color:#3fb950;margin-bottom:8px">✅ TÍCH CỰC</div><div style="font-size:1em;line-height:1.8;color:#e6edf3">Thị trường đang trong xu hướng tích cực. Ưu tiên xem xét các cổ phiếu có tín hiệu BUY — đặc biệt các mã đang có dòng tiền tổ chức vào.</div></div>'
      : d.market_regime === 'TIÊU CỰC'
      ? '<div style="background:#3d0f0f;border:3px solid #f85149;border-radius:14px;padding:20px 22px;margin-bottom:16px"><div style="font-size:1.25em;font-weight:800;color:#f85149;margin-bottom:8px">⚠️ TIÊU CỰC</div><div style="font-size:1em;line-height:1.8;color:#e6edf3">Thị trường đang yếu. Hạn chế mở vị thế mới, ưu tiên bảo vệ danh mục hiện tại. Chờ tín hiệu phục hồi rõ ràng hơn trước khi hành động.</div></div>'
      : '<div style="background:#3d2c00;border:3px solid #d29922;border-radius:14px;padding:20px 22px;margin-bottom:16px"><div style="font-size:1.25em;font-weight:800;color:#d29922;margin-bottom:8px">🟡 THẬN TRỌNG</div><div style="font-size:1em;line-height:1.8;color:#e6edf3">Thị trường đang phân hóa, chưa có xu hướng rõ ràng. Chọn lọc kỹ trước khi vào tiền — ưu tiên các mã có tín hiệu tổ chức xác nhận.</div></div>';
  const commentaryBrief = d.commentary_brief || _briefFallback;

  // ── 1. REGIME BANNER ─────────────────────────────────────────────────────
  const regimeColor = d.market_regime === 'TÍCH CỰC' ? '#3fb950' : d.market_regime === 'TIÊU CỰC' ? '#f85149' : '#d29922';
  const regimeBg    = d.market_regime === 'TÍCH CỰC' ? '#1a4731' : d.market_regime === 'TIÊU CỰC' ? '#3d0f0f' : '#3d2c00';
  const regimeBanner =
    '<div style="background:'+regimeBg+';border:1px solid '+regimeColor+';border-radius:12px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:20px;flex-wrap:wrap">'
    +'<div><div style="font-size:.72em;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px">Trạng thái thị trường</div>'
    +'<div style="font-size:1.6em;font-weight:800;color:'+regimeColor+'">'+(d.market_regime||'THẬN TRỌNG')+'</div></div>'
    +'<div style="flex:1;min-width:200px"><div style="font-size:.88em;color:#c9d1d9">'+(d.regime_reason||'')+'</div>'
    +(d.rsi_note?'<div style="margin-top:4px;font-size:.78em;color:#8b949e">'+d.rsi_note+'</div>':'')
    +'</div></div>';

  // ── 2. VN-INDEX KEY LEVELS ───────────────────────────────────────────────
  const vl = d.vni_levels || {};
  function levelRow(label, value, pct, above) {
    const col = pct > 0 ? '#3fb950' : pct < 0 ? '#f85149' : '#8b949e';
    const ma_badge = (above !== undefined) ? (above ? '<span style="font-size:.68em;color:#3fb950;margin-left:6px">TRÊN</span>' : '<span style="font-size:.68em;color:#f85149;margin-left:6px">DƯỚI</span>') : '';
    return '<tr><td style="padding:6px 10px;color:#8b949e;font-size:.82em">'+label+ma_badge+'</td>'
      +'<td style="padding:6px 10px;text-align:right;font-weight:600;color:#e6edf3">'+numFmt(value,2)+'</td>'
      +'<td style="padding:6px 10px;text-align:right;color:'+col+';font-size:.82em">'+(pct!==null&&pct!==undefined?chgArrow(pct)+' '+Math.abs(pct).toFixed(2)+'%':'—')+'</td></tr>';
  }
  const vniLevelsHtml = (vl.last) ? mkCard('📊 VN-Index — Các mức kỹ thuật quan trọng',
    '<table style="width:100%;border-collapse:collapse">'
    +'<thead><tr style="border-bottom:1px solid #21262d"><th style="padding:4px 10px;font-size:.7em;color:#8b949e;font-weight:600;text-align:left">Mức</th><th style="text-align:right;padding:4px 10px;font-size:.7em;color:#8b949e;font-weight:600">Giá trị</th><th style="text-align:right;padding:4px 10px;font-size:.7em;color:#8b949e;font-weight:600">Khoảng cách</th></tr></thead>'
    +'<tbody>'
    +levelRow('Hiện tại', vl.last, null)
    +levelRow('MA20 (trung bình 20 ngày)', vl.ma20, vl.pct_from_ma20, vl.above_ma20)
    +levelRow('MA50 (trung bình 50 ngày)', vl.ma50, vl.pct_from_ma50, vl.above_ma50)
    +levelRow('MA200 (trung bình 200 ngày)', vl.ma200, vl.pct_from_ma200, vl.above_ma200)
    +levelRow('52W High (cao nhất 52 tuần)', vl.w52_high, vl.pct_from_52h)
    +levelRow('52W Low (thấp nhất 52 tuần)', vl.w52_low, vl.pct_from_52l)
    +'</tbody></table>') : '';

  // ── 3. CHART VNI ─────────────────────────────────────────────────────────
  const vniChartHtml = mkCard('VN-Index 30 ngày gần nhất',
    '<div class="chart-wrap"><canvas id="mkt-vni-chart"></canvas></div>');

  // ── 4. MACRO QUOC TE ─────────────────────────────────────────────────────
  const md = MACRO_DATA || {};
  function macroItem(label, value, chgPct, note, unit, interpret) {
    const u = unit || '';
    const valStr = value !== null && value !== undefined ? numFmt(value, u==='%'?2:0)+u : '—';
    // interpret: câu giải thích ngắn dựa trên chgPct
    const interStr = interpret || '';
    return '<div class="macro-item" style="background:#21262d;border-radius:8px;padding:10px 12px;min-height:80px;overflow:hidden">'
      +'<div class="macro-label" style="font-size:.72em;color:#8b949e;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+label+'</div>'
      +'<div class="macro-number" style="font-size:1em;font-weight:700;color:#e6edf3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+valStr+'</div>'
      +(chgPct!==null&&chgPct!==undefined?'<div style="font-size:.78em;color:'+chgColor(chgPct)+'">'+chgArrow(chgPct)+' '+Math.abs(chgPct).toFixed(2)+'%</div>':'')
      +(interStr?'<div class="macro-interp" style="font-size:.72em;color:#8b949e;margin-top:3px;line-height:1.4">'+interStr+'</div>'
         :(note?'<div style="font-size:.7em;color:#8b949e;margin-top:2px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+note+'</div>':''))
      +'</div>';
  }
  // Tạo câu giải thích tự động cho từng chỉ số
  function macroInterp(key, chgPct) {
    if (chgPct === null || chgPct === undefined) return '';
    if (key === 'sp500' || key === 'nasdaq') {
      return chgPct > 1 ? 'Phố Wall tăng tốt — tâm lý lạc quan' : chgPct > 0 ? 'Phố Wall tăng nhẹ — ổn định' : chgPct > -1 ? 'Phố Wall giảm nhẹ — thận trọng' : 'Phố Wall giảm mạnh — rủi ro tăng';
    }
    if (key === 'tnx') {
      return chgPct > 0.5 ? 'Yield tăng — vốn rút khỏi EM, bất lợi' : chgPct < -0.5 ? 'Yield giảm — vốn vào EM thuận lợi' : 'Yield ổn định — trung tính';
    }
    if (key === 'dxy') {
      return chgPct > 0.5 ? 'USD mạnh — bất lợi cho thị trường mới nổi' : chgPct < -0.5 ? 'USD yếu — thuận lợi cho dòng vốn EM' : 'USD ổn định';
    }
    if (key === 'gold_usd') {
      return chgPct > 1 ? 'Vàng tăng — nhà đầu tư đang phòng thủ' : chgPct < -1 ? 'Vàng giảm — bớt lo ngại rủi ro' : 'Vàng ổn định';
    }
    if (key === 'usd_vnd' || key === 'usd_sell') {
      return 'Tỷ giá hối đoái — ' + (chgPct > 0.3 ? 'VND đang yếu đi' : chgPct < -0.3 ? 'VND đang mạnh lên' : 'VND đang ổn định');
    }
    if (key === 'copper') {
      return chgPct > 1 ? 'Đồng tăng — kỳ vọng tăng trưởng toàn cầu' : chgPct < -1 ? 'Đồng giảm — lo ngại KT chậm lại' : '';
    }
    return '';
  }
  function getChg(key) { return md[key] ? md[key].chg_pct : null; }
  function getLast(key) { return md[key] ? md[key].last : null; }

  // USD/VND: prefer Vietcombank data, fallback to Yahoo
  const usdVndVal = md.usd_sell || (md.usd_vnd ? md.usd_vnd.last : null);
  const usdVndChg = md.usd_vnd ? md.usd_vnd.chg_pct : null;

  const macroGrid =
    '<div class="macro-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;margin-bottom:12px">'
    // Mỹ
    +macroItem('🇺🇸 S&P 500', getLast('sp500'), getChg('sp500'), '', '', macroInterp('sp500', getChg('sp500')))
    +macroItem('📈 NASDAQ', getLast('nasdaq'), getChg('nasdaq'), '', '', macroInterp('nasdaq', getChg('nasdaq')))
    +macroItem('🇺🇸 US 10Y Yield', getLast('tnx'), getChg('tnx'), '', '%', macroInterp('tnx', getChg('tnx')))
    // Châu Á
    +macroItem('🇨🇳 Shanghai SSE', getLast('sse'), getChg('sse'), 'Thị trường TQ', '')
    +macroItem('🇯🇵 Nikkei 225', getLast('nikkei'), getChg('nikkei'), 'Thị trường JP', '')
    +macroItem('🇭🇰 Hang Seng', getLast('hsi'), getChg('hsi'), 'Thị trường HK', '')
    // Hàng hóa & FX
    +macroItem('🥇 Vàng USD/oz', getLast('gold_usd'), getChg('gold_usd'), '', '', macroInterp('gold_usd', getChg('gold_usd')))
    +macroItem('🛢️ Dầu WTI $/bbl', getLast('oil_wti'), getChg('oil_wti'), 'Chi phí sản xuất', '')
    +macroItem('🔴 Đồng (Copper)', getLast('copper'), getChg('copper'), '', '', macroInterp('copper', getChg('copper')))
    +macroItem('💵 DXY (USD Index)', md.dxy ? md.dxy.last : null, md.dxy ? md.dxy.chg_pct : null, '', '', macroInterp('dxy', md.dxy ? md.dxy.chg_pct : null))
    +macroItem('🇻🇳 USD/VND', usdVndVal, usdVndChg, '', '', macroInterp('usd_sell', usdVndChg))
    +(md.gold_sell?macroItem('🇻🇳 Vàng SJC (tr/lượng)', md.gold_sell, null, 'Vietcombank sell', ''):'')
    +'</div>';

  // Macro signal tong hop
  const sp500Chg  = getChg('sp500')  || 0;
  const dxyChg    = getChg('dxy')    || 0;
  const goldChg   = getChg('gold_usd') || 0;
  const tnxChg    = getChg('tnx')    || 0;
  const copperChg = getChg('copper') || 0;
  const macroSignals = [];
  if (sp500Chg > 1 && dxyChg < 0)  macroSignals.push(['up',   '▲ Risk-on: Phố Wall tăng + USD yếu → dòng vốn vào EM tích cực']);
  if (sp500Chg < -1 && goldChg > 1) macroSignals.push(['dn',   '▼ Risk-off: Phố Wall giảm + Vàng tăng → nhà đầu tư phòng thủ']);
  if (tnxChg > 0.5)                  macroSignals.push(['warn', '⚠ US 10Y Yield tăng → đồng vốn EM bị kéo sang trái phiếu Mỹ, cẩn thận dòng vốn ngoại']);
  if (tnxChg < -0.5)                 macroSignals.push(['up',   '▲ US 10Y Yield giảm → chi phí vốn rẻ hơn, tốt cho thị trường mới nổi']);
  if (copperChg > 1.5)               macroSignals.push(['up',   '▲ Đồng tăng mạnh → tín hiệu mở rộng kinh tế toàn cầu, tích cực cho chu kỳ CN']);
  if (copperChg < -1.5)              macroSignals.push(['dn',   '▼ Đồng giảm mạnh → lo ngại tăng trưởng toàn cầu chậm lại']);
  if (!macroSignals.length)          macroSignals.push(['neu',  '— Thị trường toàn cầu ổn định, không có tín hiệu bất thường']);
  const macroSignalHtml = macroSignals.map(function(s) {
    const bg = s[0]==='up'?'#3fb95015':s[0]==='dn'?'#f8514915':s[0]==='warn'?'#d2992215':'#21262d';
    const col = s[0]==='up'?'#3fb950':s[0]==='dn'?'#f85149':s[0]==='warn'?'#d29922':'#8b949e';
    return '<div style="font-size:.78em;padding:6px 10px;border-radius:6px;background:'+bg+';color:'+col+';margin-bottom:4px">'+s[1]+'</div>';
  }).join('');
  const macroCard = mkCard('🌍 Thị trường quốc tế & vĩ mô', macroGrid + macroSignalHtml);

  // ── 5. DO RONG TOAN SAN ──────────────────────────────────────────────────
  const fb = d.full_breadth || d.breadth || {};
  const fbTotal = (fb.up||0)+(fb.down||0)+(fb.flat||0)||1;
  const fbUpW   = Math.round((fb.up||0)/fbTotal*100);
  const fbDnW   = Math.round((fb.down||0)/fbTotal*100);
  const fbFlW   = 100-fbUpW-fbDnW;
  const fbNote  = fbUpW>=60 ? '✅ '+fbUpW+'% cổ phiếu tăng — thị trường đang khỏe' : fbUpW<=35 ? '⚠️ Chỉ '+fbUpW+'% tăng — thị trường yếu, thận trọng' : '➡️ '+fbUpW+'% tăng — thị trường phân hóa, chọn lọc kỹ';
  const dateLabel = fb.latest_date ? ' ('+fb.latest_date+')' : '';
  const breadthCard = mkCard('📊 Độ rộng toàn sàn'+dateLabel+' — '+(fb.total||'~1800')+' mã',
    '<div style="display:flex;gap:24px;margin-bottom:12px;flex-wrap:wrap">'
    +'<div style="text-align:center"><div style="font-size:2em;font-weight:700;color:#3fb950">'+(fb.up||0)+'</div><div style="font-size:.75em;color:#8b949e">Tăng ▲</div><div style="font-size:.7em;color:#3fb950">'+fbUpW+'%</div></div>'
    +'<div style="text-align:center"><div style="font-size:2em;font-weight:700;color:#f85149">'+(fb.down||0)+'</div><div style="font-size:.75em;color:#8b949e">Giảm ▼</div><div style="font-size:.7em;color:#f85149">'+fbDnW+'%</div></div>'
    +'<div style="text-align:center"><div style="font-size:2em;font-weight:700;color:#8b949e">'+(fb.flat||0)+'</div><div style="font-size:.75em;color:#8b949e">Đứng –</div><div style="font-size:.7em;color:#8b949e">'+fbFlW+'%</div></div>'
    +(fb.total_volume?'<div style="text-align:center"><div style="font-size:1.1em;font-weight:700;color:#58a6ff">'+(fb.total_volume/1e9).toFixed(1)+'B</div><div style="font-size:.75em;color:#8b949e">Tổng KL</div></div>':'')
    +'</div>'
    +'<div style="height:12px;border-radius:6px;overflow:hidden;display:flex;gap:1px;margin-bottom:8px">'
    +'<div style="width:'+fbUpW+'%;background:#3fb950"></div>'
    +'<div style="width:'+fbFlW+'%;background:#484f58"></div>'
    +'<div style="width:'+fbDnW+'%;background:#f85149"></div></div>'
    +'<div style="font-size:.82em;color:#8b949e">'+fbNote+'</div>');

  // ── 6. TOP TANG / GIAM TOAN SAN ─────────────────────────────────────────
  const tm = d.top_movers || {};
  // ── Build symbol→sector lookup từ OPPORTUNITY_LIST ──────────────────────────
  var _symSec = {};
  (OPPORTUNITY_LIST||[]).forEach(function(o){ _symSec[o.sym] = o.sector; });
  function applyGlobalMoverFilter(arr) {
    if (!arr) return [];
    if (_gStock) return arr.filter(function(m){ return m.sym === _gStock; });
    if (_gSector !== 'all') return arr.filter(function(m){ return _symSec[m.sym] === _gSector; });
    return arr;
  }
  function moverTable(list, isGainer) {
    if (!list || !list.length) return '<div style="color:#8b949e;font-size:.85em;padding:8px">Chưa có dữ liệu</div>';
    // Gia trong DB tinh bang nghin dong: 205.4 = 205,400 VND → hien thi × 1000
    return '<table style="width:100%;border-collapse:collapse">'
      +'<thead><tr style="border-bottom:1px solid #21262d">'
      +'<th style="padding:4px 8px;text-align:left;font-size:.7em;color:#8b949e">Mã</th>'
      +'<th style="padding:4px 8px;text-align:right;font-size:.7em;color:#8b949e">Giá (đ)</th>'
      +'<th style="padding:4px 8px;text-align:right;font-size:.7em;color:#8b949e">%</th></tr></thead>'
      +'<tbody>'+list.map(function(m) {
        const priceDisplay = m.close >= 1 ? numFmt(m.close * 1000) : numFmt(m.close);
        return '<tr>'
          +'<td style="padding:5px 8px;font-weight:700;color:#e6edf3">'+m.sym+'</td>'
          +'<td style="padding:5px 8px;text-align:right;color:#8b949e;font-size:.82em">'+priceDisplay+'</td>'
          +'<td style="padding:5px 8px;text-align:right;color:'+(isGainer?'#3fb950':'#f85149')+';font-weight:700">'+(isGainer?'+':'')+m.pct.toFixed(2)+'%</td></tr>';
      }).join('')+'</tbody></table>';
  }
  var _gainers = applyGlobalMoverFilter(tm.gainers);
  var _losers  = applyGlobalMoverFilter(tm.losers);
  var _moverSuffix = _gStock ? ' — '+_gStock : (_gSector !== 'all' ? ' — ngành lọc' : ' toàn sàn');
  const topMoversCard =
    '<div class="row2" style="margin-top:16px">'
    +mkCard('🚀 Top tăng mạnh'+_moverSuffix, moverTable(_gainers, true))
    +mkCard('📉 Top giảm mạnh'+_moverSuffix, moverTable(_losers, false))
    +'</div>';

  // ── 7. PHAN TICH NGANH TOAN SAN ──────────────────────────────────────────
  const sf = (d.sector_full && d.sector_full.length) ? d.sector_full : d.sector_performance || [];
  // viSector() và SECTOR_VI_JS được định nghĩa ở global scope (trước renderMarket)
  function makeSectorBar(item) {
    const chg = item.avg_pct !== undefined ? item.avg_pct : (item.avg_change || 0);
    const total_s = item.total_stocks || item.stock_count || 1;
    const up_c    = item.up_count || 0;
    const upPct   = Math.round(up_c / total_s * 100);
    const col     = chgColor(chg);

    const _pc     = _p10.pass_count || 0;
    const _tot    = _p10.total || 11;

    const _bc = _status ? '#2ea043' : '#b91c1c';

      +'<div style="font-size:.82em;color:#8b949e;margin-top:2px">'+_pc+'/'+_tot+' điều kiện'+_dsp+'</div>'
      +'<div style="margin-top:6px">'+_pills+'</div>'
      +'</div>'
      +((_bar) ? '<div style="flex:0 0 auto;text-align:right"><div style="font-size:.7em;color:#8b949e;margin-bottom:3px">30 ngày</div>'+_bar+'</div>' : '')
      +'</div>';
  })();

  document.getElementById('market-overview-content').innerHTML =
    // 1. Kết luận ngắn + badges (brief — đầu tiên)
    commentaryBrief
    // 2. Pulse Strip — 5 KPI chính

    // 3. Macro card FULL WIDTH + phân tích vĩ mô ngay bên dưới

    +stockListsRow

    // 9. Nhận định tin tức (từ ts.news_summary_*)
    +renderNewsSummaryBlock()

  setTimeout(function() {

    if (canvas && VNIDX && VNIDX.labels) {

        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return 'VN-Index: '+ctx.raw.toLocaleString('vi-VN');}}}},scales:{x:{ticks:{color:'#8b949e',maxTicksLimit:8},grid:{color:'#21262d'}},y:{ticks:{color:'#8b949e'},grid:{color:'#21262d'}}}}

function oppSort(field, th) {
  if (window._oppSortField === field) {
    window._oppSortDir = (window._oppSortDir || 'desc') === 'desc' ? 'asc' : 'desc';
  } else {
    window._oppSortField = field;
    window._oppSortDir = 'desc';
  }
  document.querySelectorAll('.opp-sort-th').forEach(function(h) { h.style.color='#8b949e'; });
  th.style.color = '#58a6ff';
  const fmap = {tech:'tech_score', rsi:'rsi14', bb:'bb_days_30d', pe:'pe'};
  const f = fmap[field] || field;
  const dir = window._oppSortDir === 'asc' ? 1 : -1;
  const list2 = [...(OPPORTUNITY_LIST||[])].sort(function(a,b) {
    const av = (a[f] !== null && a[f] !== undefined) ? a[f] : -999;
    const bv = (b[f] !== null && b[f] !== undefined) ? b[f] : -999;
    return (av - bv) * dir;
  });
  document.getElementById('opp-tbody').innerHTML = window._oppGetRows ? window._oppGetRows(window._oppCurrentFilter||'all', list2) : '';
}

function renderOpportunity() {
  var _baseList = OPPORTUNITY_LIST || [];
  var list;
  if (_gStock) {
    list = _baseList.filter(function(d){ return d.sym === _gStock; });
  } else if (_gSector !== 'all') {
    list = _baseList.filter(function(d){ return d.sector === _gSector; });
  } else {
    list = _baseList;
  }

  function getRows(filter, customList) {
    const src = customList || list;
    let filtered = src;
    if (filter === 'buy') filtered = src.filter(function(d){ return d.signal === 'BUY'; });
    if (filter === 'bb') filtered = src.filter(function(d){ return d.bb_days_30d > 0; });
    if (filter === 'cheap') filtered = src.filter(function(d){ return d.pe_vs_sector === 'RẺ HƠN'; });
    if (filter === 'stage2') filtered = src.filter(function(d){ return d.trend_stage === 'stage2'; });

    return filtered.map(function(d) {
      const sigColor = d.signal==='BUY'?'#3fb950':d.signal==='WATCH'?'#d29922':d.signal==='SELL'?'#f85149':'#484f58';
      const sigBg = d.signal==='BUY'?'#1a4731':d.signal==='WATCH'?'#3d2c00':d.signal==='SELL'?'#3d0f0f':'#21262d';
      const rsiColor = d.rsi14 > 70 ? '#f85149' : d.rsi14 < 30 ? '#3fb950' : '#8b949e';
      const rsiNote = d.rsi14 > 70 ? 'đã tăng nhanh, có thể nghỉ nhẹ' : d.rsi14 < 30 ? 'đã giảm nhiều, có thể là cơ hội' : 'chưa có tín hiệu rõ';
      const trendIcon = d.score_trend === '↑' ? '<span style="color:#3fb950">↑ cải thiện</span>' : d.score_trend === '↓' ? '<span style="color:#f85149">↓ suy yếu</span>' : '<span style="color:#8b949e">→ ổn định</span>';
      const maIcons = (d.above_ma20?'<span title="Trên MA20" style="color:#3fb950;font-size:.75em">TB20✓</span>':'<span style="color:#484f58;font-size:.75em">TB20✗</span>')
        + ' ' + (d.above_ma50?'<span title="Trên MA50" style="color:#3fb950;font-size:.75em">TB50✓</span>':'<span style="color:#484f58;font-size:.75em">TB50✗</span>')
        + ' ' + (d.above_ma200?'<span title="Trên MA200 — uptrend dài hạn" style="color:#58a6ff;font-size:.75em;font-weight:700">TB200✓</span>':'<span title="Dưới MA200 — downtrend dài hạn" style="color:#f85149;font-size:.75em">TB200✗</span>');
      const stageBadgeOpp = d.trend_stage==='stage2' ? '<span style="background:#1a4731;color:#3fb950;border:1px solid #3fb950;border-radius:3px;padding:1px 5px;font-size:.65em;margin-left:3px">📈</span>'
        : d.trend_stage==='transition' ? '<span style="background:#3d2c00;color:#d29922;border:1px solid #d29922;border-radius:3px;padding:1px 5px;font-size:.65em;margin-left:3px">⚡</span>'
        : d.trend_stage==='stage4' ? '<span style="background:#3d0f0f;color:#f85149;border:1px solid #f85149;border-radius:3px;padding:1px 5px;font-size:.65em;margin-left:3px">⚠️</span>'
        : '';
      const valColor = d.pe_vs_sector==='RẺ HƠN'?'#3fb950':d.pe_vs_sector==='ĐẮT HƠN'?'#f85149':'#8b949e';
      const valText = d.pe !== null && d.sector_pe !== null && d.pe > 0 && d.sector_pe > 0
        ? 'P/E '+d.pe.toFixed(1)+'x <span style="color:'+valColor+'">('+(d.pe_vs_sector||'N/A')+')</span>'
        : '<span style="color:#484f58">N/A</span>';
      const bbText = d.bb_days_30d > 0
        ? '<span style="color:#f0c040;font-weight:700">'+d.bb_days_30d+'/30 ngày</span>'
        : '<span style="color:#484f58">–</span>';

      const positives = [];
      const negatives = [];
      if (d.signal === 'BUY') positives.push('kỹ thuật mạnh');
      else if (d.signal === 'SELL') negatives.push('kỹ thuật yếu');
      if (d.above_ma20 && d.above_ma50) positives.push('trên đường TB 20 và 50 ngày — xu hướng tăng ngắn và trung hạn đều xác nhận');
      else if (!d.above_ma20) negatives.push('dưới đường trung bình 20 ngày — xu hướng ngắn hạn chưa tích cực');
      if (d.bb_days_30d >= 5) positives.push('nhà đầu tư lớn đã mua '+d.bb_days_30d+'/30 ngày — tích lũy đều đặn');
      else if (d.bb_days_30d > 0) positives.push('có dấu hiệu nhà đầu tư lớn quan tâm');
      if (d.pe_vs_sector === 'RẺ HƠN') positives.push('định giá hấp dẫn');
      else if (d.pe_vs_sector === 'ĐẮT HƠN') negatives.push('đắt hơn ngành');
      if (d.score_trend === '↑') positives.push('đà tăng cải thiện');
      else if (d.score_trend === '↓') negatives.push('đà yếu dần');

      let conclusion = '';
      if (positives.length >= 3) conclusion = '✅ '+positives.join(', ');
      else if (negatives.length >= 2) conclusion = '⚠️ '+negatives.join(', ');
      else if (positives.length > 0) conclusion = '→ '+positives.join(', ')+(negatives.length?' · cẩn thận: '+negatives.join(', '):'');
      else conclusion = '<span style="color:#484f58">Không rõ xu hướng</span>';

      return '<tr style="border-bottom:1px solid #21262d;cursor:pointer" onclick="showDetail(\''+d.sym+'\')" onmouseover="this.style.background=\'#21262d\'" onmouseout="this.style.background=\'\'">'
        +'<td style="padding:10px 12px"><strong style="color:#e6edf3">'+d.sym+'</strong>'+stageBadgeOpp+'<div style="font-size:.72em;color:#8b949e">'+d.sector+'</div></td>'
        +'<td style="padding:10px 12px;text-align:center"><span style="background:'+sigBg+';color:'+sigColor+';font-size:.75em;font-weight:700;padding:3px 10px;border-radius:10px">'+d.signal+'</span><div style="font-size:.72em;color:#8b949e;margin-top:3px">điểm '+d.tech_score+'/6</div></td>'
        +'<td style="padding:10px 12px">'+trendIcon+'<div style="font-size:.72em;margin-top:3px">'+maIcons+'</div></td>'
        +'<td style="padding:10px 12px;font-size:.82em;color:'+rsiColor+'">RSI '+(d.rsi14||0).toFixed(0)+'<div style="font-size:.85em;color:#8b949e">'+rsiNote+'</div></td>'
        +'<td style="padding:10px 12px;font-size:.82em">'+valText+'</td>'
        +'<td style="padding:10px 12px;font-size:.82em">'+bbText+'</td>'
        +'<td style="padding:10px 12px;font-size:.8em;color:#c9d1d9">'+conclusion+'</td></tr>';
    }).join('');
  }

  document.getElementById('opportunity-content').innerHTML =
    '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">'
    +'<button onclick="oppFilter(\'all\',this)" id="opp-btn-all" style="padding:6px 16px;border-radius:20px;border:1px solid #58a6ff;background:#1c2d40;color:#58a6ff;font-size:.82em;cursor:pointer;font-weight:600">Tất cả ('+list.length+')</button>'
    +'<button onclick="oppFilter(\'buy\',this)" id="opp-btn-buy" style="padding:6px 16px;border-radius:20px;border:1px solid #30363d;background:none;color:#8b949e;font-size:.82em;cursor:pointer">🟢 BUY ('+list.filter(function(d){return d.signal==='BUY';}).length+')</button>'
    +'<button onclick="oppFilter(\'bb\',this)" id="opp-btn-bb" style="padding:6px 16px;border-radius:20px;border:1px solid #30363d;background:none;color:#8b949e;font-size:.82em;cursor:pointer">🐋 Có tổ chức ('+list.filter(function(d){return d.bb_days_30d>0;}).length+')</button>'
    +'<button onclick="oppFilter(\'cheap\',this)" id="opp-btn-cheap" style="padding:6px 16px;border-radius:20px;border:1px solid #30363d;background:none;color:#8b949e;font-size:.82em;cursor:pointer">💰 Rẻ hơn ngành ('+list.filter(function(d){return d.pe_vs_sector==='RẺ HƠN';}).length+')</button>'
    +'<button onclick="oppFilter(\'stage2\',this)" id="opp-btn-stage2" style="padding:6px 16px;border-radius:20px;border:1px solid #30363d;background:none;color:#8b949e;font-size:.82em;cursor:pointer">📈 Uptrend MA200 ('+list.filter(function(d){return d.trend_stage==='stage2';}).length+')</button>'
    +'</div>'
    +'<div class="card" style="padding:0">'
    +'<table style="width:100%;border-collapse:collapse">'
    +'<thead><tr style="border-bottom:1px solid #30363d;background:#161b22">'
    +'<th style="padding:10px 12px;text-align:left;font-size:.75em;color:#8b949e;font-weight:600">Mã</th>'
    +'<th class="opp-sort-th" onclick="oppSort(\'tech\',this)" style="padding:10px 12px;text-align:center;font-size:.75em;color:#8b949e;font-weight:600;cursor:pointer" title="Click để sắp xếp">Kỹ thuật ↕</th>'
    +'<th style="padding:10px 12px;font-size:.75em;color:#8b949e;font-weight:600">Xu hướng</th>'
    +'<th class="opp-sort-th" onclick="oppSort(\'rsi\',this)" style="padding:10px 12px;font-size:.75em;color:#8b949e;font-weight:600;cursor:pointer" title="Click để sắp xếp">RSI 14 ↕</th>'
    +'<th class="opp-sort-th" onclick="oppSort(\'pe\',this)" style="padding:10px 12px;font-size:.75em;color:#8b949e;font-weight:600;cursor:pointer" title="Click để sắp xếp">Định giá ↕</th>'
    +'<th class="opp-sort-th" onclick="oppSort(\'bb\',this)" style="padding:10px 12px;font-size:.75em;color:#8b949e;font-weight:600;cursor:pointer" title="Click để sắp xếp">Tổ chức ↕</th>'
    +'<th style="padding:10px 12px;font-size:.75em;color:#8b949e;font-weight:600">Kết luận</th>'
    +'</tr></thead>'
    +'<tbody id="opp-tbody">'+getRows('all')+'</tbody>'
    +'</table></div>';

  window._oppGetRows = getRows;
}

function oppFilter(filter, btn) {
  window._oppCurrentFilter = filter;
  document.querySelectorAll('[id^="opp-btn-"]').forEach(function(b) {
    b.style.background='none'; b.style.color='#8b949e'; b.style.borderColor='#30363d';
  });
  btn.style.background='#1c2d40'; btn.style.color='#58a6ff'; btn.style.borderColor='#58a6ff';

}

function bbSort(field, th) {
  if (window._bbSortField === field) {
    window._bbSortDir = (window._bbSortDir || 'desc') === 'desc' ? 'asc' : 'desc';
  } else {
    window._bbSortField = field;
    window._bbSortDir = 'desc';
  }
  document.querySelectorAll('.bb-sort-th').forEach(function(h) { h.style.color='#8b949e'; });
  th.style.color = '#58a6ff';
  const bh = window._bbBh || {};
  const fmap = {days:'total_days_30d', ltr:'avg_ltr_30d'};
  const f = fmap[field] || field;
  const dir = window._bbSortDir === 'asc' ? 1 : -1;

}

function renderBigboyTab() {
  const bh = BIGBOY_HISTORY || {};
  try {
  const syms = Object.keys(bh).filter(function(s){ return bh[s] && (bh[s].total_days_30d||0) > 0; })
    .sort(function(a,b){ return (bh[b].total_days_30d||0) - (bh[a].total_days_30d||0); });

  if (!syms.length) {
    document.getElementById('bigboy-content').innerHTML = '<div style="text-align:center;padding:60px;color:#8b949e">Không có dữ liệu dòng tiền 30 ngày</div>';
    return;
  }

  const oppList = OPPORTUNITY_LIST || [];
  // ── Apply global filter ───────────────────────────────────────────────────
  var _bbSymSec = {};
  oppList.forEach(function(o){ _bbSymSec[o.sym] = o.sector; });
  var symsFiltered = syms;
  if (_gStock) {
    symsFiltered = syms.filter(function(s){ return s === _gStock; });
  } else if (_gSector !== 'all') {
    symsFiltered = syms.filter(function(s){ return _bbSymSec[s] === _gSector; });
  }
  window._bbSyms = symsFiltered.slice();

  const sectorBB = {};
  symsFiltered.forEach(function(s) {
    const opp = oppList.find(function(o){ return o.sym===s; });
    const sec = opp ? opp.sector : 'Khác';
    if (!sectorBB[sec]) sectorBB[sec] = {days:0, syms:[]};
    sectorBB[sec].days += bh[s].total_days_30d||0;
    sectorBB[sec].syms.push(s);
  });
  const sectorArr = Object.entries(sectorBB).sort(function(a,b){ return b[1].days-a[1].days; });

  window._bbBh   = bh;
  window._bbOppList = oppList;

  function makeBbRows(symList) {
    return symList.map(function(s) {
      const h = bh[s];
      const trendColor = h.trend==='ĐANG TÍCH LŨY'?'#3fb950':h.trend==='ĐANG PHÂN PHỐI'?'#f85149':'#8b949e';
      const trendBg = h.trend==='ĐANG TÍCH LŨY'?'#1a4731':h.trend==='ĐANG PHÂN PHỐI'?'#3d0f0f':'#21262d';
      const ltr = h.avg_ltr_30d || 0;
      const ltrNote = ltr >= 70 ? 'sức mạnh rất cao' : ltr >= 50 ? 'sức mạnh tốt' : ltr >= 30 ? 'sức mạnh trung bình' : 'sức mạnh yếu';
      const opp = oppList.find(function(o){ return o.sym===s; });
      const sector = opp ? opp.sector : '';
      const miniBar = (h.ltr_scores||[]).slice(-30).map(function(v,i) {
        const sig = h.signal_types ? h.signal_types[i] : null;
        const col = v===null ? '#21262d' : sig==='STRONG_BB' ? '#3fb950' : sig==='BB' ? '#2ea043' : sig==='WATCH_BB' ? '#d29922' : '#21262d';
        return '<span style="display:inline-block;width:5px;height:16px;background:'+col+';border-radius:1px;margin:0 1px" title="'+(v?'LTR '+v.toFixed(0):'–')+'"></span>';
      }).join('');
      // ── Verdict thực tế từ data có sẵn ─────────────────────────────────────
      const consec = h.consecutive_days || 0;
      const totalD = h.total_days_30d   || 0;
      var vLabel, vColor, vBg, vDesc;
      if (consec >= 5) {
        vLabel='🔥 TÍCH LŨY MẠNH'; vColor='#3fb950'; vBg='#1a4731';
        vDesc='Chuỗi '+consec+' ngày liên tiếp — tổ chức đang tích lũy dứt khoát';
      } else if (consec >= 3) {
        vLabel='✅ TÍCH LŨY '+consec+' NGÀY'; vColor='#3fb950'; vBg='#1a4731';
        vDesc='Liên tiếp '+consec+' phiên có tín hiệu — dấu hiệu tích lũy có hệ thống';
      } else if (h.trend === 'ĐANG TÍCH LŨY') {
        vLabel='📈 ĐANG TÍCH LŨY'; vColor='#3fb950'; vBg='#1a4731';
        vDesc='Cường độ tín hiệu tăng dần — nhà đầu tư lớn đang gom hàng';
      } else if (h.trend === 'ĐANG PHÂN PHỐI') {
        vLabel='📉 PHÂN PHỐI'; vColor='#f85149'; vBg='#3d0f0f';
        vDesc='Tín hiệu giảm dần — có thể đang bán ra, thận trọng';
      } else if (ltr >= 70 && totalD >= 3) {
        vLabel='💪 LTR CAO'; vColor='#58a6ff'; vBg='#0c2d4a';

    }).join('');
  }
  window._bbMakeRows = makeBbRows;

  const rows = makeBbRows(symsFiltered);

  const maxDays = sectorArr.length ? sectorArr[0][1].days : 1;
  const sectorBars = sectorArr.slice(0,8).map(function(e) {

  }).join('');

  // ── MONEYFLOW DEEP ANALYSIS sections ────────────────────────────────────
  const mf      = MARKET_OVERVIEW.moneyflow || {};
  const mfTrend = mf.trend_30d || [];
  const mfRot   = mf.sector_rotation || [];

  // ── A. Nhận định tổng hợp dòng tiền ─────────────────────────────────────
  const narrativeSec = mfNarr

      +'<div style="font-size:.78em;font-weight:700;color:#58a6ff;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px">📝 Nhận định dòng tiền tổng hợp</div>'
      +mfNarr+'</div>'
    : '';

  // ── B. Chart cường độ 30 phiên ────────────────────────────────────────────
  var trendSec = '';
  if (mfTrend.length >= 3) {
    const maxStrong = Math.max.apply(null, mfTrend.map(function(t){ return t.strong||0; })) || 1;
    const maxTotal  = Math.max.apply(null, mfTrend.map(function(t){ return t.total||0; }))  || 1;
    const recent3Avg = mfTrend.slice(0,3).reduce(function(s,t){ return s+(t.strong||0); },0)/3;
    const prev5Avg   = mfTrend.slice(3,8).reduce(function(s,t){ return s+(t.strong||0); },0)/Math.min(5,mfTrend.slice(3,8).length||1);
    const trendDir = recent3Avg > prev5Avg*1.3 ? '↑ TĂNG TỐC' : recent3Avg < prev5Avg*0.7 ? '↓ GIẢM TỐC' : '→ ỔN ĐỊNH';
    const trendCol = recent3Avg > prev5Avg*1.3 ? '#3fb950' : recent3Avg < prev5Avg*0.7 ? '#f85149' : '#d29922';
    const bars = mfTrend.slice(0,30).reverse().map(function(t) {
      const h  = Math.max(2, Math.round((t.strong||0)/maxStrong*52));
      const ht = Math.max(2, Math.round((t.total||0)/maxTotal*52));
      const isSun = new Date(t.date).getDay()===0||new Date(t.date).getDay()===6;
      return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;min-width:0" title="'+t.date+': '+t.strong+' STRONG / '+t.total+' tổng">'

        +'<div style="height:'+h+'px;background:#3fb950;flex-shrink:0"></div>'
        +'<div style="height:'+(ht-h)+'px;background:#484f58;flex-shrink:0"></div>'
        +'</div>'
        +'<div style="font-size:8px;color:#484f58;writing-mode:vertical-rl;transform:rotate(180deg);margin-top:2px;max-height:28px;overflow:hidden">'+t.date.slice(5)+'</div>'
        +'</div>';
    }).join('');
    trendSec = '<div class="card" style="margin-bottom:16px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'
      +'<div style="font-size:.78em;font-weight:700;color:#e6edf3;text-transform:uppercase;letter-spacing:.8px">📈 Cường độ dòng tiền tổ chức — 30 phiên</div>'
      +'<div style="font-size:.82em;font-weight:700;color:'+trendCol+'">'+trendDir+'</div></div>'

      +'</div></div>';
  }

  // ── C. Sector Rotation — tiền đi đâu ─────────────────────────────────────
  var rotSec = '';
  if (mfRot.length >= 2) {
    const rotRows = mfRot.slice(0,10).map(function(r) {
      const delta = r.delta;

      const arrow = delta > 0 ? '▲' : delta < 0 ? '▼' : '–';
      const recBar = Math.min(100, Math.round(r.recent_2w / (mfRot[0].recent_2w||1) * 100));

      +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse">'

      +'<th style="padding:6px 10px;font-size:.68em;color:#8b949e;text-align:left">Ngành</th>'
      +'<th style="padding:6px 6px;font-size:.68em;color:#58a6ff;text-align:left">2 tuần gần</th>'
      +'<th style="padding:6px 6px;font-size:.68em;color:#8b949e;text-align:left">2 tuần trước</th>'
      +'<th style="padding:6px 10px;font-size:.68em;color:#8b949e;text-align:right">Thay đổi</th>'
      +'</tr></thead>'
      +'<tbody>'+rotRows+'</tbody></table></div></div>';
  }

  // ── D. Smart Money Ranking — top ngành dòng tiền mạnh ────────────────────
  var rankSec = '';
  if (mfRank.length >= 1) {
    const medals = ['🥇','🥈','🥉'];
    const podium = mfRank.slice(0,3).map(function(r,i) {
      const bg = i===0 ? '#2d2000' : i===1 ? '#1c2433' : '#1c2c1c';
      const bc = i===0 ? '#d29922' : i===1 ? '#58a6ff' : '#3fb950';

        +'<div style="font-size:1.6em">'+medals[i]+'</div>'
        +'<div style="font-size:.82em;font-weight:700;color:'+bc+';margin:4px 0 2px;line-height:1.3">'+viSector(r.sector)+'</div>'
        +'<div style="font-size:1.2em;font-weight:800;color:#e6edf3">'+r.score+'</div>'
        +'<div style="font-size:.68em;color:#8b949e;margin-top:3px">điểm</div>'
        +'<div style="font-size:.7em;color:#8b949e;margin-top:5px;line-height:1.5">'
        +'STRONG×3: '+r.strong_7d+'<br>BB×1: '+r.bb_7d+'<br>LTR TB: '+r.avg_ltr+'</div>'

    }).join('');
    const restRows = mfRank.slice(3).map(function(r,i) {
      return '<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #21262d">'

      +(restRows?'<div style="margin-top:8px">'+restRows+'</div>':'')

  // ── D2. Time-weighted sector + symbol ranking ─────────────────────────────
  const mfSW   = mf.sector_weighted  || [];
  const mfSymW = mf.symbol_weighted  || [];
  var weightedSec = '';
  if (mfSW.length >= 1) {{
    const maxWS = mfSW[0].w_score || 1;
    const swRows = mfSW.map(function(r, i) {{
      const pct = Math.round(r.w_score / maxWS * 100);
      const rank = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i+1)+'.';

        +'<div style="display:flex;justify-content:space-between;margin-bottom:3px">'

    }}).join('');
    const symRows = mfSymW.slice(0,5).map(function(s, i) {{
      const col = s.w_score >= mfSymW[0].w_score*0.8 ? '#f0c040' : s.w_score >= mfSymW[0].w_score*0.5 ? '#d29922' : '#8b949e';
      return '<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #21262d">'
        +'<span style="font-size:.82em;font-weight:700;color:#e6edf3;min-width:40px">'+(i+1)+'. '+s.sym+'</span>'

        +'<span style="font-size:.72em;color:#8b949e">7ngày: '+s.raw_7d+' · LTR: '+s.avg_ltr+'</span>'
        +'<button onclick="showBigBoyDetail(\''+s.sym+'\')" style="padding:2px 8px;background:#1c2c3c;border:1px solid #1f6feb;color:#58a6ff;border-radius:4px;font-size:.7em;cursor:pointer">Chi tiết</button>'

      +'<div style="font-size:.72em;color:#8b949e;margin-bottom:12px">Tín hiệu gần đây có trọng số cao hơn: w = e<sup>−D/7</sup> — hôm nay=1.0 · 7ngày=0.37 · 14ngày=0.14 · 21ngày=0.05</div>'
      +'<div style="display:flex;gap:16px;flex-wrap:wrap">'
      +'<div style="flex:1.5;min-width:200px"><div style="font-size:.75em;font-weight:700;color:#8b949e;margin-bottom:8px;text-transform:uppercase">Ngành</div>'+swRows+'</div>'
      +'<div style="flex:1;min-width:160px"><div style="font-size:.75em;font-weight:700;color:#8b949e;margin-bottom:8px;text-transform:uppercase">Top cổ phiếu</div>'+symRows+'</div>'
      +'</div></div>';
  }}

  // ── E. Distribution warnings ──────────────────────────────────────────────
  var warnSec = '';
  if (mfWarn.length > 0) {
    const warnCards = mfWarn.slice(0,5).map(function(w) {
      return '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:#21262d;border-radius:6px;border-left:3px solid #d29922;margin-bottom:6px">'
        +'<span style="font-size:1.1em">⚠️</span>'
        +'<div style="flex:1">'
        +'<span style="font-weight:700;color:#e6edf3">'+w.sym+'</span>'
        +'<span style="font-size:.78em;color:#8b949e;margin-left:8px">'+w.signal_count+' STRONG_BB trong 14 phiên</span><br>'
        +'<span style="font-size:.78em;color:#d29922">Giá đã tăng +'+w.price_chg_20d.toFixed(1)+'% trong 20 phiên — khả năng phân phối</span>'
        +'</div>'
        +'<button onclick="showBigBoyDetail(\''+w.sym+'\')" style="padding:4px 10px;background:#2d1f00;border:1px solid #d29922;color:#d29922;border-radius:6px;font-size:.75em;cursor:pointer">Chi tiết</button>'
        +'</div>';
    }).join('');
    warnSec = '<div class="card" style="margin-bottom:16px;border-color:#d29922">'
      +'<div style="font-size:.78em;font-weight:700;color:#d29922;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px">⚠️ Cảnh báo phân phối — Thận trọng</div>'
      +'<div style="font-size:.78em;color:#8b949e;margin-bottom:8px">STRONG_BB xuất hiện sau khi giá đã tăng mạnh — có thể là tổ chức đang bán ra.</div>'
      +warnCards+'</div>';
  }

    document.getElementById('bigboy-content').innerHTML =
    (narrativeSec || '')
    + (trendSec || '')
    + (weightedSec || '')
    + (rankSec || '')
    + (rotSec || '')
    + (warnSec || '')
    + '<div class="card" style="margin-bottom:20px">'
    +'<div class="card-title">Dòng tiền tổ chức theo ngành — 30 ngày qua</div>'
    +'<div style="font-size:.8em;color:#8b949e;margin-bottom:12px">Tổng số ngày-cổ phiếu có tín hiệu BigBoy trong mỗi ngành (cao = tổ chức tập trung vào ngành đó)</div>'
    +sectorBars+'</div>'

    +'<div class="card" style="padding:0">'
    +'<div style="padding:16px 16px 0;border-bottom:1px solid #30363d">'
    +'<div style="font-size:.88em;font-weight:700;color:#e6edf3;margin-bottom:4px">Cổ phiếu có dòng tiền tổ chức ('+syms.length+' mã)</div>'
    +'<div style="font-size:.78em;color:#8b949e;padding-bottom:12px">Click vào dòng để xem chi tiết lịch sử BigBoy và chart giá</div></div>'
    +'<table style="width:100%;border-collapse:collapse">'

    +'<th class="bb-sort-th" onclick="bbSort(\'ltr\',this)" style="padding:10px 12px;text-align:center;font-size:.75em;color:#8b949e;font-weight:600;cursor:pointer" title="Click để sắp xếp">LTR Score ↕</th>'

    +'<div class="card" style="margin-top:16px;background:#21262d;border-color:#30363d">'

    +'<span style="color:#3fb950">≥70 = rất mạnh</span> · <span style="color:#d29922">50–70 = mạnh</span> · <span style="color:#8b949e">&lt;50 = yếu</span>.<br>'

    +'</div></div>';
  } catch(e) {
    document.getElementById('bigboy-content').innerHTML =
      '<div style="text-align:center;padding:40px;color:#f85149">Lỗi render tab dòng tiền: ' + e.message + '</div>';
    console.error('renderBigboyTab error:', e);
  }
}

// ── Foreign Flow Section (Khối ngoại) ─────────────────────────────────────────
function renderForeignFlowSection() {{
  var el = document.getElementById('foreign-flow-content');
  if (!el) return;

  if (!ff || !ff.available || !ff.n_days) {{
    el.innerHTML = '<div class="card" style="margin-bottom:20px">'
      +'<div class="card-title">🌐 Dòng tiền khối ngoại</div>'
      +'<div style="color:#8b949e;font-size:.88em;padding:12px 0">Chưa có dữ liệu khối ngoại — sẽ tích lũy từ ngày bắt đầu thu thập.</div>'
      +'</div>';
    return;
  }}
  try {{
    var ds = ff.daily_summary || [];
    var topBuy  = ff.top_buy  || [];
    var topSell = ff.top_sell || [];
    var nDays   = ff.n_days   || 0;
    var latDate = ff.latest_date || '';

    // ── Market net trend chart (bars) ──────────────────────────────────────
    var chartRows = ds.slice().reverse().slice(-20);  // chronological, last 20 days
    var maxAbs = Math.max.apply(null, chartRows.map(function(d){{ return Math.abs(d.net_val/1e9); }}));
    if (!maxAbs) maxAbs = 1;
    var barRows = chartRows.map(function(d) {{
      var pct = Math.round(Math.abs(d.net_val/1e9) / maxAbs * 100);
      var col = d.net_val >= 0 ? '#3fb950' : '#f85149';
      var label = (d.net_val >= 0 ? '+' : '') + (d.net_val/1e9).toFixed(1) + 'B';
      return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">'
        +'<span style="font-size:.75em;color:#8b949e;min-width:72px">'+ d.date.slice(5) +'</span>'
        +'<div style="flex:1;background:#21262d;border-radius:3px;height:16px;position:relative">'
        +'<div style="position:absolute;'+(d.net_val>=0?'left':'right')+':50%;width:'+Math.min(pct,100)*0.5+'%;height:100%;background:'+col+';border-radius:2px"></div>'
        +'</div>'
        +'<span style="font-size:.78em;color:'+col+';min-width:70px;text-align:right">'+label+'</span>'
        +'</div>';
    }}).join('');

    // ── Summary line ──────────────────────────────────────────────────────
    var todayNet = ds.length ? ds[0].net_val : 0;
    var totNetVal = ds.reduce(function(s,d){{return s+d.net_val;}}, 0);
    var netCol = totNetVal >= 0 ? '#3fb950' : '#f85149';
    var netLabel = totNetVal >= 0 ? 'MUA RÒNG' : 'BÁN RÒNG';
    var summaryHtml = '<div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:14px">'
      +'<div><div style="font-size:.72em;color:#8b949e">Hôm nay</div>'
      +'<div style="font-size:1.1em;font-weight:700;color:'+(todayNet>=0?'#3fb950':'#f85149')+'">'+(todayNet>=0?'+':'')+(todayNet/1e9).toFixed(1)+'B VND</div></div>'
      +'<div><div style="font-size:.72em;color:#8b949e">Tổng '+nDays+' ngày</div>'
      +'<div style="font-size:1.1em;font-weight:700;color:'+netCol+'">'+(totNetVal>=0?'+':'')+(totNetVal/1e9).toFixed(1)+'B VND — '+netLabel+'</div></div>'
      +'<div style="margin-left:auto;font-size:.72em;color:#8b949e;align-self:flex-end">Cập nhật: '+latDate+'</div>'
      +'</div>';

    // ── Top buy/sell tables ───────────────────────────────────────────────
    function makeFlowTable(rows, isNet) {{
      if (!rows.length) return '<div style="color:#8b949e;font-size:.85em">Chưa có dữ liệu</div>';
      var col = isNet ? '#3fb950' : '#f85149';
      var sign = isNet ? '+' : '';
      return '<table style="width:100%;font-size:.82em;border-collapse:collapse">'
        +'<thead><tr style="color:#8b949e">'
        +'<th style="text-align:left;padding:3px 6px">Mã</th>'
        +'<th style="text-align:right;padding:3px 6px">Mua (cp)</th>'
        +'<th style="text-align:right;padding:3px 6px">Bán (cp)</th>'
        +'<th style="text-align:right;padding:3px 6px">Ròng (B VND)</th>'
        +'<th style="text-align:right;padding:3px 6px">Ngày MR</th>'
        +'</tr></thead><tbody>'
        + rows.map(function(r){{
          return '<tr style="border-top:1px solid #21262d">'
            +'<td style="padding:3px 6px;font-weight:700">'+r.symbol+'</td>'
            +'<td style="padding:3px 6px;text-align:right;color:#8b949e">'+Math.round(r.buy_vol/1000).toLocaleString()+'k</td>'
            +'<td style="padding:3px 6px;text-align:right;color:#8b949e">'+Math.round(r.sell_vol/1000).toLocaleString()+'k</td>'
            +'<td style="padding:3px 6px;text-align:right;color:'+col+';font-weight:600">'
              +sign+(r.net_val/1e9).toFixed(1)+'B</td>'
            +'<td style="padding:3px 6px;text-align:right;color:#8b949e">'+(isNet?r.buy_days:r.sell_days)+'</td>'
            +'</tr>';
        }}).join('')
        +'</tbody></table>';
    }}

    var buyTable  = makeFlowTable(topBuy,  true);
    var sellTable = makeFlowTable(topSell, false);

    el.innerHTML =
      '<div class="card" style="margin-bottom:20px">'
      +'<div class="card-title">🌐 Dòng tiền khối ngoại — '+nDays+' ngày</div>'
      + summaryHtml
      +'<div style="font-size:.8em;color:#8b949e;margin-bottom:8px">Giá trị ròng mỗi ngày (B VND) — xanh = mua ròng, đỏ = bán ròng:</div>'
      + barRows
      +'</div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">'
      +'<div class="card"><div class="card-title" style="color:#3fb950">🟢 Mua ròng nhiều nhất</div>'+ buyTable +'</div>'
      +'<div class="card"><div class="card-title" style="color:#f85149">🔴 Bán ròng nhiều nhất</div>'+ sellTable +'</div>'
      +'</div>';
  }} catch(e) {{
    el.innerHTML = '<div style="color:#f85149;font-size:.85em">Lỗi render foreign flow: '+e.message+'</div>';
    console.error('renderForeignFlowSection error:', e);
  }}
}}

// ── Global filter bar ─────────────────────────────────────────────────────────
function buildGlobalFilterBar() {
  var sel = document.getElementById('gf-sector-select');
  if (!sel || typeof OPPORTUNITY_LIST === 'undefined') return;
  var sectorSet = {};
  (OPPORTUNITY_LIST||[]).forEach(function(d) { if (d.sector) sectorSet[d.sector] = true; });
  var sectors = Object.keys(sectorSet).sort();
  sectors.forEach(function(sec) {
    var opt = document.createElement('option');
    opt.value = sec;
    opt.textContent = (typeof SECTOR_VI_JS !== 'undefined' && SECTOR_VI_JS[sec]) ? SECTOR_VI_JS[sec] : sec.replace(/^ZN-/,'').replace(/-/g,' ');
    sel.appendChild(opt);
  });
}

function setGlobalFilter(sector, stock) {
  _gSector = sector || 'all';
  _gStock  = (stock || '').trim().toUpperCase();
  // Update dropdown
  var sel = document.getElementById('gf-sector-select');
  if (sel) sel.value = _gSector;
  // Update stock input display
  var inp = document.getElementById('gf-stock');
  if (inp && inp.value !== (_gStock || '')) inp.value = _gStock || '';
  // Update clear button + badge
  var isFiltered = (_gSector !== 'all') || _gStock;
  var clearBtn = document.getElementById('gf-clear');
  if (clearBtn) clearBtn.style.display = isFiltered ? '' : 'none';
  var badge = document.getElementById('gf-active-badge');
  if (badge) {
    if (_gStock) {
      badge.textContent = '→ ' + _gStock;
      badge.style.display = '';
    } else if (_gSector !== 'all') {
      var lbl = (typeof SECTOR_VI_JS !== 'undefined' && SECTOR_VI_JS[_gSector]) ? SECTOR_VI_JS[_gSector] : _gSector;
      badge.textContent = '→ ' + lbl;
      badge.style.display = '';
    } else {
      badge.style.display = 'none';
    }
  }
  // Save to sessionStorage
  try {
    sessionStorage.setItem('_gSector', _gSector);
    sessionStorage.setItem('_gStock', _gStock);
  } catch(e) {}
  // Re-render all tabs from scratch
  window._marketRendered = false;
  window._oppRendered    = false;
  window._bbRendered     = false;
  window._newsRendered   = false;
  // Re-render current active tab
  var activeId = 'market';
  var activeBtn = null;
  document.querySelectorAll('.mnav-btn').forEach(function(b) {
    if (b.classList.contains('active')) { activeBtn = b; }
  });
  var h = window.location.hash.match(/^#tab-([\w]+)/);
  if (h) activeId = h[1];
  switchTab(activeId, activeBtn);
}

function resetGlobalFilter() {
  var inp = document.getElementById('gf-stock');
  if (inp) inp.value = '';
  setGlobalFilter('all', '');
}

function gfStockInput(val) {
  // Only apply when user has typed >=2 chars or cleared
  var v = (val||'').trim().toUpperCase();
  if (v.length === 0 || v.length >= 2) {
    setGlobalFilter('all', v);
  }
}


// ── DETAIL MODAL ──────────────────────────────────────────────────────────────
window._detailCharts = [];

// ── buildStockVerdict: Phân tích mua/bán toàn diện ───────────────────────────
function buildStockVerdict(sym) {
  const s  = STOCKS.find(x => x.sym === sym);
  const pd = (typeof MARKET_POPUP_DATA !== 'undefined' && MARKET_POPUP_DATA[sym]) || null;
  const ph = (typeof PRICE_HISTORY    !== 'undefined' && PRICE_HISTORY[sym])    || null;
  const mo = (typeof MARKET_OVERVIEW  !== 'undefined' && MARKET_OVERVIEW)        || {};

  function n1(v)  { return (v !== null && v !== undefined) ? v.toFixed(1) : 'N/A'; }

  const rsi      = (pd && pd.rsi14  !== null && pd.rsi14  !== undefined) ? pd.rsi14  : (s ? s.rsi14  : null);
  // Derive MACD signal from histogram: positive hist = bullish crossover (BUY), negative = bearish (SELL)
  const _macdH = (pd && pd.macd_hist !== null && pd.macd_hist !== undefined) ? pd.macd_hist
               : (s ? s.macd_hist : null);
  const macdSig = (_macdH !== null && _macdH !== undefined)
               ? (_macdH > 0 ? 'BUY' : _macdH < 0 ? 'SELL' : 'NEUTRAL')
               : null;
  const bbPos    = (pd && pd.bb_pos !== null && pd.bb_pos !== undefined) ? pd.bb_pos : null;
  const pe       = (pd && pd.pe  !== null && pd.pe  !== undefined) ? pd.pe  : (s ? s.pe  : null);
  const roe      = (pd && pd.roe !== null && pd.roe !== undefined) ? pd.roe : (s ? s.roe : null);
  // bb7: universe symbols dùng BIGBOY_HISTORY làm fallback (MARKET_POPUP_DATA chỉ có non-universe)
  const bbh = (typeof BIGBOY_HISTORY !== 'undefined' && BIGBOY_HISTORY[sym]) || null;
  const bb7 = pd ? (pd.bb_7day || []) : (bbh ? (bbh.dates||[]).map(function(d,i){
    return {date:d, signal_type:(bbh.signal_types||[])[i], ltr_score:(bbh.ltr_scores||[])[i]||0};
  }).filter(function(b){return b.signal_type && b.signal_type!=='NORMAL';}).slice(-7) : []);
  const bbConsec = pd ? (pd.bb_consec || 0) : (bbh ? (bbh.consecutive_days || 0) : 0);
  const p5dChg   = pd ? (pd.price_5d_chg || null) : null;
  const ma20arr  = ph ? (ph.ma20 || []) : [];
  const ma50arr  = ph ? (ph.ma50 || []) : [];
  const ma20     = ma20arr.length ? ma20arr[ma20arr.length - 1] : null;
  const ma50     = ma50arr.length ? ma50arr[ma50arr.length - 1] : null;
  const closeRaw = ph && ph.closes && ph.closes.length ? ph.closes[ph.closes.length - 1] : (s ? s.close : null);
  const closeP   = closeRaw;
  const sector   = (s && s.sector) || (pd && pd.sector) || '';
  const hasStrong = bb7.some(b => b.signal_type === 'STRONG_BB');
  const hasBB     = bb7.some(b => b.signal_type === 'BB' || b.signal_type === 'STRONG_BB');
  const hasWatch  = bb7.some(b => b.signal_type === 'WATCH_BB');
  const nStrong   = bb7.filter(b => b.signal_type === 'STRONG_BB').length;

  // ── Trend Stage (Giai đoạn xu hướng dài hạn — Stan Weinstein) ────────────
  // Lấy above_ma200 từ MARKET_POPUP_DATA hoặc STOCKS (universe)
  const aboveMa20i  = (pd && pd.above_ma20  != null) ? !!pd.above_ma20
                    : (s  && s.above_ma20   != null) ? !!s.above_ma20  : null;
  const aboveMa50i  = (pd && pd.above_ma50  != null) ? !!pd.above_ma50
                    : (s  && s.above_ma50   != null) ? !!s.above_ma50  : null;
  const aboveMa200i = (pd && pd.above_ma200 != null) ? !!pd.above_ma200
                    : (s  && s.above_ma200  != null) ? !!s.above_ma200  : null;
  const sma200val   = (pd && pd.sma200 != null) ? pd.sma200
                    : (s  && s.sma200  != null) ? s.sma200  : null;
  // Stage 2: trên MA20 + MA50 + MA200 → uptrend 3 khung thời gian
  // Transition: trên MA200 nhưng đang điều chỉnh (dưới MA20 hoặc MA50)
  // Stage 4: dưới MA200 → downtrend dài hạn — tín hiệu ngắn hạn kém tin cậy hơn
  var trendStage = 'unknown';
  if (aboveMa200i === null) { trendStage = 'unknown'; }
  else if (aboveMa200i && aboveMa50i && aboveMa20i) { trendStage = 'stage2'; }
  else if (aboveMa200i)  { trendStage = 'transition'; }
  else                   { trendStage = 'stage4'; }

  // ── Score (0-100) ─────────────────────────────────────────────────────────
  var score = 0, momentumScore = 0, bbScore = 0, valScore = 0, sectorScore = 10;
  if (rsi !== null) {
    if (rsi >= 40 && rsi <= 65) momentumScore += 15;
    else if ((rsi >= 30 && rsi < 40) || (rsi > 65 && rsi <= 70)) momentumScore += 8;
  }
  if (macdSig === 'BUY') momentumScore += 15;
  else if (macdSig === 'WATCH') momentumScore += 7;
  if (hasStrong && bbConsec >= 3) bbScore = 30;
  else if (hasStrong) bbScore = 20;
  else if (hasBB)     bbScore = 10;
  else if (hasWatch)  bbScore = 5;
  if (pe !== null) {
    if (pe < 10) valScore = 20; else if (pe < 15) valScore = 15;
    else if (pe < 20) valScore = 10; else if (pe < 25) valScore = 5;
  } else { valScore = 8; }
  if (mo.sector_full && sector) {
    var secD = mo.sector_full.find(x => x.sector === sector);
    if (secD) {
      if (secD.avg_pct > 0.5) sectorScore = 20;
      else if (secD.avg_pct > 0) sectorScore = 15;
      else if (secD.avg_pct > -0.5) sectorScore = 8;
      else sectorScore = 3;
    }
  }
  score = momentumScore + bbScore + valScore + sectorScore;
  if (rsi !== null && rsi > 70) score -= 15;
  if (p5dChg !== null && p5dChg > 12) score -= 10;
  // Trend Stage: Stage2 uptrend bonus +5; Stage4 penalty -15; Transition -5
  if (trendStage === 'stage2')     score += 5;
  if (trendStage === 'stage4')     score -= 15;
  if (trendStage === 'transition') score -= 5;
  score = Math.min(100, Math.max(0, Math.round(score)));

  var verdictLabel, verdictColor, verdictBg, verdictIcon;
  if (score >= 70)      { verdictLabel='NÊN MUA';  verdictIcon='🟢'; verdictColor='#3fb950'; verdictBg='#1a4731'; }
  else if (score >= 50) { verdictLabel='THEO DÕI'; verdictIcon='🟡'; verdictColor='#d29922'; verdictBg='#3d2c00'; }
  else                  { verdictLabel='TRÁNH';     verdictIcon='🔴'; verdictColor='#f85149'; verdictBg='#3d0f0f'; }

  // Stage4: không override cứng — penalty -15pts đã đủ hạ nhãn.
  // Badge ⚠️ Downtrend dài hạn vẫn hiển thị trong verdict card để người dùng tự cân nhắc.

  // Badge Trend Stage hiển thị trong verdict card
  var trendStageBadge = '';
  if (trendStage === 'stage2') {
    trendStageBadge = '<span style="display:inline-block;background:#1a4731;border:1px solid #3fb950;border-radius:4px;padding:1px 7px;font-size:.68em;color:#3fb950;margin-left:6px">📈 Uptrend xác nhận</span>';
  } else if (trendStage === 'transition') {
    trendStageBadge = '<span style="display:inline-block;background:#3d2c00;border:1px solid #d29922;border-radius:4px;padding:1px 7px;font-size:.68em;color:#d29922;margin-left:6px">⚡ Điều chỉnh trong uptrend</span>';
  } else if (trendStage === 'stage4') {
    trendStageBadge = '<span style="display:inline-block;background:#3d0f0f;border:1px solid #f85149;border-radius:4px;padding:1px 7px;font-size:.68em;color:#f85149;margin-left:6px">⚠️ Downtrend dài hạn (dưới MA200)</span>';
  }

  var scoreBreakdown =
    '<div style="display:flex;gap:4px;margin-top:6px">'
    +[['Momentum',momentumScore,30],['Dòng tiền',bbScore,30],['Định giá',valScore,20],['Ngành',sectorScore,20]].map(function(d){
      var col = d[1]/d[2] >= 0.7 ? '#3fb950' : d[1]/d[2] >= 0.4 ? '#d29922' : '#f85149';
      return '<div style="flex:1;text-align:center"><div style="font-size:.62em;color:#8b949e">'+d[0]+'</div>'
        +'<div style="font-size:.72em;font-weight:700;color:'+col+'">'+d[1]+'/'+d[2]+'</div></div>';
    }).join('')+'</div>';

  var verdictCard =
    '<div style="background:'+verdictBg+';border:2px solid '+verdictColor+';border-radius:12px;padding:14px 16px;margin-bottom:14px">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap">'
    +'<span style="font-size:1.4em">'+verdictIcon+'</span>'
    +'<span style="font-size:.8em;font-weight:800;color:'+verdictColor+';letter-spacing:1px;text-transform:uppercase">PHÂN TÍCH MUA/BÁN — '+verdictLabel+'</span>'
    +trendStageBadge
    +'</div>'
    +'<div style="display:flex;align-items:center;gap:8px">'
    +'<div style="flex:1;background:#0d111780;border-radius:6px;height:10px;overflow:hidden">'
    +'<div style="width:'+score+'%;height:100%;background:'+verdictColor+';border-radius:6px"></div>'
    +'</div><span style="font-size:1.2em;font-weight:800;color:'+verdictColor+'">'+score+'</span>'
    +'<span style="font-size:.7em;color:#8b949e">/100</span></div>'
    +scoreBreakdown+'</div>';

  // ── Dòng tiền tổ chức ────────────────────────────────────────────────────
  var flowLines = [];
  if (!bb7.length) {
    flowLines.push('Chưa có dữ liệu dòng tiền tổ chức trong 7 ngày qua.');
  } else {
    if (bbConsec >= 3 && hasStrong)
      flowLines.push('🟢 <strong>'+bbConsec+' ngày liên tiếp</strong> tổ chức mua ròng với tín hiệu STRONG_BB — dấu hiệu tích lũy có hệ thống, rất tích cực.');
    else if (bbConsec >= 2)
      flowLines.push('🟡 Tổ chức mua <strong>'+bbConsec+' ngày liên tiếp</strong> — xu hướng dòng tiền đang hình thành, chờ xác nhận thêm.');
    else if (hasStrong)
      flowLines.push('🟢 Có <strong>'+nStrong+' phiên STRONG_BB</strong> trong 7 ngày — tổ chức đặt lệnh mua lớn ở vùng ATC, áp lực mua rõ ràng.');
    else if (hasBB)
      flowLines.push('🔵 Tín hiệu BB (mua vừa) xuất hiện — tổ chức có quan tâm nhưng chưa vào lệnh lớn. Theo dõi thêm.');
    else
      flowLines.push('🔵 Chỉ có WATCH_BB — tổ chức đang theo dõi, chưa vào lệnh tích lũy rõ ràng.');
    var avgLtr = bb7.reduce((a,b) => a+b.ltr_score, 0)/bb7.length;
    if (avgLtr > 70)
      flowLines.push('💪 LTR trung bình <strong>'+Math.round(avgLtr)+'</strong> — lực mua tổ chức mạnh, họ đang chủ động đẩy giá lên.');
    if (p5dChg !== null) {
      if (p5dChg > 5 && hasStrong)
        flowLines.push('⚠️ Giá đã tăng <strong>'+n1(p5dChg)+'%</strong> trong 5 phiên dù tổ chức vào — có thể họ đã vào sớm, cẩn thận mua đuổi.');
      else if (p5dChg < -3 && hasStrong)
        flowLines.push('✅ Giá giảm <strong>'+n1(Math.abs(p5dChg))+'%</strong> nhưng tổ chức vẫn mua — tích lũy vùng giá thấp, tín hiệu rất tích cực.');
    }
  }
  var flowHtml =
    '<div class="dm-section"><div class="dm-section-title">🐋 Dòng tiền tổ chức</div>'
    +'<div style="display:flex;flex-direction:column;gap:5px">'
    +flowLines.map(l => '<div style="font-size:.83em;color:#c9d1d9;padding:7px 10px;background:#21262d;border-radius:8px;line-height:1.55">'+l+'</div>').join('')
    +'</div></div>';

  // ── Kỹ thuật ─────────────────────────────────────────────────────────────
  var techLines = [];
  if (rsi !== null) {
    var rsiLabel = rsi > 70 ? 'quá mua — rủi ro điều chỉnh, chờ RSI về dưới 65'
      : rsi > 60 ? 'vùng mạnh, chưa quá mua — xu hướng tăng đang được xác nhận'
      : rsi >= 40 ? 'trung tính — chưa có xu hướng rõ, cần thêm tín hiệu'
      : rsi >= 30 ? 'vùng yếu — thận trọng, chờ phục hồi trên 40'
      : 'quá bán — có thể xảy ra phục hồi kỹ thuật ngắn hạn';
    var rsiCol = rsi > 70 ? '#f85149' : rsi > 55 ? '#3fb950' : rsi >= 40 ? '#d29922' : '#f85149';
    techLines.push('RSI = <strong style="color:'+rsiCol+'">'+n1(rsi)+'</strong> → '+rsiLabel+'.');
  }
  if (macdSig) {
    var macdTxt = macdSig === 'BUY'
      ? 'MACD cắt lên đường tín hiệu → <strong style="color:#3fb950">xu hướng tăng đang hình thành</strong>.'
      : macdSig === 'SELL'
      ? 'MACD cắt xuống → <strong style="color:#f85149">xu hướng giảm</strong>, nên thận trọng.'
      : 'MACD trung tính — chờ tín hiệu rõ hơn.';
    techLines.push(macdTxt);
  }
  if (closeP !== null && (ma20 !== null || ma50 !== null)) {

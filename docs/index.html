        const lastMacd = macdArr.length ? macdArr[macdArr.length-1] : null;
        const scArr  = (sh.scores||[]).filter(v => v != null);
        const firstS = scArr.length >= 5 ? scArr[scArr.length-5] : (scArr.length ? scArr[0] : null);
        const lastS  = scArr.length ? scArr[scArr.length-1] : null;
        const trendStr = (firstS!==null&&lastS!==null)
          ? (lastS>firstS?'↑ Tăng':lastS<firstS?'↓ Giảm':'→ Ổn định') : '—';
        const trendSuf = (firstS!==null&&lastS!==null) ? ' ('+firstS+'→'+lastS+')' : '';

        const mRows = [
          ['Sức mạnh giá (RSI 14)',
            lastRsi!=null?lastRsi.toFixed(1):'—',
            rsiAvg!=null?'avg '+rsiAvg.toFixed(1):'—',
            lastRsi!=null?(lastRsi<35?'#3fb950':lastRsi>70?'#f85149':'#c9d1d9'):'#8b949e'],
          ['MACD hist',
            lastMacd!=null?(lastMacd>0?'+':'')+lastMacd.toFixed(3):'—',
            lastMacd!=null?(lastMacd>0?'✓ dương':'✗ âm'):'—',
            lastMacd!=null?(lastMacd>0?'#3fb950':'#f85149'):'#8b949e'],
          ['Xu hướng điểm', trendStr+trendSuf, '—', '#c9d1d9'],
          ['BB Days (60d)',
            (sh.bb_days||0)+' ngày',
            sh.bb_days>3?'Tổ chức gom':'—',
            sh.bb_days>3?'#d29922':'#c9d1d9'],
          ['Avg LTR score',
            sh.bb_ltr_avg!=null?sh.bb_ltr_avg.toFixed(1):'—',
            sh.bb_ltr_avg!=null&&sh.bb_ltr_avg>60?'Mạnh':'—',
            sh.bb_ltr_avg!=null&&sh.bb_ltr_avg>60?'#3fb950':'#c9d1d9'],
        ];

        mtEl.innerHTML =
          '<table style="width:100%;border-collapse:collapse">'+
          '<tr style="border-bottom:1px solid #30363d">'+
            '<th style="color:#8b949e;font-weight:600;text-align:left;padding:4px 4px;font-size:.78em">Chỉ số</th>'+
            '<th style="color:#8b949e;font-weight:600;text-align:right;padding:4px 4px;font-size:.78em">Hiện tại</th>'+
            '<th style="color:#8b949e;font-weight:600;text-align:right;padding:4px 4px;font-size:.78em">Tham chiếu</th>'+
          '</tr>'+
          mRows.map(([label, val, ref, color]) =>
            '<tr>'+
            '<td style="padding:5px 4px;color:#c9d1d9;font-size:.8em">'+label+'</td>'+
            '<td style="text-align:right;padding:5px 4px;font-weight:600;color:'+color+';font-size:.8em">'+val+'</td>'+
            '<td style="text-align:right;padding:5px 4px;color:#8b949e;font-size:.76em">'+ref+'</td>'+
            '</tr>'
          ).join('')+
          '</table>';
      }
    }

    // ── Valuation table ────────────────────────────────────────────────────
    if (sf) {
      const valEl = document.getElementById('dm-valuation');
      if (valEl) {
        // Lấy PE/ROE từ FUNDAMENTAL_HISTORY nếu SECTOR_FUND null (fallback)
        var fhLatest = (typeof FUNDAMENTAL_HISTORY !== 'undefined' && FUNDAMENTAL_HISTORY[sym] && FUNDAMENTAL_HISTORY[sym][0]) || null;

        // pe/roe từ SECTOR_FUND (dbo.financial_basic_index 2021) hoặc fallback sang ts.fundamental_history (2025)
        var vPE  = sf.pe  != null ? sf.pe  : (fhLatest && fhLatest.pe  != null ? fhLatest.pe  : null);
        var vPB  = sf.pb  != null ? sf.pb  : (fhLatest && fhLatest.pb  != null ? fhLatest.pb  : null);
        // SECTOR_FUND roe = % (e.g. 15.5), fh.roe = decimal (0.155) → cần nhân 100
        var vROE = sf.roe != null ? sf.roe : (fhLatest && fhLatest.roe != null ? fhLatest.roe * 100 : null);

        // FIX: Python trả market_pe/pb/roe, không phải sector_pe/pb/roe
        var mktPE  = sf.market_pe  != null ? sf.market_pe  : sf.sector_pe;   // compat
        var mktPB  = sf.market_pb  != null ? sf.market_pb  : sf.sector_pb;
        var mktROE = sf.market_roe != null ? sf.market_roe : sf.sector_roe;

        const vRows = [
          ['P/E',  vPE,  mktPE,  false, 'x'],
          ['P/B',  vPB,  mktPB,  false, 'x'],
          ['ROE%', vROE, mktROE, true,  '%'],
        ];
        let tbl =
          '<table style="width:100%;border-collapse:collapse">'+
          '<tr style="border-bottom:1px solid #30363d">'+
            '<th style="color:#8b949e;text-align:left;padding:5px 6px;font-size:.78em"></th>'+
            '<th style="color:#8b949e;text-align:right;padding:5px 6px;font-size:.78em">'+sym+'</th>'+
            '<th style="color:#8b949e;text-align:right;padding:5px 6px;font-size:.78em">VN-Index avg</th>'+
            '<th style="color:#8b949e;text-align:left;padding:5px 6px;font-size:.78em">Nhận xét</th>'+
          '</tr>';
        vRows.forEach(function(row) {
          const label=row[0], sv=row[1], secV=row[2], higherBetter=row[3], suffix=row[4];
          // Hiển thị giá trị — kể cả âm (không ẩn bằng "—")
          var strDisplay;
          if (sv === null || sv === undefined) {
            strDisplay = '<span style="color:#484f58">N/A</span>';
          } else if (label === 'P/E' && sv <= 0) {
            strDisplay = '<span style="color:#8b949e" title="Công ty lỗ — P/E không có ý nghĩa">Lỗ</span>';
          } else if (label === 'ROE%' && sv < 0) {
            strDisplay = '<span style="color:#f85149">'+sv.toFixed(1)+suffix+'</span>';
          } else {
            strDisplay = sv.toFixed(1)+suffix;
          }
          const secStr = secV != null ? secV.toFixed(1)+suffix : '<span style="color:#484f58">—</span>';
          // Chỉ so sánh khi cả 2 có giá trị dương
          const svPos  = sv != null && sv > 0;
          const secPos = secV != null && secV > 0;
          const better = (svPos && secPos) ? (higherBetter ? sv > secV : sv < secV) : null;
          const color  = sv===null ? '#484f58' : (sv < 0 ? '#f85149' : (better===null ? '#c9d1d9' : (better ? '#3fb950' : '#f85149')));
          const noteStr = better===null ? '<span style="color:#484f58">—</span>'
            : (label==='ROE%' ? (better?'✓ Tốt hơn TT':'✗ Thấp hơn TT')
                               : (better?'✓ Rẻ hơn TT' :'✗ Đắt hơn TT'));
          tbl +=
            '<tr>'+
            '<td style="padding:5px 6px;color:#c9d1d9;font-weight:600;font-size:.85em">'+label+'</td>'+
            '<td style="text-align:right;padding:5px 6px;font-weight:700;color:'+color+';font-size:.85em">'+strDisplay+'</td>'+
            '<td style="text-align:right;padding:5px 6px;color:#8b949e;font-size:.85em">'+secStr+'</td>'+
            '<td style="padding:5px 6px;font-size:.8em;color:'+(better===null?'#8b949e':(better?'#3fb950':'#f85149'))+'">'+noteStr+'</td>'+
            '</tr>';
        });
        tbl += '</table>';

        // Auto verdict — dùng vPE/vPB/vROE (đã supplement)
        const peOk  = vPE  != null && vPE  > 0 && mktPE  != null && vPE  < mktPE;
        const pbOk  = vPB  != null && vPB  > 0 && mktPB  != null && vPB  < mktPB;
        const roeOk = vROE != null && mktROE != null && vROE > mktROE;
        const goodCnt = [peOk,pbOk,roeOk].filter(Boolean).length;
        const hasLoss = (vPE !== null && vPE <= 0) || (vROE !== null && vROE < 0);
        let verdict = '';
        if (hasLoss) {
          verdict = sym+' đang ghi nhận lỗ — P/E và ROE không có ý nghĩa so sánh. Cần theo dõi tín hiệu phục hồi lợi nhuận.';
        } else if (goodCnt === 3) {
          verdict = sym+' giao dịch rẻ hơn VN-Index về cả P/E, P/B trong khi ROE cao hơn — định giá hấp dẫn.';
        } else if (goodCnt >= 2) {
          const goods = [peOk?'P/E':'',pbOk?'P/B':'',roeOk?'ROE':''].filter(Boolean).join(', ');
          verdict = sym+' có '+goods+' tốt hơn thị trường — định giá tương đối hấp dẫn.';
        } else if (goodCnt === 1) {
          const weak = [(!peOk&&vPE!=null&&vPE>0)?'P/E':'',(!pbOk&&vPB!=null&&vPB>0)?'P/B':'',(!roeOk&&vROE!=null&&vROE>0)?'ROE':''].filter(Boolean).join(', ');
          verdict = sym+' định giá ở mức bình thường đến cao so với thị trường'+(weak?' — đặc biệt '+weak+' cao hơn trung bình':'')+'.';
        } else if (vPE||vPB||vROE) {
          verdict = sym+' định giá cao hơn thị trường trên hầu hết chỉ số — cần tăng trưởng tốt để hỗ trợ mức giá hiện tại.';
        }
        if (verdict) {
          tbl += '<div style="margin-top:10px;padding:10px;background:#21262d;border-radius:8px;font-size:.82em;'+
            'color:#c9d1d9;line-height:1.6;border-left:3px solid #d29922">'+verdict+'</div>';
        }
        valEl.innerHTML = tbl;
      }
    }

    // ── Scroll to BigBoy section if focus==='bigboy' ───────────────────────
    if (focus === 'bigboy') {
      setTimeout(function() {
        const bbSection = document.getElementById('detail-bb-section');
        if (bbSection) bbSection.scrollIntoView({behavior:'smooth', block:'start'});
      }, 100);
    }
  });
}

// ── BIGBOY DETAIL POPUP (riêng biệt — đọc từ MARKET_OVERVIEW.bigboy_patterns) ─
function showBigBoyDetail(sym) {
  // 1. Nguồn data
  const s  = STOCKS.find(x => x.sym === sym);
  const pd = (typeof MARKET_POPUP_DATA !== 'undefined' && MARKET_POPUP_DATA[sym]) || null;
  const bo = MARKET_OVERVIEW || {};

  // 2. BigBoy data — ưu tiên bigboy_patterns.all_7day, fallback BIGBOY_HISTORY cho universe
  const allBb7 = (bo.bigboy_patterns && bo.bigboy_patterns.all_7day) || [];
  var bb7 = allBb7.filter(function(b) { return b.symbol === sym; });
  // Fallback: universe symbols không có trong MARKET_POPUP_DATA → dùng BIGBOY_HISTORY
  const bbhFull = (typeof BIGBOY_HISTORY !== 'undefined' && BIGBOY_HISTORY[sym]) || null;
  if (!bb7.length && bbhFull && bbhFull.dates) {
    bb7 = bbhFull.dates.map(function(d,i) {
      return {symbol:sym, date:d, signal_type:(bbhFull.signal_types||[])[i]||'',
               ltr_score:(bbhFull.ltr_scores||[])[i]||0};
    }).filter(function(b){return b.signal_type && b.signal_type!=='NORMAL';}).slice(-7);
  }
  const bb7Dates = [...new Set(bb7.map(function(b){return b.date;}) )];
  const bbConsec = bb7Dates.length;
  const hasStrongBb = bb7.some(function(b){return b.signal_type==='STRONG_BB';});
  const hasBb       = bb7.some(function(b){return b.signal_type!=='NORMAL';});

  // Also check today's signal from bigboy_today
  const todayBb = (bo.bigboy_today||[]).find(function(b){return b.sym===sym;}) || null;

  // 3. Company info
  const companyName = (s && s.name) || (pd && pd.name) || (todayBb && todayBb.company_name) || sym;
  const industry    = (todayBb && todayBb.industry) || (pd && pd.sector) || (s && s.sector) || '';
  const indVI       = industry.replace('ZN-','');

  // 4. Price
  const closeP = (s && s.close) ? s.close : (pd && pd.close ? pd.close/1000 : null);
  const price5dChg = pd ? (pd.price_5d_chg || null) : null;

  // 5. Technicals
  const rsi   = (pd && pd.rsi14 !== null && pd.rsi14 !== undefined) ? pd.rsi14 : (s ? s.rsi14 : null);
  // Derive MACD signal from histogram
  const _macdHBb = (pd && pd.macd_hist !== null && pd.macd_hist !== undefined) ? pd.macd_hist
                 : (s ? s.macd_hist : null);
  const macdS = (_macdHBb !== null && _macdHBb !== undefined)
              ? (_macdHBb > 0 ? 'BUY' : _macdHBb < 0 ? 'SELL' : 'NEUTRAL')
              : null;
  const bbPos = (pd && pd.bb_pos !== null && pd.bb_pos !== undefined) ? pd.bb_pos : null;

  // 6. Fundamentals
  const pe  = (pd && pd.pe  !== null) ? pd.pe  : (s ? s.pe  : null);
  const roe = (pd && pd.roe !== null) ? pd.roe : (s ? s.roe : null);
  const eps = (pd && pd.eps !== null) ? pd.eps : (s ? s.eps : null);

  // 7. Screener
  const scrScore  = (pd && pd.screener_score !== null) ? pd.screener_score : (s ? s.score  : null);
  const scrSignal = (pd && pd.screener_signal) ? pd.screener_signal : (s ? s.signal : null);

  // ── Verdict ──────────────────────────────────────────────────────────────────
  const isOverbought = rsi !== null && rsi > 70;
  const isPriceRunUp = price5dChg !== null && price5dChg > 10;
  const isFirstSignal = bbConsec <= 1 && hasBb;
  var verdictIcon='⚪', verdictLabel='CHƯA RÕ', verdictMsg='', verdictBg='#21262d', verdictBdr='#484f58';
  var riskWarnings = [];

  if (isOverbought)  riskWarnings.push('⚠️ <strong>RSI '+rsi.toFixed(0)+'</strong> — vùng quá mua');
  if (isPriceRunUp)  riskWarnings.push('⚠️ <strong>Giá tăng '+price5dChg.toFixed(1)+'% trong 5 phiên</strong> — rủi ro mua đỉnh');
  if (isFirstSignal) riskWarnings.push('ℹ️ <strong>Tín hiệu đầu tiên</strong> — chờ xác nhận 1-2 phiên');
  if (pe !== null && pe > 30) riskWarnings.push('⚠️ <strong>P/E='+pe.toFixed(1)+'x</strong> — định giá cao');

  if (hasStrongBb && bbConsec >= 2 && !isOverbought && !isPriceRunUp) {
    verdictIcon='🟢'; verdictLabel='NÊN QUAN TÂM'; verdictBg='#1a4731'; verdictBdr='#3fb950';
    verdictMsg = 'Tổ chức tích lũy '+(bbConsec>=3?bbConsec+' ngày liên tiếp':'có STRONG_BB')+' — dòng tiền xác nhận'+(isOverbought?', nhưng RSI cao — đợi pullback':'.') ;
  } else if (hasBb && !isOverbought) {
    verdictIcon='🟡'; verdictLabel='THEO DÕI THÊM'; verdictBg='#3d2c00'; verdictBdr='#d29922';
    verdictMsg = 'Có tín hiệu BigBoy nhưng '+(isFirstSignal?'mới xuất hiện lần đầu':'chưa đủ mạnh')+'. Chờ xác nhận 1-2 phiên.';
  } else if (hasBb && isOverbought) {
    verdictIcon='🟡'; verdictLabel='THẬN TRỌNG — ĐỢI PULLBACK'; verdictBg='#3d2c00'; verdictBdr='#d29922';
    verdictMsg = 'Tổ chức quan tâm nhưng RSI='+rsi.toFixed(0)+' — quá mua. Chờ giá về hỗ trợ.';
  } else if (!hasBb) {
    verdictIcon='⚪'; verdictLabel='CHƯA CÓ TÍN HIỆU TỔCHỨC'; verdictBg='#21262d'; verdictBdr='#484f58';
    verdictMsg = 'Không có tín hiệu BigBoy trong 7 ngày gần nhất.';
  }

  const signalCard =
    '<div style="background:'+verdictBg+';border:2px solid '+verdictBdr+';border-radius:12px;padding:14px 16px;margin-bottom:14px">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">'
    +'<span style="font-size:1.4em">'+verdictIcon+'</span>'
    +'<span style="font-size:.75em;font-weight:700;color:'+verdictBdr+';letter-spacing:1px;text-transform:uppercase">'+verdictLabel+'</span>'
    +'</div>'
    +'<div style="font-size:.88em;color:#e6edf3;line-height:1.6">'+verdictMsg+'</div>'
    +(riskWarnings.length
      ? '<div style="margin-top:8px;display:flex;flex-direction:column;gap:3px">'
        +riskWarnings.map(function(w){return '<div style="font-size:.78em;color:#c9d1d9;background:#0d111780;border-radius:6px;padding:4px 8px">'+w+'</div>';}).join('')+'</div>'
      : '')
    +'</div>';

  // ── 30-day BigBoy history (enhanced detail) ──────────────────────────────
  function _bbColor(st) {
    return st==='STRONG_BB'?'#3fb950':st==='BB'?'#d29922':st==='VOL_SURGE'?'#58a6ff':st==='WATCH_BB'?'#bc8cff':'#8b949e';
  }
  function _bbIcon(st) {
    return st==='STRONG_BB'?'★':st==='BB'?'●':st==='VOL_SURGE'?'⚡':st==='WATCH_BB'?'◈':'○';
  }
  function _bbMeaning(st, ltr) {
    if (st==='STRONG_BB') return 'Mua lớn ATC — tổ chức gom mạnh'+(ltr>=100?' (cực kỳ quyết liệt)':ltr>=80?' (quyết liệt)':'');
    if (st==='BB')        return 'Mua ATC vừa — tổ chức đang tích lũy'+(ltr>=70?' (đều đặn, bền vững)':'');
    if (st==='VOL_SURGE') return 'Khối lượng đột biến — smart money tham gia bất thường';
    if (st==='WATCH_BB')  return 'Dấu hiệu sơ bộ — chưa đủ để xác nhận';
    return '';
  }
  function _ltrBar(ltr) {
    const pct = Math.min(100, ltr);
    const col = ltr>=100?'#f85149':ltr>=70?'#3fb950':ltr>=50?'#d29922':'#58a6ff';
    const lbl = ltr>=100?'Cực mạnh':ltr>=70?'Mạnh':ltr>=50?'Vừa':'Nhẹ';
    return '<div style="display:flex;align-items:center;gap:5px;flex:1;min-width:120px">'
      +'<div style="flex:1;background:#0d1117;border-radius:3px;height:5px;overflow:hidden">'
      +'<div style="width:'+pct+'%;height:100%;background:'+col+'"></div></div>'
      +'<span style="font-size:.65em;color:'+col+';min-width:62px;text-align:right;white-space:nowrap">'+ltr+' — '+lbl+'</span>'
      +'</div>';
  }

  // Build 30-day rows: prefer bbhFull full history, fallback to bb7
  var bb30rows = [];
  if (bbhFull && bbhFull.dates && bbhFull.dates.length) {
    bb30rows = bbhFull.dates.map(function(d,i) {
      return {date:d, signal_type:(bbhFull.signal_types||[])[i]||'NORMAL', ltr_score:(bbhFull.ltr_scores||[])[i]||0};
    }).filter(function(r){return r.signal_type && r.signal_type!=='NORMAL';}).slice(-30);
  } else {
    bb30rows = bb7.map(function(b){return {date:b.date,signal_type:b.signal_type,ltr_score:b.ltr_score};});
  }
  bb30rows.sort(function(a,b){return a.date<b.date?-1:1;});

  // Summary stats
  const _tot30  = (bbhFull && bbhFull.total_days_30d  != null) ? bbhFull.total_days_30d  : bb30rows.length;
  const _avg30  = (bbhFull && bbhFull.avg_ltr_30d     != null) ? bbhFull.avg_ltr_30d
    : (bb30rows.length ? bb30rows.reduce(function(a,r){return a+r.ltr_score;},0)/bb30rows.length : 0);
  const _consec = (bbhFull && bbhFull.consecutive_days != null) ? bbhFull.consecutive_days : bbConsec;
  const _trend  = (bbhFull && bbhFull.trend) ? bbhFull.trend : '';
  const _trendLbl = _trend==='INCREASING'?'📈 Tăng dần':_trend==='DECREASING'?'📉 Giảm dần':_trend==='STABLE'?'➡️ Ổn định':'—';

  // Compact box visualization (each box = one signal day, ordered old→new)
  const _bxSz = bb30rows.length > 20 ? '20px' : '26px';
  const boxes30 = bb30rows.map(function(r) {
    const col = _bbColor(r.signal_type);
    const ico = _bbIcon(r.signal_type);
    return '<div style="width:'+_bxSz+';height:'+_bxSz+';background:'+col+'22;border-radius:4px;border:1.5px solid '+col
      +';display:flex;align-items:center;justify-content:center;font-size:9px;color:'+col+';font-weight:700;flex-shrink:0" '
      +'title="'+r.date+': '+r.signal_type+' (LTR '+r.ltr_score+')">'+ico+'</div>';
  }).join('');

  // Detail rows — show last 15 (most recent first shown at bottom)
  const _showRows = bb30rows.slice(-15);
  const detailRows30 = _showRows.map(function(r) {
    const col = _bbColor(r.signal_type);
    const ico = _bbIcon(r.signal_type);
    return '<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #21262d;flex-wrap:wrap">'
      +'<span style="font-size:.7em;color:#8b949e;min-width:73px;flex-shrink:0">'+r.date+'</span>'
      +'<span style="font-size:.7em;background:'+col+'20;color:'+col+';border:1px solid '+col+'44;border-radius:4px;padding:1px 6px;flex-shrink:0;white-space:nowrap">'+ico+' '+r.signal_type+'</span>'
      +_ltrBar(r.ltr_score)
      +'<div style="width:100%;padding-left:73px;font-size:.67em;color:#8b949e;margin-top:1px;line-height:1.4">↳ '+_bbMeaning(r.signal_type, r.ltr_score)+'</div>'
      +'</div>';
  }).join('');

  // Date range label (earliest → latest signal in the data)
  // Window label: dùng REPORT_AS_OF để tính kỳ 30 ngày chính xác theo ngày báo cáo
  var _bbDateLabel = '';
  if (typeof REPORT_AS_OF === 'string' && REPORT_AS_OF) {
    const _asOfD  = new Date(REPORT_AS_OF);
    const _fromD  = new Date(_asOfD - 30*24*3600*1000);
    const _pdd    = function(d){return (d.getDate()<10?'0':'')+d.getDate()+'/'+(d.getMonth()<9?'0':'')+(d.getMonth()+1);};
    _bbDateLabel  = 'Kỳ xem: ' + _pdd(_fromD) + ' → ' + _pdd(_asOfD);
  } else if (bb30rows.length) {
    const _bbDateFrom = bb30rows[0].date.slice(5).replace('-','/');

// ── NEWS TAB ──────────────────────────────────────────────────────────────────
function buildNewsChips() {
  const bar = document.getElementById('news-sector-chips');
  const first = bar.children[0]; // "Tat ca" chip
  bar.innerHTML = '';
  bar.appendChild(first);
  first.className = 'chip' + (activeNewsSector==='ALL' ? ' active' : '');
  Object.keys(SECTOR_NEWS).forEach(sec => {
    const chip = document.createElement('span');
    chip.className = 'chip' + (activeNewsSector===sec ? ' active' : '');
    chip.textContent = sec;
    chip.onclick = function() { filterNewsSector(sec, this); };
    bar.appendChild(chip);
  });
}

function filterNewsSector(sec, el) {
  activeNewsSector = sec;
  activeNewsSymbol = null;
  document.querySelectorAll('#news-sector-chips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('news-clear-btn').style.display = 'none';
  renderNews();
}

function clearNewsFilter() {
  activeNewsSymbol = null;
  activeNewsSector = 'ALL';
  document.getElementById('news-search').value = '';
  document.getElementById('news-clear-btn').style.display = 'none';
  document.querySelectorAll('#news-sector-chips .chip').forEach(c=>c.classList.remove('active'));
  const allChip = document.querySelector('#news-sector-chips .chip');
  if (allChip) allChip.classList.add('active');
  renderNews();
}

function renderNews() {
  const q = (document.getElementById('news-search').value||'').toLowerCase();
  const clearBtn = document.getElementById('news-clear-btn');
  const list = document.getElementById('news-list');
  const empty = document.getElementById('news-empty');

  // Case 1: Sector chip selected — show sector news from SECTOR_NEWS
  if (activeNewsSector !== 'ALL' && !activeNewsSymbol) {
    const secNews = SECTOR_NEWS[activeNewsSector] || [];
    let filtered = secNews;
    if (q) filtered = filtered.filter(n=>(n.title||'').toLowerCase().includes(q));
    clearBtn.style.display = 'none';
    if (!filtered.length) { list.innerHTML=''; empty.style.display=''; return; }
    empty.style.display = 'none';
    list.innerHTML = filtered.map(n =>
      '<div class="news-item-main">'+
      '<span style="font-size:.7em;color:#58a6ff;margin-right:6px;font-weight:600;padding:1px 7px;border-radius:8px;background:#58a6ff22;border:1px solid #58a6ff44">'+activeNewsSector+'</span>'+
      '<span class="news-date-main">'+(n.date||'')+'</span>'+
      '<span class="news-title-main">'+(n.link?'<a href="'+n.link+'" target="_blank">'+n.title+'</a>':n.title)+'</span>'+
      '</div>'
    ).join('');
    return;
  }

  // Case 2: All stocks news (with optional symbol filter)
  let allNews = [];
  STOCKS.forEach(s => {
    if (s.news && s.news.length) {
      s.news.forEach(n => allNews.push({sym:s.sym, sector:s.sector, ...n}));
    }
  });
  allNews.sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  let filtered = allNews;
  if (activeNewsSymbol) {
    filtered = filtered.filter(n=>n.sym===activeNewsSymbol);
    clearBtn.style.display = '';
    clearBtn.textContent = '✕ Xoa loc: '+activeNewsSymbol;
  } else {
    clearBtn.style.display = 'none';
  }
  if (q) {
    filtered = filtered.filter(n=>(n.title||'').toLowerCase().includes(q)||(n.sym||'').toLowerCase().includes(q));
  }

  if (!filtered.length) { list.innerHTML=''; empty.style.display=''; return; }
  empty.style.display = 'none';
  list.innerHTML = filtered.map(n => {
    const badge = '<span class="news-sym-badge" data-sym="'+n.sym+'" onclick="event.stopPropagation();filterNewsBySym(this.dataset.sym)">'+n.sym+'</span>';
    const sectorBadge = '<span style="font-size:.7em;color:#8b949e;margin-right:6px">'+n.sector+'</span>';
    return '<div class="news-item-main">'+
      badge+sectorBadge+'<span class="news-date-main">'+n.date+'</span>'+
      '<span class="news-title-main">'+(n.link?'<a href="'+n.link+'" target="_blank">'+n.title+'</a>':n.title)+'</span>'+
    '</div>';
  }).join('');
}

function filterNewsBySym(sym) {
  activeNewsSymbol = sym;
  activeNewsSector = 'ALL';
  document.querySelectorAll('#news-sector-chips .chip').forEach(c=>c.classList.remove('active'));
  const allChip = document.querySelector('#news-sector-chips .chip');
  if (allChip) allChip.classList.add('active');
  renderNews();
}

  const watchlist = pp.watchlist || [];
  const summary   = pp.summary   || {};

  function fmt(v, dec) { return v !== null && v !== undefined ? parseFloat(v).toLocaleString('vi-VN', {maximumFractionDigits: dec||0}) : '—'; }
  function fmtM(v) { if (v === null || v === undefined) return '—'; const m = v/1e6; return (m>=0?'+':'')+m.toFixed(2)+'M'; }
  function pctBadge(v) {
    if (v === null || v === undefined) return '<span style="color:#8b949e">—</span>';
    const col = v >= 0 ? '#3fb950' : '#f85149';
    return '<span style="color:'+col+';font-weight:700">'+(v>=0?'+':'')+v.toFixed(2)+'%</span>';
  }

  // ── Positions ────────────────────────────────────────────────────────────
  const posRows = positions.length ? positions.map(function(p) {
    const days = p.open_date ? Math.round((new Date() - new Date(p.open_date))/86400000) : '?';
    const stopPct = p.stop_price ? ((p.stop_price - p.open_price)/p.open_price*100).toFixed(1)+'%' : '—';
    return '<tr style="border-bottom:1px solid #21262d">'
      +'<td style="padding:10px 12px;font-weight:700;color:#e6edf3">'+p.symbol+'</td>'
      +'<td style="padding:10px 12px;color:#8b949e">'+p.open_date+'</td>'
      +'<td style="padding:10px 12px;text-align:right">'+fmt(p.open_price/1000,1)+'K</td>'
      +'<td style="padding:10px 12px;text-align:right">'+fmt(p.current_price/1000,1)+'K</td>'
      +'<td style="padding:10px 12px;text-align:center">'+pctBadge(p.unrealized_pct)+'</td>'
      +'<td style="padding:10px 12px;text-align:right">'+fmtM(p.unrealized_pnl)+'</td>'
      +'<td style="padding:10px 12px;text-align:center;color:#8b949e">'+days+' ngày</td>'
      +'<td style="padding:10px 12px;color:#8b949e;font-size:.8em">'+stopPct+'</td>'
      +'</tr>';
  }).join('') : '<tr><td colspan="8" style="padding:24px;text-align:center;color:#8b949e">Không có vị thế nào đang mở</td></tr>';

  const totalUnr = summary.unrealized_pnl || 0;
  const totalCost = summary.total_cost || 0;
  const posCard = '<div style="background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden;margin-bottom:16px">'
    +'<div style="padding:12px 16px;background:#21262d;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;align-items:center">'
    +'<span style="font-weight:700;color:#e6edf3">📊 Vị thế đang mở ('+positions.length+')</span>'
    +(totalCost ? '<span style="font-size:.85em;color:'+(totalUnr>=0?'#3fb950':'#f85149')+'">Unrealized: '+fmtM(totalUnr)+'</span>' : '')
    +'</div>'
    +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:600px">'
    +'<thead><tr style="background:#0d1117"><th style="padding:8px 12px;text-align:left;color:#8b949e;font-size:.8em">Mã</th><th style="padding:8px 12px;color:#8b949e;font-size:.8em">Ngày vào</th><th style="padding:8px 12px;text-align:right;color:#8b949e;font-size:.8em">Giá vào</th><th style="padding:8px 12px;text-align:right;color:#8b949e;font-size:.8em">Hiện tại</th><th style="padding:8px 12px;text-align:center;color:#8b949e;font-size:.8em">%</th><th style="padding:8px 12px;text-align:right;color:#8b949e;font-size:.8em">P&L</th><th style="padding:8px 12px;text-align:center;color:#8b949e;font-size:.8em">Hold</th><th style="padding:8px 12px;color:#8b949e;font-size:.8em">Stop%</th></tr></thead>'
    +'<tbody>'+posRows+'</tbody></table></div>'
    +'</div>';

  // ── Watchlist ────────────────────────────────────────────────────────────
  const wlRows = watchlist.length ? watchlist.map(function(w) {
    const refStr = w.ref_price ? fmt(w.ref_price/1000,1)+'K' : '—';
    const curStr = w.current_price ? fmt(w.current_price/1000,1)+'K' : '—';
    return '<tr style="border-bottom:1px solid #21262d">'
      +'<td style="padding:10px 12px;font-weight:700;color:#e6edf3">'+w.symbol+'</td>'
      +'<td style="padding:10px 12px;color:#8b949e">'+w.added_date+'</td>'
      +'<td style="padding:10px 12px;text-align:right">'+refStr+'</td>'
      +'<td style="padding:10px 12px;text-align:right">'+curStr+'</td>'
      +'<td style="padding:10px 12px;text-align:center">'+pctBadge(w.chg_from_ref_pct)+'</td>'
      +'<td style="padding:10px 12px;color:#8b949e;font-size:.85em">'+((w.note||''))+'</td>'
      +'</tr>';
  }).join('') : '<tr><td colspan="6" style="padding:24px;text-align:center;color:#8b949e">Chưa có mã nào trong watchlist</td></tr>';

  const wlCard = '<div style="background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden;margin-bottom:16px">'
    +'<div style="padding:12px 16px;background:#21262d;border-bottom:1px solid #30363d">'
    +'<span style="font-weight:700;color:#e6edf3">👀 Watchlist ('+watchlist.length+')</span>'
    +'</div>'
    +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:500px">'
    +'<thead><tr style="background:#0d1117"><th style="padding:8px 12px;text-align:left;color:#8b949e;font-size:.8em">Mã</th><th style="padding:8px 12px;color:#8b949e;font-size:.8em">Ngày thêm</th><th style="padding:8px 12px;text-align:right;color:#8b949e;font-size:.8em">Giá tham chiếu</th><th style="padding:8px 12px;text-align:right;color:#8b949e;font-size:.8em">Hiện tại</th><th style="padding:8px 12px;text-align:center;color:#8b949e;font-size:.8em">Thay đổi</th><th style="padding:8px 12px;color:#8b949e;font-size:.8em">Ghi chú</th></tr></thead>'
    +'<tbody>'+wlRows+'</tbody></table></div>'
    +'</div>';

  // ── History ───────────────────────────────────────────────────────────────
  const histRows = history.length ? history.slice(0,20).map(function(h) {
    const pnl = parseFloat(h.pnl_vnd||0);
    const pct = parseFloat(h.pnl_pct||0);
    return '<tr style="border-bottom:1px solid #21262d">'
      +'<td style="padding:8px 12px;font-weight:700;color:#e6edf3">'+h.symbol+'</td>'
      +'<td style="padding:8px 12px;color:#8b949e">'+h.open_date+'</td>'
      +'<td style="padding:8px 12px;color:#8b949e">'+h.close_date+'</td>'
      +'<td style="padding:8px 12px;text-align:right">'+fmt((h.open_price||0)/1000,1)+'K</td>'
      +'<td style="padding:8px 12px;text-align:right">'+fmt((h.close_price||0)/1000,1)+'K</td>'
      +'<td style="padding:8px 12px;text-align:center">'+pctBadge(pct)+'</td>'
      +'<td style="padding:8px 12px;text-align:right">'+fmtM(pnl)+'</td>'
      +'<td style="padding:8px 12px;color:#8b949e;font-size:.8em">'+(h.close_reason||'')+'</td>'
      +'</tr>';
  }).join('') : '<tr><td colspan="8" style="padding:24px;text-align:center;color:#8b949e">Chưa có lịch sử giao dịch</td></tr>';

  const realPnl = summary.realized_pnl || 0;
  const histCard = '<div style="background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden;margin-bottom:16px">'
    +'<div style="padding:12px 16px;background:#21262d;border-bottom:1px solid #30363d;display:flex;justify-content:space-between">'
    +'<span style="font-weight:700;color:#e6edf3">📋 Lịch sử giao dịch</span>'
    +(history.length ? '<span style="font-size:.85em;color:'+(realPnl>=0?'#3fb950':'#f85149')+'">Realized: '+fmtM(realPnl)+'</span>' : '')
    +'</div>'
    +'<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:650px">'
    +'<thead><tr style="background:#0d1117"><th style="padding:8px 12px;text-align:left;color:#8b949e;font-size:.8em">Mã</th><th style="padding:8px 12px;color:#8b949e;font-size:.8em">Vào</th><th style="padding:8px 12px;color:#8b949e;font-size:.8em">Ra</th><th style="padding:8px 12px;text-align:right;color:#8b949e;font-size:.8em">Giá vào</th><th style="padding:8px 12px;text-align:right;color:#8b949e;font-size:.8em">Giá ra</th><th style="padding:8px 12px;text-align:center;color:#8b949e;font-size:.8em">%</th><th style="padding:8px 12px;text-align:right;color:#8b949e;font-size:.8em">P&L</th><th style="padding:8px 12px;color:#8b949e;font-size:.8em">Lý do</th></tr></thead>'
    +'<tbody>'+histRows+'</tbody></table></div>'
    +'</div>';

  // ── CLI guide ──────────────────────────────────────────────────────────
  const cliGuide = '<div style="background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:14px 16px;font-size:.82em;color:#8b949e;line-height:1.8">'
    +'<strong style="color:#c9d1d9">📌 Cách thêm lệnh / watchlist (chạy trên máy):</strong><br>'
    +'<code style="color:#58a6ff">python modules/paper_trading/paper_trade.py open HPG 27500 1000 "RSI oversold"</code><br>'
    +'<code style="color:#58a6ff">python modules/paper_trading/paper_trade.py close HPG 29000 "Target hit"</code><br>'
    +'<code style="color:#58a6ff">python modules/paper_trading/paper_trade.py watch VIC 45000 "Breakout pending"</code><br>'
    +'<code style="color:#58a6ff">python modules/paper_trading/paper_trade.py unwatch VIC</code>'
    +'</div>';

  document.getElementById('portfolio-content').innerHTML =
    '<div style="max-width:900px;margin:0 auto;padding:0 16px">'
    +posCard + wlCard + histCard + cliGuide
    +'</div>';
}

// ── P10 SIGNAL TAB ────────────────────────────────────────────────────────
function renderP10Tab() {
  const p10 = (MARKET_OVERVIEW.p10_signal) || {};
  const hist = (MARKET_OVERVIEW.p10_history) || [];
  const status = p10.status;
  const label  = p10.label || (status ? 'ĐỦ ĐIỀU KIỆN' : 'NGỒI IM');
  const passCount = p10.pass_count || 0;
  const total     = p10.total || 11;
  const filters   = p10.filters || [];

  const badgeColor = status ? '#238636' : '#b91c1c';
  const badgeBg    = status ? '#0f2d1a' : '#2d0f0f';
  const badgeBorder= status ? '#2ea043' : '#dc2626';
  const icon       = status ? '✅' : '🚫';

  // Days since last pass
  let daysSince = null;
  if (!status && hist.length) {
    const lastPass = hist.find(h => h.status === 1);
    if (lastPass) {
      const d1 = new Date(lastPass.date), d2 = new Date();
      daysSince = Math.round((d2 - d1) / 86400000);
    }
  }
  const sinceStr = status
    ? '<span style="color:#3fb950;font-size:.9em">🟢 Đang trong giai đoạn vào lệnh</span>'
    : (daysSince !== null
        ? '<span style="color:#8b949e;font-size:.9em">Lần cuối PASS: <b>' + daysSince + ' ngày trước</b></span>'
        : '<span style="color:#8b949e;font-size:.9em">Chưa có dữ liệu lịch sử</span>');

  // Filter rows
  const filterRows = filters.map(function(f) {
    const ok = f.pass;
    const col = ok ? '#3fb950' : '#f85149';
    const bg  = ok ? '#0d1f12' : '#1f0d0d';
    const icon2 = ok ? '✅' : '❌';
    return '<tr style="border-bottom:1px solid #21262d">'
      + '<td style="padding:8px 12px;color:#c9d1d9;font-size:.9em">' + f.name + '</td>'
      + '<td style="padding:8px 12px;text-align:center;font-weight:700;color:' + col + ';font-size:.9em">' + f.value + '</td>'
      + '<td style="padding:8px 12px;text-align:center;color:#8b949e;font-size:.85em">' + f.threshold + '</td>'
      + '<td style="padding:8px 12px;text-align:center;font-size:1.1em;background:' + bg + '">' + icon2 + '</td>'
      + '</tr>';
  }).join('');

  // History bar (60 ngày)
  const histBar = hist.length ? (function() {
    const items = hist.slice().reverse().map(function(h) {
      const c = h.status ? '#2ea043' : '#b91c1c';
      const tt = h.date + ': ' + (h.status ? 'PASS' : 'FAIL') + ' (' + h.pass_count + '/' + h.total + ')';
      return '<span title="' + tt + '" style="display:inline-block;width:10px;height:24px;background:' + c + ';border-radius:2px;margin:1px;cursor:default"></span>';
    }).join('');
    const nPass = hist.filter(h=>h.status).length;
    const pct = hist.length ? Math.round(nPass/hist.length*100) : 0;
    return '<div style="margin-top:4px">' + items + '</div>'
      + '<div style="margin-top:6px;font-size:.82em;color:#8b949e">60 ngày gần nhất — PASS ' + nPass + '/' + hist.length + ' ngày (' + pct + '%)</div>';
  })() : '<div style="color:#8b949e;font-size:.85em;padding:8px 0">Chưa có dữ liệu lịch sử (cần chạy backfill)</div>';

  const html = '<div style="max-width:760px;margin:0 auto;padding:0 16px">'
    // Header badge
    + '<div style="background:' + badgeBg + ';border:2px solid ' + badgeBorder + ';border-radius:12px;padding:20px 24px;margin-bottom:20px;text-align:center">'
    + '<div style="font-size:2.8em;margin-bottom:6px">' + icon + '</div>'
    + '<div style="font-size:1.6em;font-weight:700;color:' + badgeColor + ';letter-spacing:.02em">' + label + '</div>'
    + '<div style="margin-top:8px;color:#8b949e;font-size:.9em">' + passCount + ' / ' + total + ' điều kiện thỏa &nbsp;·&nbsp; Chiến lược P10_FullMacro</div>'
    + '<div style="margin-top:8px">' + sinceStr + '</div>'
    + '</div>'
    // Filter table
    + '<div style="background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden;margin-bottom:20px">'
    + '<div style="padding:12px 16px;background:#21262d;border-bottom:1px solid #30363d">'
    + '<span style="font-weight:700;color:#e6edf3;font-size:.95em">🔍 Chi tiết từng điều kiện</span>'
    + '<span style="float:right;font-size:.8em;color:#8b949e">Tất cả phải PASS đồng thời</span>'
    + '</div>'
    + '<table style="width:100%;border-collapse:collapse">'
    + '<thead><tr style="background:#0d1117">'
    + '<th style="padding:8px 12px;text-align:left;color:#8b949e;font-size:.8em;font-weight:600;border-bottom:1px solid #30363d">ĐIỀU KIỆN</th>'
    + '<th style="padding:8px 12px;text-align:center;color:#8b949e;font-size:.8em;font-weight:600;border-bottom:1px solid #30363d">GIÁ TRỊ</th>'
    + '<th style="padding:8px 12px;text-align:center;color:#8b949e;font-size:.8em;font-weight:600;border-bottom:1px solid #30363d">NGƯỠNG</th>'
    + '<th style="padding:8px 12px;text-align:center;color:#8b949e;font-size:.8em;font-weight:600;border-bottom:1px solid #30363d">KQ</th>'
    + '</tr></thead><tbody>' + filterRows + '</tbody>'
    + '</table></div>'
    // History
    + '<div style="background:#161b22;border:1px solid #30363d;border-radius:8px;padding:14px 16px;margin-bottom:20px">'
    + '<div style="font-weight:700;color:#e6edf3;font-size:.95em;margin-bottom:10px">📅 Lịch sử tín hiệu (60 ngày)</div>'
    + histBar
    + '</div>'
    // Disclaimer
    + '<div style="background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:14px 16px;font-size:.82em;color:#8b949e;line-height:1.6">'
    + '<strong style="color:#c9d1d9">⚠️ Lưu ý:</strong> Đây là điều kiện entry của chiến lược backtest P10_FullMacro '
    + '(ROI +5.6%/năm, PF 2.21, 2022-2026). Không phải đánh giá thị trường tổng quan. '
    + 'Khi PASS: tìm cổ phiếu thỏa RSI 40-63, MACD dương+tăng, trên MA20+MA50, vol_ratio ≥1.1, score ≥60. '
    + 'Stop 5%, trail stop 7% (bật lãi ≥2%), max hold 18 ngày.'
    + '</div>'
    + '</div>';

  document.getElementById('p10-content').innerHTML = html;
  // Update nav button color based on status
  var navBtn = document.getElementById('p10-nav-btn');
  if (navBtn) {
    navBtn.style.borderBottom = '2px solid ' + (status ? '#3fb950' : '#f85149');
    navBtn.style.color = status ? '#3fb950' : '#f85149';
  }
}
</script>

<script>
// ── Plan B: Dynamic date chips — fetch dates.json mỗi lần load ────────────
(function() {
  var DATES_URL = 'https://quydd56.github.io/trading-report/dates.json';
  var WD_VI = ['CN','T2','T3','T4','T5','T6','T7'];
  // currentDate: YYYYMMDD — lấy từ REPORT_AS_OF (đã baked-in khi gen)
  var currentDate = (typeof REPORT_AS_OF !== 'undefined')
    ? REPORT_AS_OF.replace(/-/g, '') : '';
  var today = new Date();
  var todayStr = today.getFullYear().toString()
    + String(today.getMonth()+1).padStart(2,'0')
    + String(today.getDate()).padStart(2,'0');

  function buildChip(d, isNewest, isActive) {
    var mon = d.slice(4,6), day = d.slice(6,8);
    var dt  = new Date(parseInt(d.slice(0,4)), parseInt(mon)-1, parseInt(day));
    var wd  = WD_VI[dt.getDay()];
    var label;
    if (isNewest && d === todayStr) {
      label = 'Hôm nay ' + day + '/' + mon;
    } else if (isNewest) {
      label = 'Gần nhất ' + day + '/' + mon + ' ' + wd;
    } else {
      label = day + '/' + mon + ' ' + wd;
    }
    var href = (isNewest && d === todayStr) ? 'index.html' : 'daily_' + d + '.html';
    var cls  = 'date-chip' + (isActive ? ' active' : '');
    return '<a href="' + href + '" class="' + cls + '">' + label + '</a>';
  }

  fetch(DATES_URL + '?t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var dates = (data.dates || []).slice(0, 7);
      if (!dates.length) return;
      var latest = data.latest || dates[0];
      var chips = dates.map(function(d) {
        return buildChip(d, d === latest, d === currentDate);
      });
      var container = document.querySelector('.date-chips');
      if (container) container.innerHTML = chips.join('\n');
    })
    .catch(function() { /* network error — keep static chips */ });
})();
</script>

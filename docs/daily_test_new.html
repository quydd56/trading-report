<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;line-height:1.5}
a{color:#58a6ff;text-decoration:none}

/* ── Layout ── */
.header{background:linear-gradient(160deg,#0d1117 0%,#161b22 100%);border-bottom:1px solid #30363d;padding:14px 24px}
.header-inner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:1.1em;font-weight:700;color:#58a6ff;letter-spacing:.5px}
.header .meta{font-size:.8em;color:#8b949e}

.main-nav{background:#161b22;border-bottom:1px solid #30363d;padding:0 24px}
.main-nav-inner{max-width:1200px;margin:0 auto;display:flex;gap:0}
.mnav-btn{padding:12px 20px;font-size:.88em;font-weight:600;background:none;border:none;color:#8b949e;cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.mnav-btn.active{color:#58a6ff;border-bottom-color:#58a6ff}
.mnav-btn:hover{color:#c9d1d9}

.container{max-width:1200px;margin:0 auto;padding:20px 16px}
.tab-content{display:none}.tab-content.active{display:block}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.row31{display:grid;grid-template-columns:2fr 1fr;gap:16px}

/* ── Cards ── */
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:18px;overflow:hidden}
.card-title{font-size:.72em;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}

/* ── VN-Index ── */
.vni-val{font-size:2.2em;font-weight:700;color:#e6edf3;line-height:1;margin-bottom:4px}
.vni-chg{font-size:1em;font-weight:600;margin-bottom:10px}
.chart-wrap{position:relative;height:180px;margin-top:10px}
.vni-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.stat-item{background:#21262d;border-radius:8px;padding:8px 10px}
.stat-label{font-size:.7em;color:#8b949e;margin-bottom:2px}
.stat-val{font-size:.9em;font-weight:600}
.up{color:#3fb950}.dn{color:#f85149}.flat{color:#8b949e}

/* ── Signal ── */
.sig-badge{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:24px;font-size:1.1em;font-weight:700;margin:8px 0 10px}
.sig-green{background:#1a4731;color:#3fb950;border:1.5px solid #3fb950}
.sig-yellow{background:#3d2c00;color:#d29922;border:1.5px solid #d29922}
.sig-red{background:#3d0f0f;color:#f85149;border:1.5px solid #f85149}
.sig-dot{width:8px;height:8px;border-radius:50%;background:currentColor}
.rule-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #21262d;font-size:.85em}
.rule-item:last-child{border:none}
.badge{font-size:.7em;font-weight:700;padding:2px 8px;border-radius:10px;white-space:nowrap}
.badge-g{background:#1a4731;color:#3fb950}
.badge-y{background:#3d2c00;color:#d29922}
.badge-r{background:#3d0f0f;color:#f85149}

.breadth-row{display:flex;gap:8px;margin-top:10px}
.breadth-pill{flex:1;text-align:center;padding:8px 4px;border-radius:8px;font-size:.8em;font-weight:600}
.bp-buy{background:#1a4731;color:#3fb950}.bp-watch{background:#3d2c00;color:#d29922}.bp-skip{background:#21262d;color:#8b949e}

/* ── Tables ── */
table{width:100%;border-collapse:collapse;font-size:.85em}
th{font-size:.7em;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;padding:0 6px 8px;text-align:left;border-bottom:1px solid #30363d;white-space:nowrap}
td{padding:7px 6px;border-bottom:1px solid #21262d;vertical-align:middle}
tr:last-child td{border:none}
tr:hover td{background:#1c2128}
.sym{font-weight:600;color:#e6edf3;white-space:nowrap}
.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap}
.meta-text{font-size:.72em;color:#8b949e;font-weight:400}

/* ── Screener badges ── */
.s-badge{font-size:.75em;font-weight:700;padding:2px 10px;border-radius:12px;white-space:nowrap}
.badge-buy{background:#1a4731;color:#3fb950;border:1px solid #3fb950}
.badge-watch{background:#3d2c00;color:#d29922;border:1px solid #d29922}
.badge-skip{background:#21262d;color:#8b949e;border:1px solid #484f58}

.score-bar-wrap{display:flex;align-items:center;gap:6px;justify-content:flex-end}
.score-bar{height:5px;border-radius:3px;background:linear-gradient(90deg,#3fb950,#d29922,#f85149)}

/* ── Filter chips ── */
.chip-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:4px 14px;border-radius:20px;font-size:.78em;font-weight:600;cursor:pointer;background:#21262d;border:1px solid #30363d;color:#8b949e;transition:.15s}
.chip:hover{color:#c9d1d9;border-color:#484f58}
.chip.active{color:#e6edf3;border-color:#58a6ff;background:#1c2d42}
.chip.chip-buy.active{color:#3fb950;border-color:#3fb950;background:#1a4731}
.chip.chip-watch.active{color:#d29922;border-color:#d29922;background:#3d2c00}
.chip.chip-skip.active{color:#8b949e;border-color:#484f58;background:#21262d}

/* ── Detail panel ── */
#detail-panel{position:fixed;top:0;right:-440px;width:420px;height:100vh;background:#161b22;border-left:1px solid #30363d;z-index:1000;transition:right .3s ease;overflow-y:auto;padding:20px}
#detail-panel.open{right:0}
.dp-close{position:absolute;top:14px;right:14px;background:none;border:none;color:#8b949e;font-size:1.2em;cursor:pointer;padding:4px 8px}
.dp-close:hover{color:#c9d1d9}
.dp-symbol{font-size:1.5em;font-weight:700;color:#e6edf3;margin-bottom:2px}
.dp-name{font-size:.85em;color:#8b949e;margin-bottom:14px}
.dp-section{margin-top:16px}
.dp-section-title{font-size:.7em;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;border-bottom:1px solid #21262d;padding-bottom:6px}
.dp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.dp-item{background:#21262d;border-radius:8px;padding:8px 10px}
.dp-label{font-size:.68em;color:#8b949e;margin-bottom:2px}
.dp-val{font-size:.92em;font-weight:600}
.commentary-box{background:#21262d;border-radius:8px;padding:12px;font-size:.84em;line-height:1.6;color:#c9d1d9;border-left:3px solid #58a6ff}
.news-item-dp{padding:8px 0;border-bottom:1px solid #21262d;font-size:.82em;line-height:1.4}
.news-item-dp:last-child{border:none}
.news-date-dp{color:#8b949e;font-size:.85em}

/* ── News tab ── */
.news-filter-bar{display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.news-search{background:#21262d;border:1px solid #30363d;border-radius:8px;padding:6px 12px;color:#c9d1d9;font-size:.85em;width:180px}
.news-search:focus{outline:none;border-color:#58a6ff}
.news-item-main{padding:10px 0;border-bottom:1px solid #21262d}
.news-item-main:last-child{border:none}
.news-sym-badge{font-size:.7em;font-weight:700;padding:1px 8px;border-radius:10px;background:#1c2d42;color:#58a6ff;margin-right:6px}
.news-date-main{color:#8b949e;font-size:.8em;margin-right:6px}
.news-title-main{font-size:.88em;line-height:1.4}

.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:999}
.overlay.show{display:block}

/* ── Detail modal ── */
.dm-section{margin-bottom:20px}
.dm-section-title{font-size:.72em;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;border-bottom:1px solid #21262d;padding-bottom:6px}

/* ── Fundamentals table ── */
.fund-val-good{color:#3fb950}
.fund-val-ok{color:#d29922}
.fund-val-bad{color:#f85149}

/* ── Sort / Search ── */
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:#c9d1d9}
th.sortable.sort-asc{color:#58a6ff}
th.sortable.sort-desc{color:#58a6ff}
.sort-icon{font-size:.7em;opacity:.35;margin-left:3px}
th.sort-asc .sort-icon,th.sort-desc .sort-icon{opacity:1;color:#58a6ff}
.tbl-search{background:#21262d;border:1px solid #30363d;border-radius:8px;padding:6px 12px;color:#c9d1d9;font-size:.85em;width:200px;margin-bottom:10px}
.tbl-search:focus{outline:none;border-color:#58a6ff}

/* ── Responsive ── */
@media(max-width:768px){
  .row2,.row3,.row31{grid-template-columns:1fr}
  #detail-panel{width:100%;right:-100%}
  .main-nav{padding:0 8px}
  .mnav-btn{padding:10px 12px;font-size:.8em}
}
</style>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const STOCKS           = [];
const VNIDX            = {"labels": ["2026-06-17", "2026-06-18", "2026-06-19"], "data": [1200.0, 1210.0, 1215.0], "color": "#3fb950"};
const SECTOR_NEWS      = {};
const BIGBOY_DATA      = [];
const PRICE_HISTORY    = {};
const SNAPSHOT_HISTORY = {};
const SECTOR_FUND      = {};
const MARKET_OVERVIEW  = {"breadth": {"up": 50, "down": 30, "flat": 20}, "market_regime": "TÍCH CỰC", "score_distribution": {"buy": 10, "watch": 5, "neutral": 3, "sell": 2}, "sector_performance": [], "top_sectors": [], "regime_reason": "Test"};
const BIGBOY_HISTORY   = {};
const OPPORTUNITY_LIST = [];

// ── State ─────────────────────────────────────────────────────────────────────
let activeSignal    = 'ALL';
let activeSector    = 'ALL';
let activeFundSector= 'ALL';
let activeNewsSector= 'ALL';
let activeNewsSymbol = null;
let activeBbFilter  = 'ALL';
let sortScr  = {col:'score', dir:-1};
let sortFund = {col:'roe',   dir:-1};
let sortBbSt = {col:'ltr_score', dir:-1};

// ── Helpers ───────────────────────────────────────────────────────────────────
function fmt(v, dec=0) {
  if (v==null||isNaN(v)) return '—';
  return v.toLocaleString('vi-VN', {minimumFractionDigits:dec,maximumFractionDigits:dec});
}
function fmtPct(v) {
  if (v==null||isNaN(v)) return '—';
  return v.toFixed(1)+'%';
}
function fmtSign(v, dec=3) {
  if (v==null||isNaN(v)) return '—';
  return (v>0?'+':'')+v.toFixed(dec);
}
function colorClass(v, goodAbove=0) {
  if (v==null||isNaN(v)) return '';
  return v > goodAbove ? 'up' : (v < goodAbove ? 'dn' : '');
}
function signalBadge(sig) {
  const cls = sig==='BUY'?'badge-buy':(sig==='WATCH'?'badge-watch':'badge-skip');
  return '<span class="s-badge '+cls+'">'+sig+'</span>';
}
function bbBadge(bb) {
  if (!bb||bb==='NORMAL') return '';
  const m = {STRONG_BB:'#3fb950',BB:'#d29922',WATCH_BB:'#58a6ff',VOL_SURGE:'#a371f7'};
  const c = m[bb]||'#8b949e';
  return '<span style="font-size:.65em;font-weight:700;padding:1px 6px;border-radius:8px;'
    +'background:'+c+'22;color:'+c+';border:1px solid '+c+';margin-left:4px">'+bb.replace('_',' ')+'</span>';
}
function scoreBar(score) {
  const color = score>=70?'#3fb950':(score>=50?'#d29922':'#8b949e');
  return '<div class="score-bar-wrap"><div class="score-bar" style="width:'+score+'%;background:'+color+'"></div><span>'+score+'</span></div>';
}
function peColor(pe) {
  if (!pe||isNaN(pe)) return '';
  return pe<12?'fund-val-good':(pe<22?'':'fund-val-bad');
}
function roeColor(roe) {
  if (!roe||isNaN(roe)) return '';
  return roe>18?'fund-val-good':(roe>10?'':'fund-val-bad');
}
function truncate(s, n=60) {
  if (!s) return '';
  return s.length>n?s.slice(0,n)+'...':s;
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.mnav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if (btn) btn.classList.add('active');
  if (id === 'market' && !window._marketRendered) { renderMarket(); window._marketRendered=true; }
  if (id === 'opportunity' && !window._oppRendered) { renderOpportunity(); window._oppRendered=true; }
  if (id === 'bigboy' && !window._bbRendered) { renderBigboyTab(); window._bbRendered=true; }
}

// ── Unique sectors ─────────────────────────────────────────────────────────────
function getUniqueSectors() {
  const secs = [...new Set(STOCKS.map(s=>s.sector||'Khac'))].sort();
  return secs;
}

function buildSectorChips(containerId, clickFn) {
  const secs = getUniqueSectors();
  const bar = document.getElementById(containerId);
  // Keep first chip (Tat ca)
  const first = bar.children[0];
  bar.innerHTML = '';
  bar.appendChild(first);
  secs.forEach(sec => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = sec;
    chip.onclick = function() { clickFn(sec, this); };
    bar.appendChild(chip);
  });
}

// ── Sort utility ──────────────────────────────────────────────────────────────
function sortTable(tbl, col) {
  const st = tbl==='scr' ? sortScr : sortFund;
  if (st.col===col) { st.dir *= -1; } else { st.col=col; st.dir=-1; }
  if (tbl==='scr') renderScreener(); else renderFundamentals();
}

function applySortHeaders(tbl, prefixMap) {
  const st = tbl==='scr' ? sortScr : sortFund;
  Object.entries(prefixMap).forEach(([col, thId]) => {
    const th = document.getElementById(thId);
    if (!th) return;
    th.classList.remove('sort-asc','sort-desc');
    const icon = th.querySelector('.sort-icon');
    if (st.col===col) {
      th.classList.add(st.dir>0?'sort-asc':'sort-desc');
      if (icon) icon.innerHTML = st.dir>0 ? '&#9650;' : '&#9660;';
    } else {
      if (icon) icon.innerHTML = '&#8597;';
    }
  });
}

function doSort(arr, col, dir) {
  return [...arr].sort((a,b) => {
    const av = a[col], bv = b[col];
    if (av==null && bv==null) return 0;
    if (av==null) return 1;
    if (bv==null) return -1;
    return dir * (av > bv ? 1 : av < bv ? -1 : 0);
  });
}


// ── NEW TAB RENDER FUNCTIONS ─────────────────────────────────────────────────

function renderMarket() {
  const d = MARKET_OVERVIEW;
  if (!d || !d.breadth) {
    document.getElementById('market-overview-content').innerHTML = '<div style="padding:40px;text-align:center;color:#8b949e">Không có dữ liệu thị trường</div>';
    return;
  }

  const regimeColor = d.market_regime === 'TÍCH CỰC' ? '#3fb950' : d.market_regime === 'TIÊU CỰC' ? '#f85149' : '#d29922';
  const regimeBg = d.market_regime === 'TÍCH CỰC' ? '#1a4731' : d.market_regime === 'TIÊU CỰC' ? '#3d0f0f' : '#3d2c00';

  const sd = d.score_distribution || {};
  const sdTotal = (sd.buy||0)+(sd.watch||0)+(sd.neutral||0)+(sd.sell||0);

  const sectorRows = (d.sector_performance || []).slice(0,10).map(s => {
    const chg = s.avg_change || 0;
    const color = chg > 0 ? '#3fb950' : chg < 0 ? '#f85149' : '#8b949e';
    const arrow = chg > 0 ? '▲' : chg < 0 ? '▼' : '–';
    const upPct = s.stock_count > 0 ? Math.round(s.up_count/s.stock_count*100) : 0;
    return '<tr><td style="padding:8px 12px;font-weight:600">'+s.sector+'</td>'
      +'<td style="padding:8px 12px;text-align:right;color:'+color+';font-weight:700">'+arrow+' '+Math.abs(chg).toFixed(2)+'%</td>'
      +'<td style="padding:8px 12px;text-align:right;color:#8b949e">'+upPct+'% tăng</td>'
      +'<td style="padding:8px 12px;text-align:right;color:#8b949e">'+s.stock_count+' cp</td></tr>';
  }).join('');

  const b = d.breadth || {};
  const total = (b.up||0)+(b.down||0)+(b.flat||0)||1;
  const upW = Math.round((b.up||0)/total*100);
  const dnW = Math.round((b.down||0)/total*100);
  const flatW = 100-upW-dnW;

  const sdRows = sdTotal > 0 ? [['BUY','#3fb950','Tín hiệu mua mạnh',(sd.buy||0)],['WATCH','#d29922','Cần theo dõi thêm',(sd.watch||0)],['NEUTRAL','#484f58','Không rõ xu hướng',(sd.neutral||0)],['SELL','#f85149','Tín hiệu bán / yếu',(sd.sell||0)]].map(function(r){
    const lbl=r[0],col=r[1],desc=r[2],cnt=r[3];
    const pct = Math.round(cnt/sdTotal*100);
    return '<div><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:.8em;color:'+col+';font-weight:700">'+lbl+'</span><span style="font-size:.8em;color:#8b949e">'+cnt+' cp ('+pct+'%)</span></div><div style="height:7px;background:#21262d;border-radius:4px"><div style="width:'+pct+'%;height:100%;background:'+col+';border-radius:4px"></div></div><div style="font-size:.72em;color:#8b949e;margin-top:2px">'+desc+'</div></div>';
  }).join('') : '<div style="color:#8b949e;font-size:.9em">Chưa có dữ liệu</div>';

    +'<div class="row2" style="margin-bottom:20px">'
    +'<div class="card"><div class="card-title">Độ rộng thị trường — bao nhiêu cổ phiếu đang tăng?</div>'

    +'<div style="text-align:center"><div style="font-size:1.8em;font-weight:700;color:#f85149">'+(b.down||0)+'</div><div style="font-size:.75em;color:#8b949e">Giảm ▼</div></div>'
    +'<div style="text-align:center"><div style="font-size:1.8em;font-weight:700;color:#8b949e">'+(b.flat||0)+'</div><div style="font-size:.75em;color:#8b949e">Đứng –</div></div></div>'
    +'<div style="height:10px;border-radius:5px;overflow:hidden;display:flex;gap:1px;margin-bottom:8px">'
    +'<div style="width:'+upW+'%;background:#3fb950"></div>'
    +'<div style="width:'+flatW+'%;background:#484f58"></div>'

function renderOpportunity() {
  const list = OPPORTUNITY_LIST || [];

  function getRows(filter) {
    let filtered = list;
    if (filter === 'buy') filtered = list.filter(function(d){ return d.signal === 'BUY'; });
    if (filter === 'bb') filtered = list.filter(function(d){ return d.bb_days_30d > 0; });
    if (filter === 'cheap') filtered = list.filter(function(d){ return d.pe_vs_sector === 'RẺ HƠN'; });

    return filtered.map(function(d) {
      const sigColor = d.signal==='BUY'?'#3fb950':d.signal==='WATCH'?'#d29922':d.signal==='SELL'?'#f85149':'#484f58';
      const sigBg = d.signal==='BUY'?'#1a4731':d.signal==='WATCH'?'#3d2c00':d.signal==='SELL'?'#3d0f0f':'#21262d';
      const rsiColor = d.rsi14 > 70 ? '#f85149' : d.rsi14 < 30 ? '#3fb950' : '#8b949e';
      const rsiNote = d.rsi14 > 70 ? 'mua quá—cẩn thận' : d.rsi14 < 30 ? 'bán quá—cơ hội' : 'vùng trung tính';
      const trendIcon = d.score_trend === '↑' ? '<span style="color:#3fb950">↑ cải thiện</span>' : d.score_trend === '↓' ? '<span style="color:#f85149">↓ suy yếu</span>' : '<span style="color:#8b949e">→ ổn định</span>';
      const maIcons = (d.above_ma20?'<span title="Trên MA20" style="color:#3fb950;font-size:.75em">MA20✓</span>':'<span style="color:#484f58;font-size:.75em">MA20✗</span>')
        + ' ' + (d.above_ma50?'<span title="Trên MA50" style="color:#3fb950;font-size:.75em">MA50✓</span>':'<span style="color:#484f58;font-size:.75em">MA50✗</span>');
      const valColor = d.pe_vs_sector==='RẺ HƠN'?'#3fb950':d.pe_vs_sector==='ĐẮT HƠN'?'#f85149':'#8b949e';
      const valText = d.pe !== null && d.sector_pe !== null && d.pe > 0 && d.sector_pe > 0
        ? 'P/E '+d.pe.toFixed(1)+'x <span style="color:'+valColor+'">('+(d.pe_vs_sector||'N/A')+')</span>'
        : '<span style="color:#484f58">N/A</span>';
      const bbText = d.bb_days_30d > 0
        ? '<span style="color:#f0c040;font-weight:700">'+d.bb_days_30d+'/30 ngày</span>'
        : '<span style="color:#484f58">–</span>';

      const positives = [];
      const negatives = [];
      if (d.signal === 'BUY') positives.push('kỹ thuật mạnh');
      else if (d.signal === 'SELL') negatives.push('kỹ thuật yếu');
      if (d.above_ma20 && d.above_ma50) positives.push('trên MA20&50');
      else if (!d.above_ma20) negatives.push('dưới MA20');
      if (d.bb_days_30d >= 5) positives.push('tổ chức gom đều '+d.bb_days_30d+' ngày');
      else if (d.bb_days_30d > 0) positives.push('có tín hiệu tổ chức');
      if (d.pe_vs_sector === 'RẺ HƠN') positives.push('định giá hấp dẫn');
      else if (d.pe_vs_sector === 'ĐẮT HƠN') negatives.push('đắt hơn ngành');
      if (d.score_trend === '↑') positives.push('đà tăng cải thiện');
      else if (d.score_trend === '↓') negatives.push('đà yếu dần');

      let conclusion = '';
      if (positives.length >= 3) conclusion = '✅ '+positives.join(', ');
      else if (negatives.length >= 2) conclusion = '⚠️ '+negatives.join(', ');
      else if (positives.length > 0) conclusion = '→ '+positives.join(', ')+(negatives.length?' · cẩn thận: '+negatives.join(', '):'');
      else conclusion = '<span style="color:#484f58">Không rõ xu hướng</span>';

      return '<tr style="border-bottom:1px solid #21262d;cursor:pointer" onclick="showDetail(\''+d.sym+'\')" onmouseover="this.style.background=\'#21262d\'" onmouseout="this.style.background=\'\'">'
        +'<td style="padding:10px 12px"><strong style="color:#e6edf3">'+d.sym+'</strong><div style="font-size:.72em;color:#8b949e">'+d.sector+'</div></td>'
        +'<td style="padding:10px 12px;text-align:center"><span style="background:'+sigBg+';color:'+sigColor+';font-size:.75em;font-weight:700;padding:3px 10px;border-radius:10px">'+d.signal+'</span><div style="font-size:.72em;color:#8b949e;margin-top:3px">điểm '+d.tech_score+'/6</div></td>'
        +'<td style="padding:10px 12px">'+trendIcon+'<div style="font-size:.72em;margin-top:3px">'+maIcons+'</div></td>'
        +'<td style="padding:10px 12px;font-size:.82em;color:'+rsiColor+'">RSI '+(d.rsi14||0).toFixed(0)+'<div style="font-size:.85em;color:#8b949e">'+rsiNote+'</div></td>'
        +'<td style="padding:10px 12px;font-size:.82em">'+valText+'</td>'
        +'<td style="padding:10px 12px;font-size:.82em">'+bbText+'</td>'
        +'<td style="padding:10px 12px;font-size:.8em;color:#c9d1d9">'+conclusion+'</td></tr>';
    }).join('');
  }

  document.getElementById('opportunity-content').innerHTML =
    '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">'
    +'<button onclick="oppFilter(\'all\',this)" id="opp-btn-all" style="padding:6px 16px;border-radius:20px;border:1px solid #58a6ff;background:#1c2d40;color:#58a6ff;font-size:.82em;cursor:pointer;font-weight:600">Tất cả ('+list.length+')</button>'
    +'<button onclick="oppFilter(\'buy\',this)" id="opp-btn-buy" style="padding:6px 16px;border-radius:20px;border:1px solid #30363d;background:none;color:#8b949e;font-size:.82em;cursor:pointer">🟢 BUY ('+list.filter(function(d){return d.signal==='BUY';}).length+')</button>'
    +'<button onclick="oppFilter(\'bb\',this)" id="opp-btn-bb" style="padding:6px 16px;border-radius:20px;border:1px solid #30363d;background:none;color:#8b949e;font-size:.82em;cursor:pointer">🐋 Có tổ chức ('+list.filter(function(d){return d.bb_days_30d>0;}).length+')</button>'
    +'<button onclick="oppFilter(\'cheap\',this)" id="opp-btn-cheap" style="padding:6px 16px;border-radius:20px;border:1px solid #30363d;background:none;color:#8b949e;font-size:.82em;cursor:pointer">💰 Rẻ hơn ngành ('+list.filter(function(d){return d.pe_vs_sector==='RẺ HƠN';}).length+')</button>'
    +'</div>'
    +'<div class="card" style="padding:0">'
    +'<table style="width:100%;border-collapse:collapse">'
    +'<thead><tr style="border-bottom:1px solid #30363d;background:#161b22">'
    +'<th style="padding:10px 12px;text-align:left;font-size:.75em;color:#8b949e;font-weight:600">Mã</th>'
    +'<th style="padding:10px 12px;text-align:center;font-size:.75em;color:#8b949e;font-weight:600">Kỹ thuật</th>'
    +'<th style="padding:10px 12px;font-size:.75em;color:#8b949e;font-weight:600">Xu hướng</th>'
    +'<th style="padding:10px 12px;font-size:.75em;color:#8b949e;font-weight:600">RSI 14</th>'
    +'<th style="padding:10px 12px;font-size:.75em;color:#8b949e;font-weight:600">Định giá</th>'
    +'<th style="padding:10px 12px;font-size:.75em;color:#8b949e;font-weight:600">Tổ chức</th>'
    +'<th style="padding:10px 12px;font-size:.75em;color:#8b949e;font-weight:600">Kết luận</th>'
    +'</tr></thead>'
    +'<tbody id="opp-tbody">'+getRows('all')+'</tbody>'
    +'</table></div>';

  window._oppGetRows = getRows;
}

function oppFilter(filter, btn) {
  document.querySelectorAll('[id^="opp-btn-"]').forEach(function(b) {
    b.style.background='none'; b.style.color='#8b949e'; b.style.borderColor='#30363d';
  });
  btn.style.background='#1c2d40'; btn.style.color='#58a6ff'; btn.style.borderColor='#58a6ff';
  document.getElementById('opp-tbody').innerHTML = window._oppGetRows ? window._oppGetRows(filter) : '';
}

function renderBigboyTab() {
  const bh = BIGBOY_HISTORY || {};
  const syms = Object.keys(bh).filter(function(s){ return (bh[s].total_days_30d||0) > 0; })
    .sort(function(a,b){ return (bh[b].total_days_30d||0) - (bh[a].total_days_30d||0); });

  if (!syms.length) {
    document.getElementById('bigboy-content').innerHTML = '<div style="text-align:center;padding:60px;color:#8b949e">Không có dữ liệu dòng tiền 30 ngày</div>';
    return;
  }

  const sectorBB = {};
  const oppList = OPPORTUNITY_LIST || [];
  syms.forEach(function(s) {
    const opp = oppList.find(function(o){ return o.sym===s; });
    const sec = opp ? opp.sector : 'Khác';
    if (!sectorBB[sec]) sectorBB[sec] = {days:0, syms:[]};
    sectorBB[sec].days += bh[s].total_days_30d||0;
    sectorBB[sec].syms.push(s);
  });
  const sectorArr = Object.entries(sectorBB).sort(function(a,b){ return b[1].days-a[1].days; });

  const rows = syms.map(function(s) {
    const h = bh[s];
    const trendColor = h.trend==='ĐANG GOM'?'#3fb950':h.trend==='ĐANG XẢ'?'#f85149':'#8b949e';
    const trendBg = h.trend==='ĐANG GOM'?'#1a4731':h.trend==='ĐANG XẢ'?'#3d0f0f':'#21262d';
    const ltr = h.avg_ltr_30d || 0;
    const ltrNote = ltr >= 70 ? 'rất mạnh' : ltr >= 50 ? 'mạnh' : ltr >= 30 ? 'trung bình' : 'yếu';
    const opp = oppList.find(function(o){ return o.sym===s; });
    const sector = opp ? opp.sector : '';

    const miniBar = (h.ltr_scores||[]).slice(-30).map(function(v,i) {
      const sig = h.signal_types ? h.signal_types[i] : null;
      const col = v===null ? '#21262d' : sig==='STRONG_BB' ? '#3fb950' : sig==='BB' ? '#2ea043' : sig==='WATCH_BB' ? '#d29922' : '#21262d';
      return '<span style="display:inline-block;width:5px;height:16px;background:'+col+';border-radius:1px;margin:0 1px" title="'+(v?'LTR '+v.toFixed(0):'–')+'"></span>';
    }).join('');

    return '<tr style="border-bottom:1px solid #21262d;cursor:pointer" onclick="showDetail(\''+s+'\',\'bigboy\')" onmouseover="this.style.background=\'#21262d\'" onmouseout="this.style.background=\'\'">'
      +'<td style="padding:10px 12px"><strong style="color:#e6edf3">'+s+'</strong><div style="font-size:.72em;color:#8b949e">'+sector+'</div></td>'
      +'<td style="padding:10px 12px;text-align:center"><span style="font-size:1.3em;font-weight:700;color:#f0c040">'+h.total_days_30d+'</span><div style="font-size:.72em;color:#8b949e">/ 30 ngày</div><div style="font-size:.7em;color:#8b949e;margin-top:2px">Chuỗi hiện tại: '+(h.consecutive_days||0)+' ngày</div></td>'
      +'<td style="padding:10px 12px"><div>'+miniBar+'</div><div style="font-size:.7em;color:#8b949e;margin-top:3px">🟢 STRONG_BB &nbsp; 🟡 WATCH_BB</div></td>'
      +'<td style="padding:10px 12px;text-align:center"><span style="font-size:1.1em;font-weight:700;color:#58a6ff">'+(ltr>0?ltr.toFixed(0):'–')+'</span><div style="font-size:.72em;color:#8b949e">'+ltrNote+'</div></td>'
      +'<td style="padding:10px 12px"><span style="background:'+trendBg+';color:'+trendColor+';font-size:.78em;font-weight:700;padding:4px 10px;border-radius:10px">'+h.trend+'</span><div style="font-size:.72em;color:#8b949e;margin-top:4px">'+(h.trend==='ĐANG GOM'?'Dòng tiền lớn đang tích lũy':h.trend==='ĐANG XẢ'?'Cẩn thận — có thể phân phối':'Chưa đủ dữ liệu kết luận')+'</div></td>'
      +'<td style="padding:10px 12px;text-align:center"><button onclick="event.stopPropagation();showDetail(\''+s+'\',\'bigboy\')" style="padding:5px 12px;border-radius:8px;border:1px solid #30363d;background:#21262d;color:#c9d1d9;cursor:pointer;font-size:.8em">Chi tiết</button></td></tr>';
  }).join('');

  const maxDays = sectorArr.length ? sectorArr[0][1].days : 1;
  const sectorBars = sectorArr.slice(0,8).map(function(e) {
    const sec=e[0], data=e[1];
    const pct = Math.round(data.days/maxDays*100);
    return '<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:.82em;color:#c9d1d9">'+sec+'</span><span style="font-size:.82em;color:#f0c040">'+data.days+' ngày-cp</span></div><div style="height:8px;background:#21262d;border-radius:4px"><div style="width:'+pct+'%;height:100%;background:#f0c040;border-radius:4px"></div></div><div style="font-size:.7em;color:#8b949e;margin-top:2px">'+data.syms.join(', ')+'</div></div>';
  }).join('');

  document.getElementById('bigboy-content').innerHTML =
    '<div class="card" style="margin-bottom:20px">'
    +'<div class="card-title">Dòng tiền tổ chức theo ngành — 30 ngày qua</div>'
    +'<div style="font-size:.8em;color:#8b949e;margin-bottom:12px">Tổng số ngày-cổ phiếu có tín hiệu BigBoy trong mỗi ngành (cao = tổ chức tập trung vào ngành đó)</div>'
    +sectorBars+'</div>'

    +'<div class="card" style="padding:0">'
    +'<div style="padding:16px 16px 0;border-bottom:1px solid #30363d">'
    +'<div style="font-size:.88em;font-weight:700;color:#e6edf3;margin-bottom:4px">Cổ phiếu có dòng tiền tổ chức ('+syms.length+' mã)</div>'
    +'<div style="font-size:.78em;color:#8b949e;padding-bottom:12px">Click vào dòng để xem chi tiết lịch sử BigBoy và chart giá</div></div>'
    +'<table style="width:100%;border-collapse:collapse">'
    +'<thead><tr style="background:#161b22">'
    +'<th style="padding:10px 12px;text-align:left;font-size:.75em;color:#8b949e;font-weight:600">Mã</th>'
    +'<th style="padding:10px 12px;text-align:center;font-size:.75em;color:#8b949e;font-weight:600">Số ngày / 30</th>'
    +'<th style="padding:10px 12px;font-size:.75em;color:#8b949e;font-weight:600">Lịch sử 30 ngày</th>'
    +'<th style="padding:10px 12px;text-align:center;font-size:.75em;color:#8b949e;font-weight:600">LTR Score</th>'
    +'<th style="padding:10px 12px;font-size:.75em;color:#8b949e;font-weight:600">Nhận định</th>'
    +'<th style="padding:10px 12px;text-align:center;font-size:.75em;color:#8b949e;font-weight:600"></th>'
    +'</tr></thead>'
    +'<tbody>'+rows+'</tbody></table></div>'

    +'<div class="card" style="margin-top:16px;background:#21262d;border-color:#30363d">'
    +'<div style="font-size:.8em;color:#8b949e;line-height:1.7">'
    +'<strong style="color:#c9d1d9">Giải thích LTR Score:</strong> Long-Term Ranking (0–100) — điểm tổng hợp mà tổ chức dùng để đánh giá sức mạnh cổ phiếu. '
    +'<span style="color:#3fb950">≥70 = rất mạnh</span> · <span style="color:#d29922">50–70 = mạnh</span> · <span style="color:#8b949e">&lt;50 = yếu</span>.<br>'
    +'<strong style="color:#c9d1d9">ĐANG GOM</strong> = tổ chức mua ròng nhiều ngày liên tiếp gần đây — thường là dấu hiệu tích lũy trước khi tăng giá.'
    +'</div></div>';
}


// ── DETAIL MODAL ──────────────────────────────────────────────────────────────
window._detailCharts = [];

function closeDetail() {
  const m = document.getElementById('detail-modal');
  if (m) m.style.display = 'none';
  window._detailCharts.forEach(c => { try { c.destroy(); } catch(e) {} });
  window._detailCharts = [];
}

function showDetail(sym, focus) {
  const s = STOCKS.find(x => x.sym === sym);
  if (!s) return;

  const ph = (typeof PRICE_HISTORY    !== 'undefined' && PRICE_HISTORY[sym])    || null;
  const sh = (typeof SNAPSHOT_HISTORY !== 'undefined' && SNAPSHOT_HISTORY[sym]) || null;
  const sf = (typeof SECTOR_FUND      !== 'undefined' && SECTOR_FUND[sym])      || null;

  window._detailCharts.forEach(c => { try { c.destroy(); } catch(e) {} });
  window._detailCharts = [];

  // ── Section A: Header ────────────────────────────────────────────────────
  const sigCls = s.signal==='BUY'?'badge-buy':(s.signal==='WATCH'?'badge-watch':'badge-skip');
  const sector = (sf && sf.sector) || s.sector || '';
  const closeP = ph && ph.closes && ph.closes.length ? ph.closes[ph.closes.length-1] : s.close;
  const prevP  = ph && ph.closes && ph.closes.length >= 2 ? ph.closes[ph.closes.length-2] : null;
  const chgPct = (closeP && prevP) ? ((closeP - prevP) / prevP * 100) : null;
  const chgHtml = chgPct !== null
    ? '<span style="color:'+(chgPct>=0?'#3fb950':'#f85149')+'">'+(chgPct>=0?'▲':'▼')+' '+Math.abs(chgPct).toFixed(2)+'%</span>'
    : '';

  // ── Section B: Price chart placeholder ──────────────────────────────────
  const priceHtml = ph
    ? '<div class="dm-section"><div class="dm-section-title">&#128200; Giá đóng cửa — 65 phiên gần nhất</div>'+
      '<div style="position:relative;height:200px"><canvas id="dm-price-chart"></canvas></div>'+
      '<div style="position:relative;height:60px;margin-top:4px"><canvas id="dm-vol-chart"></canvas></div></div>'
    : '<div class="dm-section" style="color:#8b949e;font-size:.85em;padding:8px 0">Chưa có dữ liệu giá lịch sử.</div>';

  // ── Section C: Score trend placeholder ──────────────────────────────────
  const scoreHtml = sh
    ? '<div class="dm-section"><div class="dm-section-title">&#128202; Điểm kỹ thuật &amp; Momentum — 60 ngày</div>'+
      '<div style="display:grid;grid-template-columns:3fr 2fr;gap:16px;align-items:start">'+
      '<div style="position:relative;height:180px"><canvas id="dm-score-chart"></canvas></div>'+
      '<div id="dm-metrics-table"></div></div></div>'
    : '';

  // ── Commentary ───────────────────────────────────────────────────────────
  const commentHtml = s.commentary
    ? '<div class="dm-section"><div class="dm-section-title">&#128172; Nhận xét kỹ thuật</div>'+
      '<div style="background:#21262d;border-radius:8px;padding:12px;font-size:.84em;line-height:1.6;color:#c9d1d9;border-left:3px solid #58a6ff">'+
      s.commentary+'</div></div>'
    : '';

  // ── Section D: Valuation placeholder ────────────────────────────────────
  const valHtml = sf
    ? '<div class="dm-section"><div class="dm-section-title">&#128181; Định giá — So sánh ngành</div>'+
      '<div id="dm-valuation"></div></div>'
    : '';

  // ── Render skeleton ──────────────────────────────────────────────────────
  const content = document.getElementById('dm-content');
  if (!content) return;
  content.innerHTML =
    '<div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:18px;'+
    'padding-bottom:16px;border-bottom:1px solid #30363d">'+
      '<div style="flex:1;min-width:160px">'+
        '<div style="font-size:1.4em;font-weight:700;color:#e6edf3">'+sym+
          ' <span class="s-badge '+sigCls+'">'+s.signal+'</span></div>'+
        '<div style="font-size:.85em;color:#8b949e;margin-top:3px">'+(s.name||'')+'</div>'+
        '<div style="font-size:.8em;color:#8b949e;margin-top:1px">'+sector+'</div>'+
      '</div>'+
      '<div style="text-align:right">'+
        '<div style="font-size:1.3em;font-weight:600;color:#e6edf3">'+
          (closeP != null ? closeP.toLocaleString('vi-VN') : '—')+'</div>'+
        '<div style="font-size:.9em;margin-top:2px">'+chgHtml+'</div>'+
        '<div style="font-size:.78em;color:#8b949e;margin-top:2px">Điểm: '+s.score+'/100</div>'+
      '</div>'+
    '</div>'+
    priceHtml + scoreHtml + commentHtml + valHtml;

  document.getElementById('detail-modal').style.display = 'block';

  // ── Build charts after DOM settles ──────────────────────────────────────
  requestAnimationFrame(function() {

    // ── Price chart ────────────────────────────────────────────────────────
    if (ph && ph.closes && ph.closes.length) {
      const pCtx = document.getElementById('dm-price-chart');
      if (pCtx) {
        const pc = new Chart(pCtx, {
          type: 'line',
          data: {
            labels: ph.dates,
            datasets: [
              { label:'Giá đóng cửa', data:ph.closes, borderColor:'#58a6ff',
                 backgroundColor:'#58a6ff12', borderWidth:1.5, pointRadius:0,
                 fill:true, tension:0.2, yAxisID:'y' },
              { label:'MA20', data:ph.ma20, borderColor:'#f78166', borderWidth:1.5,
                 borderDash:[5,3], pointRadius:0, fill:false, tension:0.2,
                 yAxisID:'y', spanGaps:true },
              { label:'MA50', data:ph.ma50, borderColor:'#3fb950', borderWidth:1.5,
                 borderDash:[5,3], pointRadius:0, fill:false, tension:0.2,
                 yAxisID:'y', spanGaps:true }
            ]
          },
          options: {
            responsive:true, maintainAspectRatio:false,
            plugins: {
              legend: { display:true, position:'top',
                labels:{ color:'#8b949e', boxWidth:12, font:{ size:10 } } },
              tooltip: { callbacks: {
                label: ctx => ctx.dataset.label+': '+(ctx.parsed.y||0).toLocaleString('vi-VN')
              } }
            },
            scales: {
              x: { display:true,
                    ticks:{ color:'#8b949e', maxTicksLimit:8, font:{ size:9 } },
                    grid:{ color:'#21262d' } },
              y: { display:true,
                    ticks:{ color:'#8b949e', font:{ size:9 } },
                    grid:{ color:'#21262d' } }
            }
          }
        });
        window._detailCharts.push(pc);
      }

      const vCtx = document.getElementById('dm-vol-chart');
      if (vCtx) {
        const vc = new Chart(vCtx, {
          type: 'bar',
          data: {
            labels: ph.dates,
            datasets: [{ label:'Khối lượng', data:ph.volumes,
                          backgroundColor:'#30363d', borderColor:'#484f58', borderWidth:0 }]
          },
          options: {
            responsive:true, maintainAspectRatio:false,
            plugins: { legend:{ display:false } },
            scales: {
              x: { display:false },
              y: { display:true,
                    ticks:{ color:'#8b949e', font:{ size:8 },
                      callback: v => v>=1e6?(v/1e6).toFixed(0)+'M':(v>=1e3?(v/1e3).toFixed(0)+'K':v) },
                    grid:{ color:'#21262d' } }
            }
          }
        });
        window._detailCharts.push(vc);
      }
    }

    // ── Score trend chart ──────────────────────────────────────────────────
    if (sh && sh.scores && sh.scores.length) {
      const sCtx = document.getElementById('dm-score-chart');
      if (sCtx) {
        const barColors = (sh.signals||[]).map(sig =>
          sig==='BUY'?'#3fb950':(sig==='WATCH'?'#d29922':(sig==='SELL'?'#f85149':'#484f58'))
        );
        const sc = new Chart(sCtx, {
          type: 'bar',
          data: {
            labels: sh.dates,
            datasets: [
              { label:'Điểm', data:sh.scores, backgroundColor:barColors,
                 borderRadius:2, yAxisID:'y', order:2 },
              { label:'RSI14', data:sh.rsi14||[], type:'line',
                 borderColor:'#a371f7', borderWidth:1.5, pointRadius:0,
                 fill:false, tension:0.2, yAxisID:'y2', order:1, spanGaps:true }
            ]
          },
          options: {
            responsive:true, maintainAspectRatio:false,
            plugins: {
              legend: { display:true, position:'top',
                labels:{ color:'#8b949e', boxWidth:10, font:{ size:9 } } },
              tooltip: { mode:'index', intersect:false }
            },
            scales: {
              x: { display:false },
              y: { display:true, min:0, max:100,
                    ticks:{ color:'#8b949e', font:{ size:9 } },
                    grid:{ color:'#21262d' },
                    title:{ display:true, text:'Điểm', color:'#8b949e', font:{ size:9 } } },
              y2: { display:true, position:'right', min:0, max:100,
                     ticks:{ color:'#a371f7', font:{ size:9 } },
                     grid:{ display:false },
                     title:{ display:true, text:'RSI', color:'#a371f7', font:{ size:9 } } }
            }
          }
        });
        window._detailCharts.push(sc);
      }

      // ── Metrics table ──────────────────────────────────────────────────
      const mtEl = document.getElementById('dm-metrics-table');
      if (mtEl) {
        const rsiArr  = (sh.rsi14||[]).filter(v => v != null);
        const lastRsi = rsiArr.length ? rsiArr[rsiArr.length-1] : null;
        const rsiAvg  = rsiArr.length ? rsiArr.reduce((a,b)=>a+b,0)/rsiArr.length : null;
        const macdArr  = (sh.macd_hist||[]).filter(v => v != null);
        const lastMacd = macdArr.length ? macdArr[macdArr.length-1] : null;
        const scArr  = (sh.scores||[]).filter(v => v != null);
        const firstS = scArr.length >= 5 ? scArr[scArr.length-5] : (scArr.length ? scArr[0] : null);
        const lastS  = scArr.length ? scArr[scArr.length-1] : null;
        const trendStr = (firstS!==null&&lastS!==null)
          ? (lastS>firstS?'↑ Tăng':lastS<firstS?'↓ Giảm':'→ Ổn định') : '—';
        const trendSuf = (firstS!==null&&lastS!==null) ? ' ('+firstS+'→'+lastS+')' : '';

        const mRows = [
          ['RSI 14',
            lastRsi!=null?lastRsi.toFixed(1):'—',
            rsiAvg!=null?'avg '+rsiAvg.toFixed(1):'—',
            lastRsi!=null?(lastRsi<35?'#3fb950':lastRsi>70?'#f85149':'#c9d1d9'):'#8b949e'],
          ['MACD hist',
            lastMacd!=null?(lastMacd>0?'+':'')+lastMacd.toFixed(3):'—',
            lastMacd!=null?(lastMacd>0?'✓ dương':'✗ âm'):'—',
            lastMacd!=null?(lastMacd>0?'#3fb950':'#f85149'):'#8b949e'],
          ['Xu hướng điểm', trendStr+trendSuf, '—', '#c9d1d9'],
          ['BB Days (60d)',
            (sh.bb_days||0)+' ngày',
            sh.bb_days>3?'Tổ chức gom':'—',
            sh.bb_days>3?'#d29922':'#c9d1d9'],
          ['Avg LTR score',
            sh.bb_ltr_avg!=null?sh.bb_ltr_avg.toFixed(1):'—',
            sh.bb_ltr_avg!=null&&sh.bb_ltr_avg>60?'Mạnh':'—',
            sh.bb_ltr_avg!=null&&sh.bb_ltr_avg>60?'#3fb950':'#c9d1d9'],
        ];

        mtEl.innerHTML =
          '<table style="width:100%;border-collapse:collapse">'+
          '<tr style="border-bottom:1px solid #30363d">'+
            '<th style="color:#8b949e;font-weight:600;text-align:left;padding:4px 4px;font-size:.78em">Chỉ số</th>'+
            '<th style="color:#8b949e;font-weight:600;text-align:right;padding:4px 4px;font-size:.78em">Hiện tại</th>'+
            '<th style="color:#8b949e;font-weight:600;text-align:right;padding:4px 4px;font-size:.78em">Tham chiếu</th>'+
          '</tr>'+
          mRows.map(([label, val, ref, color]) =>
            '<tr>'+
            '<td style="padding:5px 4px;color:#c9d1d9;font-size:.8em">'+label+'</td>'+
            '<td style="text-align:right;padding:5px 4px;font-weight:600;color:'+color+';font-size:.8em">'+val+'</td>'+
            '<td style="text-align:right;padding:5px 4px;color:#8b949e;font-size:.76em">'+ref+'</td>'+
            '</tr>'
          ).join('')+
          '</table>';
      }
    }

    // ── Valuation table ────────────────────────────────────────────────────
    if (sf) {
      const valEl = document.getElementById('dm-valuation');
      if (valEl) {
        const vRows = [
          ['P/E',  sf.pe,  sf.sector_pe,  false, 'x'],
          ['P/B',  sf.pb,  sf.sector_pb,  false, 'x'],
          ['ROE%', sf.roe, sf.sector_roe, true,  '%'],
        ];
        let tbl =
          '<table style="width:100%;border-collapse:collapse">'+
          '<tr style="border-bottom:1px solid #30363d">'+
            '<th style="color:#8b949e;text-align:left;padding:5px 6px;font-size:.78em"></th>'+
            '<th style="color:#8b949e;text-align:right;padding:5px 6px;font-size:.78em">'+sym+'</th>'+
            '<th style="color:#8b949e;text-align:right;padding:5px 6px;font-size:.78em">'+sector+' avg</th>'+
            '<th style="color:#8b949e;text-align:left;padding:5px 6px;font-size:.78em">Nhận xét</th>'+
          '</tr>';
        vRows.forEach(function(row) {
          const label=row[0], sv=row[1], secV=row[2], higherBetter=row[3], suffix=row[4];
          const str    = sv!=null    ? sv.toFixed(1)+suffix    : '—';
          const secStr = secV!=null  ? secV.toFixed(1)+suffix  : '—';
          const better = (sv!=null&&secV!=null) ? (higherBetter?sv>secV:sv<secV) : null;
          const color  = better===null?'#c9d1d9':(better?'#3fb950':'#f85149');
          const noteStr = better===null ? '—'
            : (label==='ROE%' ? (better?'✓ Tốt hơn ngành':'✗ Thấp hơn ngành')
                               : (better?'✓ Rẻ hơn ngành' :'✗ Đắt hơn ngành'));
          tbl +=
            '<tr>'+
            '<td style="padding:5px 6px;color:#c9d1d9;font-weight:600;font-size:.85em">'+label+'</td>'+
            '<td style="text-align:right;padding:5px 6px;font-weight:700;color:'+color+';font-size:.85em">'+str+'</td>'+
            '<td style="text-align:right;padding:5px 6px;color:#8b949e;font-size:.85em">'+secStr+'</td>'+
            '<td style="padding:5px 6px;font-size:.8em;color:'+(better===null?'#8b949e':(better?'#3fb950':'#f85149'))+'">'+noteStr+'</td>'+
            '</tr>';
        });
        tbl += '</table>';

        // Auto verdict
        const peOk  = sf.pe !=null && sf.sector_pe !=null && sf.pe  < sf.sector_pe;
        const pbOk  = sf.pb !=null && sf.sector_pb !=null && sf.pb  < sf.sector_pb;
        const roeOk = sf.roe!=null && sf.sector_roe!=null && sf.roe > sf.sector_roe;
        const goodCnt = [peOk,pbOk,roeOk].filter(Boolean).length;
        let verdict = '';
        if (goodCnt === 3) {
          verdict = sym+' đang giao dịch rẻ hơn trung bình ngành về cả P/E và P/B, trong khi ROE cao hơn — định giá hấp dẫn.';
        } else if (goodCnt >= 2) {
          const goods = [peOk?'P/E':'',pbOk?'P/B':'',roeOk?'ROE':''].filter(Boolean).join(', ');
          verdict = sym+' có '+goods+' tốt hơn ngành — định giá tương đối hấp dẫn.';
        } else if (goodCnt === 1) {
          const weak = [(!peOk&&sf.pe!=null)?'P/E':'',(!pbOk&&sf.pb!=null)?'P/B':'',(!roeOk&&sf.roe!=null)?'ROE':''].filter(Boolean).join(', ');
          verdict = sym+' định giá ở mức bình thường đến cao so với ngành'+(weak?' — đặc biệt '+weak+' cao hơn trung bình':'')+'.';
        } else if (sf.pe||sf.pb||sf.roe) {
          verdict = sym+' định giá cao hơn ngành trên hầu hết chỉ số — cần tăng trưởng tốt để hỗ trợ mức giá hiện tại.';
        }
        if (verdict) {
          tbl += '<div style="margin-top:10px;padding:10px;background:#21262d;border-radius:8px;font-size:.82em;'+
            'color:#c9d1d9;line-height:1.6;border-left:3px solid #d29922">'+verdict+'</div>';
        }
        valEl.innerHTML = tbl;
      }
    }

    // ── Scroll to BigBoy section if focus==='bigboy' ───────────────────────
    if (focus === 'bigboy') {
      setTimeout(function() {
        const bbSection = document.getElementById('detail-bb-section');
        if (bbSection) bbSection.scrollIntoView({behavior:'smooth', block:'start'});
      }, 100);
    }
  });
}

// ── NEWS TAB ──────────────────────────────────────────────────────────────────
function buildNewsChips() {
  const bar = document.getElementById('news-sector-chips');
  const first = bar.children[0]; // "Tat ca" chip
  bar.innerHTML = '';
  bar.appendChild(first);
  first.className = 'chip' + (activeNewsSector==='ALL' ? ' active' : '');
  Object.keys(SECTOR_NEWS).forEach(sec => {
    const chip = document.createElement('span');
    chip.className = 'chip' + (activeNewsSector===sec ? ' active' : '');
    chip.textContent = sec;
    chip.onclick = function() { filterNewsSector(sec, this); };
    bar.appendChild(chip);
  });
}

function filterNewsSector(sec, el) {
  activeNewsSector = sec;
  activeNewsSymbol = null;
  document.querySelectorAll('#news-sector-chips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('news-clear-btn').style.display = 'none';
  renderNews();
}

function clearNewsFilter() {
  activeNewsSymbol = null;
  activeNewsSector = 'ALL';
  document.getElementById('news-search').value = '';
  document.getElementById('news-clear-btn').style.display = 'none';
  document.querySelectorAll('#news-sector-chips .chip').forEach(c=>c.classList.remove('active'));
  const allChip = document.querySelector('#news-sector-chips .chip');
  if (allChip) allChip.classList.add('active');
  renderNews();
}

function renderNews() {
  const q = (document.getElementById('news-search').value||'').toLowerCase();
  const clearBtn = document.getElementById('news-clear-btn');
  const list = document.getElementById('news-list');
  const empty = document.getElementById('news-empty');

  // Case 1: Sector chip selected — show sector news from SECTOR_NEWS
  if (activeNewsSector !== 'ALL' && !activeNewsSymbol) {
    const secNews = SECTOR_NEWS[activeNewsSector] || [];
    let filtered = secNews;
    if (q) filtered = filtered.filter(n=>(n.title||'').toLowerCase().includes(q));
    clearBtn.style.display = 'none';
    if (!filtered.length) { list.innerHTML=''; empty.style.display=''; return; }
    empty.style.display = 'none';
    list.innerHTML = filtered.map(n =>
      '<div class="news-item-main">'+
      '<span style="font-size:.7em;color:#58a6ff;margin-right:6px;font-weight:600;padding:1px 7px;border-radius:8px;background:#58a6ff22;border:1px solid #58a6ff44">'+activeNewsSector+'</span>'+
      '<span class="news-date-main">'+(n.date||'')+'</span>'+
      '<span class="news-title-main">'+(n.link?'<a href="'+n.link+'" target="_blank">'+n.title+'</a>':n.title)+'</span>'+
      '</div>'
    ).join('');
    return;
  }

  // Case 2: All stocks news (with optional symbol filter)
  let allNews = [];
  STOCKS.forEach(s => {
    if (s.news && s.news.length) {
      s.news.forEach(n => allNews.push({sym:s.sym, sector:s.sector, ...n}));
    }
  });
  allNews.sort((a,b)=>(b.date||'').localeCompare(a.date||''));

  let filtered = allNews;
  if (activeNewsSymbol) {
    filtered = filtered.filter(n=>n.sym===activeNewsSymbol);
    clearBtn.style.display = '';
    clearBtn.textContent = '✕ Xoa loc: '+activeNewsSymbol;
  } else {
    clearBtn.style.display = 'none';
  }
  if (q) {
    filtered = filtered.filter(n=>(n.title||'').toLowerCase().includes(q)||(n.sym||'').toLowerCase().includes(q));
  }

  if (!filtered.length) { list.innerHTML=''; empty.style.display=''; return; }
  empty.style.display = 'none';
  list.innerHTML = filtered.map(n => {
    const badge = '<span class="news-sym-badge" data-sym="'+n.sym+'" onclick="event.stopPropagation();filterNewsBySym(this.dataset.sym)">'+n.sym+'</span>';
    const sectorBadge = '<span style="font-size:.7em;color:#8b949e;margin-right:6px">'+n.sector+'</span>';
    return '<div class="news-item-main">'+
      badge+sectorBadge+'<span class="news-date-main">'+n.date+'</span>'+
      '<span class="news-title-main">'+(n.link?'<a href="'+n.link+'" target="_blank">'+n.title+'</a>':n.title)+'</span>'+
    '</div>';
  }).join('');
}

function filterNewsBySym(sym) {
  activeNewsSymbol = sym;
  activeNewsSector = 'ALL';
  document.querySelectorAll('#news-sector-chips .chip').forEach(c=>c.classList.remove('active'));
  const allChip = document.querySelector('#news-sector-chips .chip');
  if (allChip) allChip.classList.add('active');
  renderNews();
}

// ── CHART + INIT ──────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  // Render market tab on load (first tab)
  renderMarket();
  window._marketRendered = true;
});

// keyboard ESC closes panel
document.addEventListener('keydown', e => { if (e.key==='Escape') closeDetail(); });
</script>
